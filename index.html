/* ---------- Procreate: send a card out as an image ------------------------- */
let _probe;
function probeCtx(){ if(!_probe) _probe=document.createElement('canvas').getContext('2d'); return _probe; }
function safeColor(col, fb){ try{ const x=probeCtx(); x.fillStyle='#000000'; x.fillStyle=col; const got=x.fillStyle; return (got==='#000000' && String(col).toLowerCase()!=='#000000')? (fb||'#b98e3c') : col; }catch(e){ return fb||'#b98e3c'; } }
function loadImg(src){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>res(null); i.src=src; }); }
// downscale a canvas to a capped dimension and return a data URL (keeps the journal
// small so it stays well inside storage and syncs fast). PNG keeps transparency.
function shrinkCanvasURL(cv, maxDim, type, quality){
  const w=cv.width, hgt=cv.height, m=Math.max(w,hgt);
  if(m<=maxDim){ try{ return cv.toDataURL(type, quality); }catch(e){ return cv.toDataURL('image/png'); } }
  const s=maxDim/m, t=document.createElement('canvas'); t.width=Math.max(1,Math.round(w*s)); t.height=Math.max(1,Math.round(hgt*s));
  t.getContext('2d').drawImage(cv,0,0,t.width,t.height);
  try{ return t.toDataURL(type, quality); }catch(e){ return t.toDataURL('image/png'); }
}
function downscaleToDataURL(file, maxDim, quality, cb){
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=()=>{
    let{width:wd,height:ht}=img; const s=Math.min(1, maxDim/Math.max(wd,ht));
    if(s>=1){ cb(rd.result); return; }
    const cv=document.createElement('canvas'); cv.width=Math.round(wd*s); cv.height=Math.round(ht*s);
    const x=cv.getContext('2d'); x.drawImage(img,0,0,cv.width,cv.height);
    try{ cb(cv.toDataURL('image/jpeg', quality||0.85)); }catch(e){ cb(rd.result); }
  }; img.onerror=()=>cb(rd.result); img.src=rd.result; };
  rd.readAsDataURL(file);
}
function wrapLines(ctx, text, font, maxW){
  ctx.font=font; const words=String(text).split(/\s+/); const lines=[]; let line='';
  for(const wd of words){ const t=line? line+' '+wd : wd; if(ctx.measureText(t).width>maxW && line){ lines.push(line); line=wd; } else line=t; }
  if(line) lines.push(line); return lines;
}
async function renderCardCanvas(w, state, image, opts){
  opts=opts||{}; const c=w.card||{}; const W=920, M=58, cw=W-M*2;
  const accent=(w.fields&&w.fields.some(f=>f.type==='element')&&primaryElementKey(state.element))? elementAccentOf(primaryElementKey(state.element)) : (ACCENTS[w.accent]||ACCENTS.gold);
  const aCol=safeColor(accent,'#b98e3c');
  const img=image? await loadImg(image) : null;
  const ctx0=probeCtx();
  // build blocks with measured heights
  const blocks=[];
  blocks.push({h:34, draw:(x,y)=>{ x.fillStyle='#a39a80'; x.font='600 19px Georgia,serif'; x.fillText(((c.kicker||w.title)+(opts.specimenNo?' · no. '+opts.specimenNo:'')).toUpperCase(), M, y+20); }});
  if(img){ const ih=360; blocks.push({h:ih+18, draw:(x,y)=>{ x.strokeStyle=safeColor(deriveFrame(accent),'#cdbf9a'); x.lineWidth=2; x.setLineDash&&x.setLineDash([6,5]); x.strokeRect(M,y,cw,ih); x.setLineDash&&x.setLineDash([]);
    const r=Math.min(cw/img.width,(ih-8)/img.height), iw=img.width*r, hh=img.height*r; x.drawImage(img, M+(cw-iw)/2, y+(ih-hh)/2, iw, hh); }}); }
  const nameLines=wrapLines(ctx0,(state[c.name]||'').trim()||placeholderName(w),'600 38px Georgia,serif',cw);
  blocks.push({h:nameLines.length*44+6, draw:(x,y)=>{ x.fillStyle='#2e2a24'; x.font='600 38px Georgia,serif'; nameLines.forEach((ln,i)=>x.fillText(ln,M,y+34+i*44)); }});
  const subV=c.sub?(state[c.sub]||'').trim():''; if(c.sub&&subV){ const sl=wrapLines(ctx0,(c.subPrefix||'')+subV,'italic 22px Georgia,serif',cw); blocks.push({h:sl.length*28+8, draw:(x,y)=>{ x.fillStyle='#9a8f7a'; x.font='italic 22px Georgia,serif'; sl.forEach((ln,i)=>x.fillText(ln,M,y+22+i*28)); }}); }
  const skip=new Set([c.name,c.sub,c.word,c.quote].filter(Boolean));
  (w.fields||[]).forEach(fld=>{ if(skip.has(fld.key))return; let label,val;
    if(fld.type==='element'){ if(!keyList(state.element).length)return; label=keyList(state.element).length>1?'ELEMENTS':'ELEMENT'; val=elementLabelsOf(state.element)+(keyList(state.expression).length?' · '+expressionLabelsOf(state.expression):''); }
    else { const v=(state[fld.key]||'').trim(); if(!v)return; label=(fld.cardLabel||fld.label).toUpperCase(); val=v; }
    const vl=wrapLines(ctx0,val,'20px Georgia,serif',cw);
    blocks.push({h:18+vl.length*26+10, draw:(x,y)=>{ x.fillStyle='#a39a80'; x.font='600 12px Georgia,serif'; x.fillText(label,M,y+12); x.fillStyle='#4a463b'; x.font='20px Georgia,serif'; vl.forEach((ln,i)=>x.fillText(ln,M,y+34+i*26)); }}); });
  const qV=c.quote?(state[c.quote]||'').trim():''; if(c.quote&&qV){ const ql=wrapLines(ctx0,qV,'italic 24px Georgia,serif',cw-30); blocks.push({h:ql.length*30+34, draw:(x,y)=>{ x.fillStyle=safeColor(deriveBg(accent),'#f6efde'); x.fillRect(M,y,cw,ql.length*30+26); x.fillStyle=aCol; x.fillRect(M,y,4,ql.length*30+26); x.fillStyle='#54503f'; x.font='italic 24px Georgia,serif'; ql.forEach((ln,i)=>x.fillText(ln,M+18,y+30+i*30)); }}); }
  // total height
  let total=M; blocks.forEach(b=>total+=b.h+10); total+=M;
  const dpr=2, cv=document.createElement('canvas'); cv.width=W*dpr; cv.height=total*dpr; const x=cv.getContext('2d'); x.scale(dpr,dpr);
  x.fillStyle='#fbf7ec'; x.fillRect(0,0,W,total);
  x.fillStyle=aCol; x.fillRect(0,0,W,12);
  let y=M; blocks.forEach(b=>{ b.draw(x,y); y+=b.h+10; });
  x.fillStyle='#bcb39a'; x.font='600 12px Georgia,serif'; x.fillText((w.kit==='field'?'THE VAEL FIELD JOURNAL':"THE WORLDMAKER'S PAGES"), M, total-22);
  return cv;
}
function sendToProcreate(w, state, image, opts){
  renderCardCanvas(w, state, image, opts).then(cv=>{
    cv.toBlob(blob=>{ if(!blob){ toast('Could not make the image.'); return; }
      const fname=(slug((state[(w.card&&w.card.name)])||w.title)||'card')+'.png';
      try{ if(navigator.canShare){ const file=new File([blob],fname,{type:'image/png'}); if(navigator.canShare({files:[file]})){ navigator.share({files:[file], title:w.title}).catch(()=>{}); return; } } }catch(e){}
      const a=h('a',{href:URL.createObjectURL(blob), download:fname}); document.body.append(a); a.click(); a.remove();
      toast('Saved an image — open it in Procreate or Photos.');
    }, 'image/png');
  }).catch(()=>toast('Could not make the image.'));
}

/* ---------- push to her own file in the repo (GitHub Contents API) --------- */
function ghCfg(){ return DB.github; }
function ghReady(){ const g=DB.github; return !!(g && g.token && g.owner && g.repo); }
function ghHeaders(token){ return { 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }
const ghSleep=ms=>new Promise(r=>setTimeout(r,ms));
// a friendly, typed error for a GitHub response status
function ghErr(status, body){
  const m = (status===401||status===403) ? 'GitHub rejected the token — check it’s valid with Contents: read & write.'
    : status===404 ? 'Not found on GitHub.'
    : (status===409||status===422) ? 'The file changed on the server since you loaded it.'
    : status===429 ? 'GitHub is rate-limiting — try again in a moment.'
    : status>=500 ? 'GitHub is having trouble (server error) — try again shortly.'
    : status ? ('GitHub error '+status) : 'Could not reach GitHub (check your connection).';
  const e=new Error(m + (body? ' '+String(body).replace(/\s+/g,' ').slice(0,120):'')); e.status=status||0; return e;
}
function isConflict(e){ return !!e && (e.status===409 || e.status===422); }
// fetch with retry/backoff on transient failures (network, 429, 5xx). Returns the
// Response (caller checks .ok for non-retryable statuses like 401/404/409); throws a
// typed ghErr only when transient retries are exhausted or the network is unreachable.
async function ghFetch(url, opts, tries){
  tries=tries||3; let last;
  for(let i=0;i<tries;i++){
    if(i) await ghSleep(400*Math.pow(2,i-1) + Math.floor(Math.random()*200));
    let r; try{ r=await fetch(url, opts); }catch(e){ last=ghErr(0); continue; }
    if(r.status===429 || r.status>=500){ last=ghErr(r.status); continue; }
    return r;
  }
  throw last || ghErr(0);
}
function ghUrl(cfg, path){ return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path.split('/').map(encodeURIComponent).join('/')}`; }
function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function ub64(b64str){ return decodeURIComponent(escape(atob(String(b64str||'').replace(/\s+/g,'')))); }   // base64 (GitHub wraps it at 60 cols) -> UTF-8 text
function slug(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||'field-journal'; }
function stemOf(cfg){ return cfg.displayName? slug(cfg.displayName) : 'field-journal'; }
async function ghTest(cfg){ const r=await ghFetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {headers:ghHeaders(cfg.token)}); if(!r.ok) throw ghErr(r.status); return r.json(); }
async function ghMeta(cfg, path){ const r=await ghFetch(ghUrl(cfg,path)+`?ref=${encodeURIComponent(cfg.branch)}`, {headers:ghHeaders(cfg.token)}); if(r.status===404) return null; if(!r.ok) throw ghErr(r.status, await r.text().catch(()=>'')); return r.json(); }
// list a directory -> [{name,type,path},…] (the Contents API returns an array for a dir); [] if missing
async function ghList(cfg, path){ const r=await ghFetch(ghUrl(cfg,path)+`?ref=${encodeURIComponent(cfg.branch)}`, {headers:ghHeaders(cfg.token)}); if(r.status===404) return []; if(!r.ok) throw ghErr(r.status, await r.text().catch(()=>'')); const a=await r.json(); return Array.isArray(a)? a : []; }
async function ghPut(cfg, path, content, message, sha){ const body={ message, content:b64(content), branch:cfg.branch }; if(sha) body.sha=sha;
  const r=await ghFetch(ghUrl(cfg,path), {method:'PUT', headers:ghHeaders(cfg.token), body:JSON.stringify(body)});
  if(!r.ok) throw ghErr(r.status, await r.text().catch(()=>'')); return r.json(); }
// conflict-safe transform write: read -> guard? -> transform(text) -> put; if the file
// changed underneath us (sha conflict), re-read and re-apply the transform on the fresh
// text. `transform` must be a pure function of the current text, so re-applying is safe.
async function ghUpdate(cfg, path, transform, message, opts){
  opts=opts||{};
  for(let attempt=0; attempt<3; attempt++){
    const r=await ghGetText(cfg, path);
    if(!r && !opts.create) throw new Error(path+' not found');
    const cur = r ? r.text : '';
    if(opts.guard) opts.guard(cur);
    const next = transform(cur);
    if(r && next===cur) return r;            // nothing to change
    try{ return await ghPut(cfg, path, next, message, r && r.sha); }
    catch(e){ if(isConflict(e) && attempt<2) continue; throw e; }
  }
}
// read a repo text file -> { text, sha } (or null if missing). Decodes the authenticated
// base64 the Contents API already returned — never the raw.githubusercontent CDN, which can
// serve a stale "404: Not Found" body for private/just-written files (that bogus body once
// got parsed as canon AND written back, clobbering the queue). Only files over the ~1MB
// inline limit (no inline content) fall back to download_url.
async function ghGetText(cfg, path){ const meta=await ghMeta(cfg, path); if(!meta) return null;
  let text;
  if(meta.encoding==='base64' && typeof meta.content==='string'){ text=ub64(meta.content); }
  else if(meta.download_url){ text=await (await fetch(meta.download_url)).text(); }
  else throw new Error('could not read '+path);
  text=text.replace(/^﻿/,'');   // strip a UTF-8 BOM if present
  return { text, sha:meta.sha }; }
// Only the *shareable* journal travels to the repo — never device-only flags
// (token, engine profiles, mode, profile, seenIntro, the GitHub config). That way
// settings changes never enter a repo payload, and an unchanged journal produces
// an identical payload we can skip.
function syncPayload(){ return { creations:DB.creations||[], sparks:DB.sparks||[], roots:DB.roots||{}, counters:DB.counters||{}, elements:DB.elements||[], expressions:DB.expressions||[], tombstones:DB.tombstones||{}, naming:DB.naming||namingDefault() }; }
let syncTimer=null, syncing=false, _lastSyncedJSON=null;
function scheduleSync(){ if(!ghReady()) return; clearTimeout(syncTimer); syncTimer=setTimeout(()=>syncToRepo({silent:true}), 20000); }   // 20s debounce — coalesce bursts
async function syncToRepo(opts){ opts=opts||{}; if(!ghReady()){ if(!opts.silent) toast('Connect to GitHub first.'); return; } if(syncing) return;
  const payload = JSON.stringify(syncPayload(), null, 1);
  if(opts.silent && payload===_lastSyncedJSON) return;            // nothing actually changed — don't spam commits
  syncing=true;
  const cfg=ghCfg(); const base=(cfg.path||'kit/journal/').replace(/\/+$/,''); const stem=stemOf(cfg);
  try{
    const jsonPath=`${base}/${stem}.json`;
    // conflict-safe: if the file moved on the server (another device synced), fold that
    // remote journal into ours before writing, so a second device never erases the first.
    await ghUpdate(cfg, jsonPath, remote=>{ if(remote){ try{ mergeIncoming(JSON.parse(remote)); }catch(_){} } return JSON.stringify(syncPayload(), null, 1); }, `Update ${stem} journal`, {create:true});
    _lastSyncedJSON = JSON.stringify(syncPayload(), null, 1); saveLocal();   // capture any merged-in remote work
    // the human-readable .md only re-renders on an explicit save, so background syncs stay one commit
    if(!opts.silent){ const mdPath=`${base}/${stem}.md`; await ghUpdate(cfg, mdPath, ()=>renderJournalMarkdown(), `Update ${stem} journal (readable)`, {create:true}); }
    if(!opts.silent) toast('Saved to your file in the world.');
  }catch(e){ if(!opts.silent) toast('Sync failed: '+e.message); }
  finally{ syncing=false; }
}
function stripForBackup(db){
  const d=Object.assign({},db);
  if(d.github){ d.github=Object.assign({},d.github); delete d.github.token; }
  if(d.engines){
    const engines=d.engines&&typeof d.engines==='object'?d.engines:{};
    d.engines={
      activeId:typeof engines.activeId==='string'?engines.activeId:'',
      profiles:(Array.isArray(engines.profiles)?engines.profiles:[]).map(profile=>({
        id:String(profile&&profile.id||''),
        name:String(profile&&profile.name||''),
        type:String(profile&&profile.type||''),
      })),
    };
  }
  return d;
} // never write tokens, engine keys, or engine endpoints into a backup
// merge an incoming journal (from the repo or a backup file) into DB. Additive for new
// work (existing items win, new ones appended by id), but deletions are honored via
// tombstones: we union both sides' tombstones, drop any tombstoned item locally, and skip
// re-adding it from the incoming copy. That's what stops a "Remove" from springing back the
// next time the repo/backup copy is merged in — on this device or another.
function mergeIncoming(inc){
  if(!inc || typeof inc!=='object') return;
  const tomb = DB.tombstones = Object.assign({}, inc.tombstones||{}, DB.tombstones||{});
  DB.creations = DB.creations.filter(c=>!(c && tomb[c.id]));
  const have=new Set(DB.creations.map(c=>c.id)); (inc.creations||[]).forEach(c=>{ if(c && c.id && !have.has(c.id) && !tomb[c.id]) DB.creations.push(c); });
  DB.roots=Object.assign({}, inc.roots, DB.roots);
  DB.counters=Object.assign({}, inc.counters, DB.counters);
  DB.elements=mergeBy(DB.elements, inc.elements, 'key');
  DB.expressions=mergeBy(DB.expressions, inc.expressions, 'key');
  DB.sparks=mergeBy(DB.sparks||[], inc.sparks, 'id').filter(s=>!(s && tomb[s.id]));
}
async function loadFromRepo(opts){ opts=opts||{}; if(!ghReady()){ if(!opts.silent) toast('Connect to GitHub first.'); return; }
  const cfg=ghCfg(); const base=(cfg.path||'kit/journal/').replace(/\/+$/,''); const stem=stemOf(cfg);
  try{ const r=await ghGetText(cfg, `${base}/${stem}.json`); if(!r){ if(!opts.silent) toast('No saved file found yet.'); return; }
    mergeIncoming(JSON.parse(r.text));
    saveLocal(); if(!opts.silent) toast('Loaded from your file.'); render();   // don't echo a sync back out
  }catch(e){ if(!opts.silent) toast('Load failed: '+e.message); }
}
function mergeBy(a,b,k){ a=a||[]; const seen=new Set(a.map(x=>x[k])); (b||[]).forEach(x=>{ if(!seen.has(x[k])) a.push(x); }); return a; }

/* ---------- local backup file (a safety net against data eviction) --------- */
// the journal travels with its images inline; device secrets (GitHub token,
// engine key, engine endpoint) are never written into a backup.
function exportBackup(){
  const data=JSON.stringify(stripForBackup(DB), null, 1);
  const b=new Blob([data],{type:'application/json'});
  const a=h('a',{href:URL.createObjectURL(b), download:'vael-journal-backup-'+new Date().toISOString().slice(0,10)+'.json'});
  document.body.append(a); a.click(); a.remove(); toast('Saved a backup file.');
}
function importBackupFile(file){
  const rd=new FileReader();
  rd.onload=()=>{ try{ const inc=JSON.parse(rd.result); if(!inc || !('creations' in inc)) throw 0; mergeIncoming(inc); save(); toast('Restored from your backup.'); render(); }
    catch(e){ toast('That file could not be read as a journal backup.'); } };
  rd.readAsText(file);
}
function pickBackupFile(){
  const fi=h('input',{type:'file', accept:'application/json,.json', style:{display:'none'}, onchange:e=>{ const f=e.target.files[0]; if(f) importBackupFile(f); }});
  document.body.append(fi); fi.click(); setTimeout(()=>fi.remove(), 0);
}
function renderJournalMarkdown(){

    out.push(`## ${kit==='field'?'The Field Journal':"The Worldmaker's Pages"}`, ''); items.forEach(c=> out.push(...creationMarkdown(c))); });

  out.push('_Same trunk, different branches._'); return out.join('\n');
}

/* ========================================================================== *
   ENGINE SETTINGS — storage and switching groundwork only.

   Profiles live in the same device-local state as the GitHub token. This module
   never calls an endpoint, never logs a key, and never schedules repo sync.
   syncPayload excludes all engine settings; stripForBackup removes endpoint/key.
 * ========================================================================== */
const ENGINE_TYPES=[
  'Anthropic API',
  'OpenAI API',
  'OpenAI-compatible local endpoint',
  'Other HTTP endpoint',
];

function normalizeEngineProfile(profile){
  const p=profile&&typeof profile==='object'?profile:{};
  return {
    id:typeof p.id==='string'?p.id:'',
    name:typeof p.name==='string'?p.name.trim():'',
    type:typeof p.type==='string'?p.type.trim():'',
    endpoint:typeof p.endpoint==='string'?p.endpoint.trim():'',
    key:typeof p.key==='string'?p.key.trim():'',
  };
}
function normalizeEngineSettings(value){
  const source=value&&typeof value==='object'?value:{};
  const profiles=Array.isArray(source.profiles)?source.profiles.map(normalizeEngineProfile).filter(p=>p.id):[];
  const activeId=typeof source.activeId==='string'&&profiles.some(p=>p.id===source.activeId)?source.activeId:'';
  return {activeId,profiles};
}
function engineSettings(){
  DB.engines=normalizeEngineSettings(DB.engines);
  return DB.engines;
}
function engineProfileId(){
  return 'engine-'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
}
function getActiveEngine(){
  const settings=engineSettings(), profile=settings.profiles.find(p=>p.id===settings.activeId);
  return profile?Object.freeze(Object.assign({},profile)):null;
}
function saveEngineProfile(profile){
  const next=normalizeEngineProfile(profile);
  if(!next.name) throw new Error('Engine name is required');
  if(!next.type) throw new Error('Engine type is required');
  if(!next.endpoint) throw new Error('Base URL / endpoint is required');
  if(!next.id) next.id=engineProfileId();
  const settings=engineSettings(), index=settings.profiles.findIndex(p=>p.id===next.id);
  if(index>=0) settings.profiles[index]=next; else settings.profiles.push(next);
  if(!settings.activeId) settings.activeId=next.id;
  DB.engines=settings; saveLocal({forceMirror:true});
  return Object.freeze(Object.assign({},next));
}
function setActiveEngine(id){
  const settings=engineSettings();
  if(!settings.profiles.some(profile=>profile.id===id)) throw new Error('Engine profile not found');
  settings.activeId=id; DB.engines=settings; saveLocal({forceMirror:true});
  return getActiveEngine();
}
function removeEngineProfile(id){
  const settings=engineSettings(), index=settings.profiles.findIndex(profile=>profile.id===id);
  if(index<0) return false;
  settings.profiles.splice(index,1);
  if(settings.activeId===id) settings.activeId=settings.profiles[0]?settings.profiles[0].id:'';
  DB.engines=settings; saveLocal({forceMirror:true});
  return true;
}

function engineSettingsPanel(){
  const root=h('div',{class:'engine-settings'});
  let editing=null, adding=false, notice='';
  function draw(){
    const settings=engineSettings(), active=getActiveEngine();
    const list=h('div',{class:'engine-list'});
    if(!settings.profiles.length){
      list.append(h('p',{class:'engine-empty hint'},'No engines saved yet. Add a profile now; model calls come in a later update.'));
    }else settings.profiles.forEach(profile=>{
      const isActive=profile.id===settings.activeId;
      list.append(h('div',{class:'engine-row'+(isActive?' active':'')},
        h('button',{class:'engine-select',type:'button','aria-pressed':isActive?'true':'false',onclick:()=>{
          setActiveEngine(profile.id); notice=profile.name+' is active.'; editing=null; adding=false; draw();
        }},
          h('span',{class:'engine-name'},profile.name),
          h('span',{class:'engine-type'},profile.type),
          isActive?h('span',{class:'engine-active'},'ACTIVE'):null),
        h('div',{class:'engine-actions'},
          h('button',{class:'navbtn',type:'button',onclick:()=>{editing=profile.id;adding=false;notice='';draw();}},'Edit'),
          h('button',{class:'navbtn engine-remove',type:'button',onclick:()=>{
            if(confirm('Remove '+profile.name+' from this device?')){
              removeEngineProfile(profile.id); editing=null; adding=false; notice='Removed.'; draw();
            }
          }},'Remove'))));
    });
    const summary=h('div',{class:'engine-summary'},
      h('b',null,'Active engine'),
      h('span',null,active?active.name+' · '+active.type:'None selected'));
    const add=h('button',{class:'navbtn primary',type:'button',onclick:()=>{adding=true;editing=null;notice='';draw();}},'Add engine');
    const editProfile=editing?settings.profiles.find(profile=>profile.id===editing):null;
    const editor=(adding||editProfile)?engineProfileForm(editProfile||{},()=>{editing=null;adding=false;notice='Saved.';draw();},()=>{editing=null;adding=false;draw();}):null;
    root.replaceChildren(
      h('p',{class:'hint'},'Choose which connection future in-app AI tools will use. This update stores settings only; it makes no model or network calls.'),
      summary,
      list,
      h('div',{class:'toolrow engine-add'},add),
      editor,
      h('div',{class:'engine-notice hint',role:'status'},notice));
  }
  draw();
  return root;
}

function ntSampleCubic(P0,P1,P2,P3,t){ const u=1-t;

/* ========================================================================== *
   CANON FORMAT + PARSE — the single source of truth for how the workbench's
   markdown is read and written (queue, index, domain files, cards, threads).
   Pure functions only (no DOM, no network) so they're unit-testable; the Studio
   UI in studio.js / threads-board.js / promote.js builds on top of these.
 * ========================================================================== */
const DOMAIN_FILES = [
  {topic:'Cosmology — Cloudsea, fragments, portals', file:'domains/10_COSMOLOGY.md'},
  {topic:'Gods & Divinity — the three tiers, Ancients', file:'domains/20_GODS_AND_DIVINITY.md'},
  {topic:'The Unmaking Choir — the great enemy', file:'domains/21_UNMAKING_CHOIR.md'},
  {topic:'The God Games — the pact, the arena worlds', file:'domains/22_GOD_GAMES.md'},
  {topic:'Godlings & System — ladder, cores, strain', file:'domains/30_GODLINGS_AND_SYSTEM.md'},
  {topic:'Peoples & Races (general)', file:'domains/40_PEOPLES_AND_RACES.md'},
  {topic:'The Vael — naming, factions, embodiments', file:'domains/41_VAEL.md'},
  {topic:'Arkborne & Seeds', file:'domains/50_ARKBORNE_AND_SEEDS.md'},
  {topic:'Magic, Elements & Domains', file:'domains/60_MAGIC_ELEMENTS_AND_DOMAINS.md'},
];
const CANON_TAGS = ['COS','GOD','GLG','SYS','VAE','PEO','ARK','SED','MAG','PLC','HIS'];
const QUEUE_PATH = '02_PROMOTION_QUEUE.md', INDEX_PATH = '01_CANON_INDEX.md';
const THREAD_RE=/^\[(OPEN|DESTINATION|UNAUDITED|QUESTION)\]\s*(.*)$/;

/* ---- markdown -> safe html (for the Canon Browser) ---- */
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s){ return escapeHtml(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'); }
function mdToHtml(md){
  const lines=String(md).split('\n'); let html='', i=0, inList=false;
  const closeList=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  while(i<lines.length){ const ln=lines[i];
    if(/^```/.test(ln)){ closeList(); i++; let buf=''; while(i<lines.length && !/^```/.test(lines[i])){ buf+=lines[i]+'\n'; i++; } i++; html+='<pre>'+escapeHtml(buf)+'</pre>'; continue; }
    if(/^###\s/.test(ln)){ closeList(); html+='<h4>'+inlineMd(ln.replace(/^###\s/,''))+'</h4>'; i++; continue; }
    if(/^##\s/.test(ln)){ closeList(); html+='<h3>'+inlineMd(ln.replace(/^##\s/,''))+'</h3>'; i++; continue; }
    if(/^#\s/.test(ln)){ closeList(); html+='<h2>'+inlineMd(ln.replace(/^#\s/,''))+'</h2>'; i++; continue; }
    if(/^[-*]\s/.test(ln)){ if(!inList){ html+='<ul>'; inList=true; } html+='<li>'+inlineMd(ln.replace(/^[-*]\s/,''))+'</li>'; i++; continue; }
    if(/^>\s?/.test(ln)){ closeList(); html+='<p class="hint">'+inlineMd(ln.replace(/^>\s?/,''))+'</p>'; i++; continue; }
    if(ln.trim()===''){ closeList(); i++; continue; }
    closeList(); html+='<p>'+inlineMd(ln)+'</p>'; i++;
  }
  closeList(); return html;
}

/* ---- ids & the index ---- */
function pad3(n){ return String(n).padStart(3,'0'); }
function parseHighest(indexText, tag){ const m=new RegExp('\\*\\*Highest assigned:\\*\\*\\s*'+tag+'-(\\d+)','i').exec(indexText); return m? parseInt(m[1],10) : 0; }
function cardId(title){ const m=/^([A-Z]{3})-(\d{3})\b/.exec(String(title||'')); return m? {tag:m[1], num:parseInt(m[2],10), id:m[1]+'-'+m[2]} : null; }
function indexReservedIds(indexText){ const ids=[]; String(indexText).split('\n').forEach(l=>{ const m=/^-\s+([A-Z]{3}-\d{3})\b/.exec(l.trim()); if(m) ids.push(m[1]); }); return ids; }
function tagFromCategory(cat){ cat=String(cat||''); if(/41_VAEL/.test(cat))return 'VAE'; if(/40_PEOPLES/.test(cat))return 'PEO'; if(/50_ARKBORNE/.test(cat))return 'SED'; if(/10_COSMOLOGY/.test(cat))return 'PLC'; if(/30_GODLING/.test(cat))return 'GLG'; if(/60_MAGIC/.test(cat))return 'MAG'; return 'PEO'; }

/* ---- queue read/write helpers ---- */
// guard a write: refuse to touch the queue unless the text we read back really is the queue.
// (A stale "404: Not Found" body once slipped through and got written over the whole file.)
function assertQueue(text){ if(!/^#\s+02_PROMOTION_QUEUE\.md/m.test(text) || !/^#\s+RAW DUMP INBOX/m.test(text)) throw new Error('refusing to write — the file I read back isn’t the queue (try again in a moment)'); return text; }
// same guard idea for the other canon files we write — never write back something that
// isn't the file we think it is (e.g. a stale "404: Not Found" body).
function assertIndex(text){ if(!/^#\s+01_CANON_INDEX\.md/m.test(text) && !/Canon ID Registry/.test(text)) throw new Error('refusing to write — that file isn’t the canon index'); return text; }
function assertDomain(text){ if(text && !/^#\s/m.test(text)) throw new Error('refusing to write — that domain file doesn’t look right'); return text; }
function validCanonId(id){ return /^[A-Z]{3}-\d{3}$/.test(String(id||'')); }
function validCanonTag(tag){ return CANON_TAGS.indexOf(String(tag)) >= 0; }
function insertUnderSection(text, header, block){
  const lines=text.split('\n'); const hi=lines.findIndex(l=>l.trim()===header);
  if(hi<0) return text.replace(/\s*$/,'')+'\n\n'+header+'\n\n'+block.trim()+'\n';
  let ni=lines.length; for(let i=hi+1;i<lines.length;i++){ if(/^#\s/.test(lines[i])){ ni=i; break; } }
  lines.splice(ni, 0, '', block.trim(), '', '---', ''); return lines.join('\n');
}
function bumpIndex(text, tag, id, title){
  const lines=text.split('\n'); const si=lines.findIndex(l=>new RegExp('^##\\s+'+tag+'\\b').test(l));
  if(si<0) return text;
  let end=lines.length; for(let i=si+1;i<lines.length;i++){ if(/^##\s/.test(lines[i])){ end=i; break; } }
  for(let i=si+1;i<end;i++){ if(/\*\*Highest assigned:\*\*/.test(lines[i])){ lines[i]=lines[i].replace(new RegExp(tag+'-\\d+'), id); break; } }
  const bullet='- '+id+' — '+(title||'(untitled)')+' — *drafted in Studio* (Draft; not yet promoted)';
  let np=-1; for(let i=si+1;i<end;i++){ if(/\(none promoted\)/.test(lines[i])){ np=i; break; } }
  if(np>=0) lines[np]=bullet; else lines.splice(end,0,bullet,'');
  return lines.join('\n');
}

/* ---- cards: serialize + parse ---- */
function canonCardMarkdown(d){
  const bullets=(s,fb)=>{ const a=String(s||'').split('\n').map(x=>x.trim().replace(/^[-*]\s*/,'')).filter(Boolean); return a.length? a.map(x=>'- '+x) : ['- '+fb]; };
  return [
    `## ${d.id} — ${(d.title||'Untitled').trim()}`, '',
    `**Status:** ${d.status||'Draft'}`,
    `**Source:** ${d.source||'Field Journal Studio'}`,
    `**Category:** ${d.category||''}`, '',
    '### Canon Claim', '', (d.claim||'').trim()||'[one declarative sentence of canon]', '',
    '### What This Means', '', ...bullets(d.means,'[consequence or implication]'), '',
    '### Do Not Contradict', '', ...bullets(d.donot,'[boundary that must hold]'), '',
    '### Promotion Requirements', '',
    '- [ ] Does not contradict any promoted domain file',
    '- [ ] Has clear limits',
    '- [ ] Has immediate story, setting, or game usefulness',
    '- [ ] Does not make existing canon pointless',
    '- [ ] Can be explained simply to a fresh reader', '',
    '### Notes', '', `- ${new Date().toISOString().slice(0,10)} — drafted in the Field Journal Studio.${d.notes? ' '+d.notes:''}`,
  ].join('\n');
}
function parseQueueCards(text){
  const lines=text.split('\n'); const cards=[]; let cur=null, section='';
  for(const ln of lines){ const hm=/^#\s+(.*)/.exec(ln); if(hm) section=hm[1].trim();
    const cm=/^##\s+(.*)/.exec(ln); if(cm){ if(cur) cards.push(cur); cur={title:cm[1].trim(), status:'', section}; continue; }
    const sm=/^\*\*Status:\*\*\s*(.*)/.exec(ln); if(sm&&cur) cur.status=sm[1].trim();
    else if(cur && /^\*\*PROMOTED\s*[—-]/i.test(ln)) cur.status='PROMOTED'; }
  if(cur) cards.push(cur);
  // keep only real cards — a ## heading counts only if it has a Status line or an ID-style
  // title (TAG-000). Drops the queue's structural headings (Purpose, Rules, section dividers).
  const real=cards.filter(c=> c.status || /^[A-Z]{3}-\d{3}\b/.test(c.title));
  real.forEach(c=> c.col=statusToCol(c.status, c.section)); return real;
}
// Raw ideas live in the RAW DUMP INBOX as a "> date — …" stamp + a paragraph, not as
// ## cards, so parseQueueCards never saw them. Pull each one out as a Raw-column entry.
function parseRawIdeas(text){
  const lines=text.split('\n'); const out=[]; let inRaw=false, cur=null;
  const flush=()=>{ if(cur){ const body=cur.body.join(' ').replace(/\s+/g,' ').trim();
    if(body) out.push({ title: body.length>90? body.slice(0,90)+'…' : body, status: cur.label, col:'Raw', section:'RAW DUMP INBOX' }); } cur=null; };
  for(const ln of lines){
    const hm=/^#\s+(.*)/.exec(ln); if(hm){ flush(); inRaw=/raw dump/i.test(hm[1]); continue; }
    if(!inRaw) continue;
    if(/^---\s*$/.test(ln)){ flush(); continue; }
    const q=/^>\s?(.*)/.exec(ln); if(q){ flush(); cur={ label:q[1].trim(), body:[] }; continue; }
    if(cur && ln.trim()) cur.body.push(ln.trim());
  }
  flush(); return out;
}
function statusToCol(status, section){ const s=(status||'').toLowerCase();
  if(/promoted/.test(s)) return 'Promoted'; if(/candidate/.test(s)) return 'Candidate'; if(/draft/.test(s)) return 'Draft';
  if(/ready for promotion/i.test(section)) return 'Ready'; if(/raw dump/i.test(section)) return 'Raw'; return 'Draft'; }

/* ---- open threads in the domains ---- */
function findOpenThreads(text, file){
  const lines=text.split('\n'); const out=[]; let heading='';
  for(let i=0;i<lines.length;i++){ const ln=lines[i];
    const hm=/^#{1,4}\s+(.*)/.exec(ln); if(hm){ heading=hm[1].trim(); continue; }
    const mm=THREAD_RE.exec(ln.trim()); if(!mm) continue;
    const body=[mm[2]]; let j=i+1;
    while(j<lines.length && lines[j].trim() && !/^#{1,4}\s/.test(lines[j]) && !/^---\s*$/.test(lines[j]) && !THREAD_RE.test(lines[j].trim())){ body.push(lines[j].trim()); j++; }
    out.push({ file, line:i+1, type:mm[1], heading, text:body.join(' ').replace(/\s+/g,' ').trim() }); i=j-1; }
  return out;
}
function openThreadHandoff(t){
  return [
    `# Open canon question — ${t.file.replace('domains/','')}${t.heading? ' › '+t.heading:''}`, '',
    `I'm building the Godling Universe. Below is an **[${t.type}]** thread I left unaudited in my canon — a question I haven't resolved yet. Help me work it out.`, '',
    '## The open question', '', '> '+(t.text||'(see the file section — the marker had no inline text)'), '',
    '## Ground rules for any answer', '',
    '- Must not contradict already-promoted canon.',
    '- Must have clear limits (say what it does NOT cover).',
    '- Must be useful to story, setting, or game.',
    '- Should not make existing canon pointless.', '',
    '## What I want back', '',
    '- 2–3 concrete options, with the trade-offs of each.',
    '- A recommendation.',
    '- One declarative **Canon Claim** sentence I could promote as-is.', '',

  ].join('\n');
}
function threadToCard(t){ return { tag:tagFromCategory(t.file), title:(t.heading||t.text||'Open thread').slice(0,60), category:t.file,
  source:'Resolving an open thread in '+t.file, claim:'', means:'', donot:'',
  notes:'From a ['+t.type+'] thread at '+t.file.replace('domains/','')+':'+t.line+(t.text? ' — '+t.text:'') }; }

/* ---- promotion builders (used by promoteCardModal) ---- */
function getQueueCard(text, id){
  const lines=text.split('\n');
  let s=-1; for(let i=0;i<lines.length;i++){ if(new RegExp('^##\\s+'+id+'\\b').test(lines[i])){ s=i; break; } }
  if(s<0) return null;
  let e=lines.length; for(let i=s+1;i<lines.length;i++){ if(/^#{1,2}\s/.test(lines[i])){ e=i; break; } }   // card ends at next # / ## heading (### subsections stay in)
  const block=lines.slice(s,e);
  const title=((/^##\s+(.*)/.exec(lines[s])||[])[1]||id).trim();
  const desc=title.replace(/^[A-Z]{3}-\d{3}\s*[—-]\s*/,'');
  const oneLine=re=>{ const l=block.find(x=>re.test(x)); return l? l.replace(re,'').trim() : ''; };
  const sect=name=>{ const i=block.findIndex(l=>new RegExp('^###\\s+'+name,'i').test(l)); if(i<0) return [];
    const out=[]; for(let j=i+1;j<block.length;j++){ if(/^#{1,3}\s/.test(block[j]) || /^---\s*$/.test(block[j])) break; if(block[j].trim()) out.push(block[j].trim()); } return out; };
  const stripBullet=x=>x.replace(/^[-*]\s*/,'');
  const promotedLine=block.find(x=>/PROMOTED\s*[—-]/i.test(x))||'';
  const promotedFile=(/domains\/[0-9A-Za-z_]+\.md/.exec(promotedLine)||[])[0]||'';
  const promotedDate=(/\b\d{4}-\d{2}-\d{2}\b/.exec(promotedLine)||[])[0]||'';
  const source=oneLine(/^\*\*Source:\*\*\s*/), category=oneLine(/^\*\*Category:\*\*\s*/);
  const status=oneLine(/^\*\*Status:\*\*\s*/) || (promotedLine?'PROMOTED':'');
  const requirements=sect('Promotion Requirements').map(x=>{
    const m=/^[-*]\s*\[([ xX])\]\s*(.*)/.exec(x);
    return m ? {text:m[2].trim(), checked:m[1].toLowerCase()==='x'} : {text:stripBullet(x).trim(), checked:false};
  }).filter(x=>x.text);
  const destFile=(/domains\/[0-9A-Za-z_]+\.md/.exec(category)||[])[0]||promotedFile;
  return { id, title, desc, status, source, category, destFile, s, e,
    promoted:!!promotedLine, promotedFile, promotedDate,
    claim:sect('Canon Claim').join(' '),
    means:sect('What This Means').map(stripBullet),
    donot:sect('Do Not Contradict').map(stripBullet),
    flags:sect('Open Flags').map(stripBullet),
    requirements,
    reqs:requirements.map(x=>x.text),
    notes:sect('Notes').map(stripBullet) };
}
function buildDomainBlock(card, date){
  const L=['---','', '## '+card.title, '', card.claim||'[canon claim]'];
  if(card.means.length){ L.push('', '**What this means**', '', ...card.means.map(x=>'- '+x)); }
  if(card.donot.length){ L.push('', '**Do not contradict**', '', ...card.donot.map(x=>'- '+x)); }
  L.push('', '*Promoted from the Promotion Queue on '+date+' ('+card.id+').*');
  return L.join('\n');
}
function leanQueueMarker(card, destFile, date){ return ['## '+card.title, '', '**Status:** PROMOTED — '+card.id+' → '+destFile+' ('+date+')'].join('\n'); }
function promoteInQueue(text, id, destFile, date){
  const c=getQueueCard(text, id); if(!c) return text; const lines=text.split('\n');
  lines.splice(c.s, c.e-c.s, leanQueueMarker(c, destFile, date), '', '---', '');
  return lines.join('\n');
}
function markIndexPromoted(text, id, desc, destFile, date){
  const lines=text.split('\n'); const bullet='- '+id+' — '+desc+' → '+destFile+' (promoted '+date+')';
  for(let i=0;i<lines.length;i++){ if(new RegExp('^-\\s+'+id+'\\b').test(lines[i].trim())){ lines[i]=bullet; return lines.join('\n'); } }
  const tag=id.split('-')[0]; const si=lines.findIndex(l=>new RegExp('^##\\s+'+tag+'\\b').test(l)); if(si<0) return text;
  let end=lines.length, hi=-1; for(let i=si+1;i<lines.length;i++){ if(/^##\s/.test(lines[i])){ end=i; break; } if(/Highest assigned/.test(lines[i])) hi=i; }
  let np=-1; for(let i=si+1;i<end;i++){ if(/\(none promoted\)/.test(lines[i])){ np=i; break; } }
  if(np>=0) lines[np]=bullet; else lines.splice(hi>=0? hi+1 : si+1, 0, '', bullet);
  return lines.join('\n');
}

/* ---- queue <-> index consistency: catch ID drift before it bites the Drafter ---- */
function checkConsistency(queueText, indexText){
  const issues=[]; const ids=parseQueueCards(queueText).map(c=>cardId(c.title)).filter(Boolean);
  const seen={}; ids.forEach(x=>{ seen[x.id]=(seen[x.id]||0)+1; });
  Object.keys(seen).filter(k=>seen[k]>1).forEach(k=> issues.push({level:'warn', msg:`${k} appears ${seen[k]}× in the queue — duplicate card ID.`}));
  const reserved=new Set(indexReservedIds(indexText)); const queueSet=new Set(ids.map(x=>x.id));
  ids.forEach(x=>{ const hi=parseHighest(indexText, x.tag);
    if(x.num>hi) issues.push({level:'warn', msg:`${x.id} is in the queue but not reserved in the index (highest ${x.tag} is ${x.tag}-${pad3(hi)}). Bump the index, or the Drafter could mint ${x.id} again.`});
    else if(!reserved.has(x.id)) issues.push({level:'info', msg:`${x.id} is within the reserved range but isn’t listed under ${x.tag} in the index.`}); });
  reserved.forEach(id=>{ if(!queueSet.has(id)) issues.push({level:'info', msg:`${id} is reserved in the index but has no queue card (likely already promoted, or the card was retired).`}); });
  return issues;
}

/* ============================ Promote a card to canon ======================= *
   The guarded hand-off (per 00_CANON_HOME.md → Promotion Rules / Queue Hygiene):
   append the card's canon to the chosen domains/ file, mark the queue card
   PROMOTED and slim it to a lean marker, update the index bullet, and log a
   changelog line. Every write is sha-checked and the queue write is assertQueue-
   guarded. The pure builders it uses (getQueueCard/buildDomainBlock/promoteInQueue/
   markIndexPromoted) live in canon-parse.js.                                     */
function promoteCardModal(id){
  const cfg=ghCfg(); const date=new Date().toISOString().slice(0,10);
  const PRE={whiteSpace:'pre-wrap', background:'#fbf6ea', border:'1px solid var(--gold-soft)', borderRadius:'8px', padding:'9px 11px', fontSize:'12.5px', maxHeight:'190px', overflow:'auto', margin:'4px 0 10px'};
  openOverlay(close=>{
    const wrap=h('div',{class:'modal', style:{maxWidth:'720px'}}, h('h2',{class:'display'}, 'Promote '+id+' to canon'));
    const body=h('div',null, h('p',{class:'hint'},'Loading the card…')); wrap.append(body);
    (async()=>{ try{
      const q=await ghGetText(cfg, QUEUE_PATH); assertQueue(q.text);
      const card=getQueueCard(q.text, id); if(!card){ body.replaceChildren(h('p',{class:'hint'},'That card isn’t in the queue anymore.')); return; }
      const sel=h('select',null, ...DOMAIN_FILES.map(d=>h('option',{value:d.file}, d.file.replace('domains/','')))); if(card.destFile) sel.value=card.destFile;
      const statusNote = /candidate|ready/i.test(card.status)? null : h('div',{class:'warn'}, 'This card’s status is “'+(card.status||'—')+'”, not Candidate/Ready — the rules ask for Candidate first. You can still promote.');
      const reqWrap=h('div',null); const checks=[];
      (card.reqs.length? card.reqs : ['I’ve reviewed this card and it’s ready for canon']).forEach(req=>{ const cb=h('input',{type:'checkbox'}); checks.push(cb);
        reqWrap.append(h('label',{style:{display:'flex', gap:'8px', alignItems:'flex-start', margin:'4px 0', textTransform:'none', letterSpacing:'0', fontSize:'14px', color:'var(--ink-soft)'}}, cb, h('span',null,req))); });
      const prev=h('div',null), status=h('div',{class:'hint'});
      const btn=h('button',{class:'navbtn primary'}, 'Promote to canon'); btn.disabled=true;
      const sync=()=>{ btn.disabled=!checks.every(c=>c.checked); }; checks.forEach(c=>c.onchange=sync);
      async function buildPreview(){ prev.replaceChildren(h('p',{class:'hint'},'Building preview…'));
        const destFile=sel.value; let warn='';
        try{ const dom=await ghGetText(cfg, destFile); if(!dom) warn=' (not found — it would be created)'; }catch(e){ warn=' (couldn’t read it: '+e.message+')'; }
        prev.replaceChildren(
          h('p',{class:'kicker'}, 'Append to '+destFile.replace('domains/','')+warn),     h('pre',{style:PRE}, buildDomainBlock(card, date)),
          h('p',{class:'kicker'}, 'Queue — the card collapses to a lean marker'),          h('pre',{style:PRE}, leanQueueMarker(card, destFile, date)),
          h('p',{class:'kicker'}, 'Index — the '+id.split('-')[0]+' bullet becomes'),       h('pre',{style:PRE}, '- '+id+' — '+card.desc+' → '+destFile+' (promoted '+date+')'),
          h('p',{class:'hint'}, 'Also logs one line to legacy/99_CHANGELOG.md.'));
      }
      sel.onchange=buildPreview;
      body.replaceChildren(statusNote,
        h('label',null,'Destination domain file'), sel,
        h('label',{style:{marginTop:'10px'}},'Promotion requirements — tick all to enable'), reqWrap,
        h('label',{style:{marginTop:'10px'}},'Preview — exactly what will change'), prev, status,
        h('div',{class:'toolrow', style:{marginTop:'12px'}}, btn, h('button',{class:'navbtn', onclick:close}, 'Cancel')));
      sync(); buildPreview();
      btn.onclick=async()=>{ btn.disabled=true; status.textContent='Promoting…';
        try{
          const destFile=sel.value;
          // re-read the card fresh just before writing
          const qf=await ghGetText(cfg, QUEUE_PATH); assertQueue(qf.text);
          const c=getQueueCard(qf.text, id); if(!c) throw new Error('card no longer in the queue');
          if(!validCanonId(id)) throw new Error('that card id looks wrong ('+id+')');
          // each write is conflict-safe (re-reads + re-applies if the file moved) and guarded
          status.textContent='Writing canon…';
          await ghUpdate(cfg, destFile, dom=> (dom? dom.replace(/\s*$/,'')+'\n\n' : '# '+destFile.replace('domains/','')+'\n\n')+buildDomainBlock(c, date)+'\n', 'Promote '+id+' → '+destFile, {guard:assertDomain, create:true});
          await ghUpdate(cfg, INDEX_PATH, ix=>markIndexPromoted(ix, id, c.desc, destFile, date), 'Mark '+id+' promoted in the index', {guard:assertIndex});
          await ghUpdate(cfg, QUEUE_PATH, q=>promoteInQueue(q, id, destFile, date), 'Queue hygiene: '+id+' promoted', {guard:assertQueue});
          try{ await ghUpdate(cfg, 'legacy/99_CHANGELOG.md', cl=> cl.replace(/\s*$/,'')+'\n- '+date+' — PROMOTED '+id+' — '+c.desc+' → '+destFile+'.\n', 'Log '+id+' promotion'); }catch(e){}
          toast(id+' promoted to canon.'); close(); go('studio',{tab:'board'});
        }catch(e){ status.textContent='Failed: '+e.message; btn.disabled=false; } };
    }catch(e){ body.replaceChildren(h('p',{class:'hint'},'Error: '+e.message)); } })();
    return wrap;
  });
}

function escapeRegExp(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function trackerSection(text, headingRe){
  const lines=String(text||'').split('\n'); let start=-1;
  for(let i=0;i<lines.length;i++){ if(headingRe.test(lines[i].trim())){ start=i; break; } }
  if(start<0) return null;
  let end=lines.length;
  for(let i=start+1;i<lines.length;i++){

function parseGaugeNumber(raw, fallbackCurrent=100, fallbackMax=100){
  const nums=String(raw||'').match(/-?\d+(?:\.\d+)?/g)||[];
  let max=nums.length>1? Number(nums[1]) : Number(fallbackMax);
  if(!Number.isFinite(max) || max<=0) max=100;
  let current=nums.length? Number(nums[0]) : Number(fallbackCurrent);
  if(!Number.isFinite(current)) current=max;
  current=Math.max(0,Math.min(max,Math.round(current)));

}
function normalizeSurvivalState(state){
  const src=state||{}, out={ present:src.present!==false, conditions:[] };
  SURVIVAL_GAUGES.forEach(g=>{
    const v=(src.gauges&&src.gauges[g.key]!==undefined)?src.gauges[g.key]:src[g.key];
    if(typeof v==='number') out[g.key]=parseGaugeNumber(String(v),v,100);
    else if(v&&typeof v==='object') out[g.key]=parseGaugeNumber(`${v.current??100} / ${v.max??100}`,100,100);

  (src.conditions||[]).forEach(x=>{
    const clean=String(x||'').replace(/^[-*]\s*/,'').replace(/[\r\n|]+/g,' ').trim().slice(0,80);
    const key=clean.toLowerCase();
    if(clean && key!=='none' && !seen.has(key)){ seen.add(key); out.conditions.push(clean); }

}
function parseSurvival(text){
  const sec=trackerSection(text,/^##\s+(?:MORTAL\s+)?SURVIVAL(?:\s+STATE)?\b/i);
  const out=normalizeSurvivalState({present:!!sec,conditions:[]});
  if(!sec) return out;
  SURVIVAL_GAUGES.forEach(g=>{
    const m=new RegExp('^[\\-\\s]*'+escapeRegExp(g.label)+':\\s*(.+)$','mi').exec(sec.body);
    if(m) out[g.key]=parseGaugeNumber(m[1],100,100);
  });

  for(const ln of sec.body.split('\n')){
    if(/^Conditions:\s*$/i.test(ln.trim())){ inConditions=true; continue; }
    if(!inConditions) continue;
    const m=/^[-*]\s+(.+)$/.exec(ln.trim());
    if(m && !/^none\.?$/i.test(m[1].trim())) out.conditions.push(m[1].trim());

}
function formatSurvivalSection(state){
  const s=normalizeSurvivalState(state);
  const lines=[
    '## MORTAL SURVIVAL STATE', '',
    '(Reserves 0–100; higher is better. Specific wounds and hazards are named conditions.)',
  ];
  SURVIVAL_GAUGES.forEach(g=> lines.push(`- ${g.label}: ${s[g.key].current} / ${s[g.key].max}`));
  lines.push('', 'Conditions:');
  if(s.conditions.length) s.conditions.forEach(x=>lines.push('- '+x));

}
function updateSurvivalState(text,state){
  const t=assertTracker(String(text||''));
  const section=formatSurvivalSection(state);
  const existing=trackerSection(t,/^##\s+(?:MORTAL\s+)?SURVIVAL(?:\s+STATE)?\b/i);
  if(existing){
    return [...existing.lines.slice(0,existing.start), ...section.split('\n'), ...existing.lines.slice(existing.end)].join('\n');
  }
  const runtime=trackerSection(t,/^##\s+.*RUNTIME STATE\b/i);
  if(runtime){
    return [...runtime.lines.slice(0,runtime.end), '', ...section.split('\n'), '', ...runtime.lines.slice(runtime.end)].join('\n');
  }
  return t.replace(/\s*$/,'')+'\n\n---\n\n'+section+'\n';
}

// ---- runtime gauges (Personal Mana / Divine Mana / Divine Hunger / Strain) ----
// A SEPARATE layer from mortal survival — the magical/divine runtime state the tracker
// already records. Manual editing only: no automatic costs, regen, or 3d6 here.
const RUNTIME_GAUGES = [
  { key:'personalMana', label:'Personal Mana' },
  { key:'divineMana',   label:'Divine Mana' },
  { key:'divineHunger', label:'Divine Hunger' },
  { key:'strain',       label:'Strain' },
];
// Documented fallback maximum: the trackers and template state these gauges run 0–100
// ("Magical/divine gauges 0-100"), matching the survival reserves. Not a new canon rule —
// just the existing display convention, used only when a line omits its own max.
const RUNTIME_FALLBACK_MAX = 100;
const RUNTIME_HEADING_RE = /^##\s+.*RUNTIME STATE\b/im;

// One gauge's value text -> { current, max }. Reads only the leading value token (before
// any "(comment)"); tolerates "~50", "14 / 50", a bare "4", optional bullets/spaces.
// Preserves an explicit max, else falls back to RUNTIME_FALLBACK_MAX; clamps current to
// 0..max. Never throws on junk — worst case it reads as 0 / fallback.
function parseRuntimeGaugeValue(raw, fallbackMax){
  let fb = Math.round(Number(fallbackMax));
  if(!Number.isFinite(fb) || fb<=0) fb = RUNTIME_FALLBACK_MAX;
  const valuePart = String(raw==null?'':raw).split('(')[0];
  const nums = valuePart.match(/-?\d+(?:\.\d+)?/g) || [];
  let max = nums.length>1 ? Number(nums[1]) : fb;
  if(!Number.isFinite(max) || max<=0) max = fb;
  max = Math.round(max);
  let current = nums.length ? Number(nums[0]) : 0;
  if(!Number.isFinite(current)) current = 0;
  current = Math.max(0, Math.min(max, Math.round(current)));
  return { current, max };
}
function runtimeGaugeRaw(sectionBody, label){
  const m = new RegExp('^[ \\t]*[-*]?[ \\t]*'+escapeRegExp(label)+':[ \\t]*(.*)$','mi').exec(String(sectionBody||''));
  return m ? m[1] : null;
}
function parseRuntime(text){
  const sec = trackerSection(text, RUNTIME_HEADING_RE);
  const out = { present: !!sec };
  RUNTIME_GAUGES.forEach(g=>{
    const raw = sec ? runtimeGaugeRaw(sec.body, g.label) : null;
    const present = raw!=null && String(raw).trim()!=='';
    const v = parseRuntimeGaugeValue(present ? raw : '', RUNTIME_FALLBACK_MAX);
    out[g.key] = { current:v.current, max:v.max, present };
  });
  return out;
}
// Write guard: confirm the file really is a Campaign State Tracker with a runtime layer
// before writing back — three independent markers (heading, runtime section, a field).
function assertRuntimeTracker(text){
  const t = String(text==null?'':text);
  const heading = /Campaign State Tracker/i.test(t);
  const section = RUNTIME_HEADING_RE.test(t);
  const field = /^[ \t]*[-*]?[ \t]*(?:Personal Mana|Divine Mana|Divine Hunger|Strain)[ \t]*:/im.test(t);
  if(!(heading && section && field)) throw new Error('refusing to write — that file isn’t a campaign state tracker with a runtime state section');
  return t;
}
// Surgically update ONLY the four runtime gauge value tokens, in place, inside the runtime
// section. Preserves the label, bullet, spacing, and any trailing "(comment)" on the line,
// and every other line (scene, location, status, core/body, survival, notes, unknown
// fields). A gauge with no existing line is appended to the section so an edit is never
// silently lost — the section is otherwise left untouched.
function updateRuntimeState(text, gauges){
  const t = assertRuntimeTracker(text);
  const sec = trackerSection(t, RUNTIME_HEADING_RE);
  if(!sec) throw new Error('refusing to write — no runtime state section in the tracker');
  const lines = sec.lines.slice();
  const cr = /\r\n/.test(t) ? '\r' : '';   // preserve the file's line ending (CRLF trackers)
  let end = sec.end;
  RUNTIME_GAUGES.forEach(g=>{
    const src = gauges && gauges[g.key];
    if(src==null) return;                        // only touch gauges the caller actually provided
    const v = parseRuntimeGaugeValue((src.current==null?0:src.current)+' / '+(src.max==null?RUNTIME_FALLBACK_MAX:src.max), RUNTIME_FALLBACK_MAX);
    const labelRe = new RegExp('^([ \\t]*[-*]?[ \\t]*'+escapeRegExp(g.label)+':[ \\t]*)(.*)$','i');
    let done = false;
    for(let i=sec.start+1; i<end; i++){
      const eol = lines[i].endsWith('\r') ? '\r' : '';
      const m = labelRe.exec(eol ? lines[i].slice(0,-1) : lines[i]);
      if(m){
        const cm = m[2].match(/\s*\(.*$/);            // keep any trailing parenthetical note
        lines[i] = m[1] + v.current + ' / ' + v.max + (cm ? cm[0] : '') + eol;
        done = true; break;
      }
    }
    if(!done){ lines.splice(end, 0, '- '+g.label+': '+v.current+' / '+v.max+cr); end++; }
  });
  return lines.join('\n');
}

// ---- remaining tracker fields (everything except gauges + survival) -------
// Field values may wrap across several lines in older trackers. Each definition
// is scoped to its own section so similarly named prose elsewhere is untouched.
const TRACKER_DETAIL_FIELDS = [
  { key:'lastReconciled', label:'Last reconciled', writeLabel:'Last reconciled with domain files', line:/^(\s*Last reconciled with domain files:\s*)(.*)$/i, rows:2, group:'where' },

  { key:'summary', label:'Current summary', section:/^##\s+WHERE WE ARE\b/i, line:/^(\s*(?:>\s*Current|Current summary):\s*)(.*)$/i, rows:4, group:'where', quote:true },
  { key:'day', label:'In-world day', section:/^##\s+WHERE WE ARE\b/i, line:/^(\s*In-world day:\s*)(.*)$/i, rows:2, group:'where' },

  { key:'body', label:'Body', section:RUNTIME_HEADING_RE, line:/^(\s*Body:\s*)(.*)$/i, rows:4, group:'protagonist' },

const TRACKER_DETAIL_SECTIONS = [
  { key:'carries', label:'What the protagonist carries', heading:'## What The Protagonist Carries', section:/^##\s+WHAT\b.*\bCARRIES\b/i, rows:6 },
  { key:'capabilities', label:'Capabilities', heading:'## Capabilities', section:/^##\s+CAPABILITIES\b/i, rows:7 },
  { key:'knowledge', label:'Knowledge boundary', heading:'## Knowledge Boundary', section:/^##\s+(?:KNOWLEDGE BOUNDARY|WHAT\b.*\bKNOWS)\b/i, rows:8 },
  { key:'people', label:'People / bonds', heading:'## People / Bonds', section:/^##\s+(?:PEOPLE(?:\s*\/\s*BONDS)?|THE PEOPLE)\b/i, rows:7 },
  { key:'clocks', label:'Clocks / pressures', heading:'## Clocks / Pressures', section:/^##\s+(?:CLOCKS?\s*\/\s*PRESSURES|THE CLOCK)\b/i, rows:6 },
  { key:'sessionLog', label:'Session log', heading:'## Session Log', section:/^##\s+SESSION LOG\b/i, rows:7 },
  { key:'resumeChecklist', label:'Resume checklist', heading:'## Resume Checklist', section:/^##\s+RESUME CHECKLIST\b/i, rows:7 },

function trackerRootSection(text){
  const lines=String(text||'').split('\n');
  const end=lines.findIndex(line=>/^---\s*$/.test(line.trim()));
  return {lines,start:-1,end:end<0?lines.length:end};
}
function trackerFieldBlock(text,def){
  const scope=def.section?trackerSection(text,def.section):trackerRootSection(text);
  if(!scope) return null;
  for(let i=scope.start+1;i<scope.end;i++){
    const raw=scope.lines[i], clean=raw.endsWith('\r')?raw.slice(0,-1):raw;
    const match=def.line.exec(clean);
    if(!match) continue;
    let end=i+1;
    while(end<scope.end){
      const nextRaw=scope.lines[end], next=nextRaw.endsWith('\r')?nextRaw.slice(0,-1):nextRaw;
      if(!next.trim() || /^##\s+/.test(next.trim()) || /^---\s*$/.test(next.trim())) break;
      if(TRACKER_DETAIL_FIELDS.some(other=>other!==def && other.line.test(next))) break;
      end++;
    }
    const values=[match[2]];
    for(let j=i+1;j<end;j++){
      let continuation=scope.lines[j].replace(/\r$/,'');
      if(def.quote) continuation=continuation.replace(/^\s*>\s?/,'');
      else continuation=continuation.replace(/^ {2}/,'');
      values.push(continuation);
    }
    return {scope,start:i,end,prefix:match[1],value:values.join('\n').trim()};
  }
  return null;
}
function trackerDetailState(text){
  const state={fields:{},sections:{}};
  TRACKER_DETAIL_FIELDS.forEach(def=>{
    const block=trackerFieldBlock(text,def);
    state.fields[def.key]=block?block.value:'';
  });
  TRACKER_DETAIL_SECTIONS.forEach(def=>{
    const sec=trackerSection(text,def.section);
    state.sections[def.key]=sec?sec.body.replace(/\r/g,'').trim():'';
  });
  return state;
}
function trackerFieldOutput(def,prefix,value,cr){
  const parts=String(value==null?'':value).replace(/\r/g,'').split('\n');
  const first=parts.shift()||'';
  const lead=prefix.replace(/\s*$/,'')+(first?' ':'');
  const lines=[lead+first+cr], continuation=def.quote?'> ':'  ';
  parts.forEach(line=>lines.push(continuation+line+cr));
  return lines;
}
function updateTrackerDetailField(text,def,value){
  const lines=String(text||'').split('\n'), cr=/\r\n/.test(String(text||''))?'\r':'';
  const block=trackerFieldBlock(text,def);
  if(block){
    lines.splice(block.start,block.end-block.start,...trackerFieldOutput(def,block.prefix,value,cr));
    return lines.join('\n');
  }
  const scope=def.section?trackerSection(text,def.section):trackerRootSection(text);
  if(!scope) throw new Error('refusing to write — tracker section missing for '+def.label);
  let at=scope.end;
  while(at>scope.start+1 && !lines[at-1].trim()) at--;
  const label=def.quote?'> Current:':(def.writeLabel||def.label)+':';
  lines.splice(at,0,...trackerFieldOutput(def,label,value,cr),cr);
  return lines.join('\n');
}
function updateTrackerDetailSection(text,def,value){
  const source=String(text||''), cr=/\r\n/.test(source)?'\r':'';
  const body=String(value==null?'':value).replace(/\r/g,'').trim();
  const bodyLines=body?body.split('\n').map(line=>line+cr):[];
  const sec=trackerSection(source,def.section);
  if(sec){
    const lines=sec.lines.slice(), replacement=[cr,...bodyLines,cr];
    lines.splice(sec.start+1,sec.end-sec.start-1,...replacement);
    return lines.join('\n');
  }
  return source.replace(/\s*$/,'')+'\n\n---\n\n'+def.heading+'\n\n'+body+'\n';
}
function updateTrackerDetails(text,patch){
  let next=assertTracker(String(text||''));
  const fields=patch&&patch.fields||{}, sections=patch&&patch.sections||{};
  TRACKER_DETAIL_FIELDS.forEach(def=>{
    if(Object.prototype.hasOwnProperty.call(fields,def.key)) next=updateTrackerDetailField(next,def,fields[def.key]);
  });
  TRACKER_DETAIL_SECTIONS.forEach(def=>{
    if(Object.prototype.hasOwnProperty.call(sections,def.key)) next=updateTrackerDetailSection(next,def,sections[def.key]);
  });

}
function parseTracker(text){
  const t=String(text||'');
  const gauge=name=>{ const m=new RegExp('^[\\-\\s]*'+name+':\\s*(.+)$','mi').exec(t); return m? m[1].trim() : ''; };
  const details=trackerDetailState(t), fields=details.fields;
  return {
    status: fields.status,
    scene: fields.scene,
    summary: fields.summary,
    day: fields.day,
    location: fields.location,
    runtime: {
      personalMana: gauge('Personal Mana'),
      divineMana: gauge('Divine Mana'),
      divineHunger: gauge('Divine Hunger'),
      strain: gauge('Strain'),
      core: fields.core,
      body: fields.body,
    },
    survival: parseSurvival(t),

}
// a campaign is "archived/closed" if its tracker status says so, else current
function trackerIsArchived(status){ return /\b(archiv|closed|complete|done|ended|retired)\b/i.test(String(status||'')); }

// ---- threads (the quest log): bucket open threads by status ----
const THREAD_BUCKETS = ['LIVE','WARMING','DISTANT','WAITING','BLOCKED','CLOSED'];
function parseThreads(text){
  const lines=String(text||'').split('\n'); const out={}; let cur=null;
  for(const ln of lines){
    const h=/^##\s+([A-Za-z]+)/.exec(ln.trim());
    if(h){ const key=h[1].toUpperCase(); if(THREAD_BUCKETS.includes(key)){ cur=key; out[cur]=out[cur]||[]; } else cur=null; continue; }
    if(!cur) continue;
    const s=ln.trim(); if(!s || /^\(none/i.test(s)) continue;
    out[cur].push(s.replace(/^[-*]\s+/,''));
  }
  return out;
}

// ---- ledger (append-only capture): GL-#### entries inside the ## ENTRIES code block ----
function ledgerEntriesBlock(text){
  const hi=String(text).search(/##\s+ENTRIES/i); if(hi<0) return null;
  const open=text.indexOf('```', hi); if(open<0) return null;
  const afterOpen=text.indexOf('\n', open)+1;
  const closeRel=text.slice(afterOpen).indexOf('```'); if(closeRel<0) return null;
  return { afterOpen, closeAbs: afterOpen+closeRel, inner:text.slice(afterOpen, afterOpen+closeRel) };
}
function parseLedger(text){
  const blk=ledgerEntriesBlock(text); const body=blk? blk.inner : '';
  const out=[]; let cur=null;
  const flush=()=>{ if(cur){ cur.body=cur.body.trim(); out.push(cur); cur=null; } };
  for(const ln of body.split('\n')){
    const h=/^GL-(\d{3,})\s*\|\s*([^|]*?)\s*\|\s*([^|]*?)\s*\|\s*(.*)$/.exec(ln.trim());
    if(h){ flush(); cur={ id:'GL-'+h[1], date:h[2].trim(), phase:h[3].trim().replace(/^\[|\]$/g,''), label:h[4].trim().replace(/^\[|\]$/g,''), body:'', status:'' }; continue; }
    if(!cur) continue;
    const st=/^Status:\s*(.+)$/i.exec(ln.trim()); if(st){ cur.status=st[1].trim(); continue; }
    if(ln.trim()) cur.body += (cur.body?' ':'')+ln.trim();
  }
  flush(); return out;
}
function ledgerNextId(entries){ let max=0; (entries||[]).forEach(e=>{ const n=parseInt(String(e.id).replace(/\D/g,''),10); if(n>max) max=n; }); return 'GL-'+String(max+1).padStart(4,'0'); }
function addLedgerEntry(text, entry){
  const blk=ledgerEntriesBlock(text); if(!blk) throw new Error('no ENTRIES code block in the ledger');
  const id=entry.id||'GL-0001';
  const block=`${id} | ${entry.date} | [${entry.phase||'session'}] | [${entry.label||'MOMENT'}]\n${String(entry.body||'').trim()}\nStatus: ${entry.status||'CAMPAIGN-ONLY'}`;
  const placeholder=/\(No entries|\(no entries|No entries yet/i.test(blk.inner);
  const inner = placeholder ? block+'\n' : blk.inner.replace(/\s*$/,'')+'\n\n'+block+'\n';
  return text.slice(0, blk.afterOpen) + inner + text.slice(blk.closeAbs);
}

// ---- threads write: add a thread line under a status bucket ----
function addThread(text, status, line){
  const lines=String(text).split('\n');
  const idx=lines.findIndex(l=> new RegExp('^##\\s+'+status+'\\b','i').test(l.trim()));
  if(idx<0) throw new Error('no '+status+' section in the threads file');
  let j=idx+1; while(j<lines.length && !lines[j].trim()) j++;
  if(j<lines.length && /^\(none/i.test(lines[j].trim())) lines[j]='- '+line;
  else lines.splice(idx+1, 0, '', '- '+line);
  return lines.join('\n');

function regionIsRecord(value){ return !!value && typeof value==='object' && !Array.isArray(value); }
