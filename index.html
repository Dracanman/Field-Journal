<style>
  /* ---------- design tokens (extracted from the printed kits) ---------- */
  :root{
    --paper:#faf4e6;          /* parchment background          */
    --paper-card:#fbf7ec;     /* keepsake card body            */
    --paper-slot:#f0e7d0;     /* field/slot fill               */
    --ink:#2e2a24;            /* titles, dark brown-charcoal   */
    --ink-soft:#4a463b;       /* body text                     */
    --gold:#b98e3c;           /* frame + section labels        */
    --gold-soft:#cdbf9a;      /* rules, faint lines            */
    --green:#3e6b4f;          /* sprigs, footers, emblem       */
    --slate:#3e4a6b;          /* filled-in example answers     */
    --hint:#9a8f7a;           /* italic hints / subtitles      */
    --shadow:60 52 30;
    --maxw:1080px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink-soft);
    font-family:'EB Garamond', Georgia, 'Times New Roman', serif;
    font-size:17px;
    line-height:1.5;
    -webkit-text-size-adjust:100%;
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3{ font-weight:600; color:var(--ink); margin:0; }
  ::selection{ background:#e7ddc2; }
  button{ font-family:inherit; cursor:pointer; }
  a{ color:var(--green); }

  /* serif-display fallback: EB Garamond loads if online; system serif otherwise */
  .display{ font-family:'EB Garamond', Georgia, serif; font-weight:600; letter-spacing:.01em; }
  .hand{ font-family:'Caveat', 'Segoe Script', cursive; }
  .kicker{ font-size:12px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold); }
  .hint{ color:var(--hint); font-style:italic; }

  /* ---------- app shell ---------- */
  #app{ max-width:var(--maxw); margin:0 auto; padding:24px 18px 96px; }
  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:12px; flex-wrap:nowrap;
    background:linear-gradient(var(--paper) 78%, transparent);
    padding:10px 4px 14px; margin:-8px -4px 8px;
  }
  /* one stable row that scrolls sideways if crowded — so toggling Cozy/Full never
     changes the bar's height and the page below it never jumps. */
  .navmid{ display:flex; flex-wrap:nowrap; align-items:center; gap:10px; flex:1 1 auto; min-width:0; overflow-x:auto; scrollbar-width:none; }
  .navmid::-webkit-scrollbar{ display:none; }
  .navmid .navbtn{ flex:0 0 auto; }
  /* utility cluster: mode toggle + the ⋯ More sheet — fixed on the right, always visible */
  .navutil{ display:flex; align-items:center; gap:10px; flex:0 0 auto; }
  .moremenu{ display:flex; flex-direction:column; gap:8px; }
  .moremenu .navbtn{ width:100%; }
  /* drop the wordmark when space is tight so the bar fits one line (logo still links home) */
  @media (max-width:1100px){ .brand b{ display:none; } }
  .brand{ display:flex; align-items:center; gap:10px; cursor:pointer; flex:0 0 auto; }
  .brand .mark{ width:30px; height:30px; color:var(--green); flex:0 0 auto; }
  .brand b{ font-family:'EB Garamond',serif; font-weight:600; color:var(--ink); font-size:18px; white-space:nowrap; }
  .navbtn{
    border:1.5px solid var(--gold-soft); background:#fff8; color:var(--ink-soft);
    border-radius:999px; padding:7px 15px; font-size:15px; white-space:nowrap;
  }
  .navbtn:hover{ border-color:var(--gold); }
  .navbtn.primary{ background:#eef0e4; border-color:#cdd4b9; color:#4d5a36; }

  /* ---------- decorative page frame ---------- */
  .framed{
    position:relative; background:var(--paper);
    border:1.5px solid var(--gold); border-radius:3px;
    padding:34px 30px 30px;
    box-shadow:0 0 0 4px var(--paper), 0 0 0 5.5px var(--gold-soft);
    margin:6px 4px 0;
  }
  .framed > .sprig{ position:absolute; width:34px; height:22px; color:var(--green); opacity:.9; }
  .sprig.tl{ top:10px; left:12px; }
  .sprig.tr{ top:10px; right:12px; transform:scaleX(-1); }
  .sprig.bl{ bottom:10px; left:12px; transform:scaleY(-1); }
  .sprig.br{ bottom:10px; right:12px; transform:scale(-1,-1); }
  .pagetitle{ text-align:center; margin-bottom:6px; }
  .pagetitle h2{ font-size:34px; }
  .divider{ display:flex; align-items:center; justify-content:center; gap:10px; margin:8px 0 4px; color:var(--gold); }
  .divider .rule{ width:70px; height:1px; background:var(--gold-soft); }
  .divider .o{ width:7px; height:7px; border:1.4px solid var(--gold); border-radius:50%; }
  .divider .dot{ width:5px; height:5px; background:var(--gold); border-radius:50%; }
  .subtitle{ text-align:center; color:var(--hint); font-style:italic; margin:2px 0 22px; }
  .pagefoot{ text-align:center; color:var(--green); font-style:italic; font-size:14px; margin-top:26px; opacity:.85; }

  /* ---------- home ---------- */
  .cover{ text-align:center; padding:30px 10px 24px; }
  .cover .emblem{ width:150px; height:150px; color:var(--green); margin:14px auto 18px; }
  .cover h1{ font-size:46px; }
  .cover .sub{ color:var(--gold); letter-spacing:.18em; text-transform:uppercase; font-size:13px; margin-top:8px; }
  .cover .tag{ color:var(--hint); font-style:italic; margin-top:16px; }
  .shelf{ margin-top:26px; }
  .shelf h3{ font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); border-bottom:1px solid var(--gold-soft); padding-bottom:8px; margin-bottom:16px; }
  .grid-cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }
  .pick{
    text-align:left; background:var(--paper-card); border:1.5px solid #e6dcc4; border-radius:10px;
    padding:15px 16px; min-height:104px; display:flex; flex-direction:column; gap:5px;
    min-width:0; overflow-wrap:anywhere; word-break:break-word;
    transition:transform .08s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .pick:hover{ transform:translateY(-2px); border-color:var(--gold); box-shadow:0 10px 22px -16px rgba(var(--shadow)/.5); }
  .pick .ribbon{ width:34px; height:5px; border-radius:3px; margin-bottom:3px; }
  .pick b{ color:var(--ink); font-size:18px; font-weight:600; overflow-wrap:anywhere; word-break:break-word; }
  .pick small{ color:var(--hint); font-style:italic; font-size:14px; line-height:1.35; overflow-wrap:anywhere; }

  /* ---------- worksheet editor ---------- */
  .editor-wrap{ display:grid; grid-template-columns:minmax(0,1fr) 446px; gap:40px; align-items:start; }
  @media (max-width:900px){ .editor-wrap{ grid-template-columns:1fr; } .card-col{ order:-1; } }
  .field{ margin-bottom:20px; }
  .field > label{ display:block; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
  .field .fhint{ color:var(--hint); font-style:italic; font-size:14px; margin-bottom:6px; }
  .field input, .field textarea{
    width:100%; border:none; border-bottom:1.5px solid var(--gold-soft); background:transparent;
    font-family:inherit; font-size:19px; color:var(--ink-soft); padding:4px 2px 8px; resize:none; line-height:1.5;
  }
  .field input:focus, .field textarea:focus{ outline:none; border-bottom-color:var(--green); }
  .field input::placeholder, .field textarea::placeholder{ color:#b6ad96; font-style:italic; }
  .chips{ display:flex; flex-wrap:wrap; gap:9px; }
  .chip{
    display:inline-flex; align-items:center; gap:7px; border:1.5px solid var(--gold-soft);
    background:#fbf8ef; color:#7a735f; border-radius:999px; padding:7px 14px 7px 11px; font-size:16px;
  }
  .chip .dot{ width:10px; height:10px; border-radius:50%; }
  .chip.active{ color:var(--ink-soft); }
  .toolrow{ display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }

  /* ---------- doodle ---------- */
  .doodle{ border:2px dashed var(--gold-soft); border-radius:6px; background:var(--paper-slot); padding:8px; }
  .doodle canvas{ display:block; width:100%; height:auto; border-radius:3px; background:#fffdf7; touch-action:none; cursor:crosshair; }
  .doodle .palette{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .swatch{ width:24px; height:24px; border-radius:50%; border:2px solid #0001; padding:0; }
  .swatch.sel{ outline:2px solid var(--ink); outline-offset:2px; }
  .toolbtn{ border:1.5px solid var(--gold-soft); background:#fff8; border-radius:8px; padding:5px 10px; font-size:14px; color:var(--ink-soft); }
  .doodle .ph{ text-align:center; color:var(--hint); font-style:italic; font-size:14px; padding:6px 0 2px; }

  /* ---------- keepsake card ---------- */
  .card-col{ display:flex; flex-direction:column; align-items:center; gap:14px; position:sticky; top:64px; }
  .keepsake{
    width:430px; max-width:100%; background:var(--paper-card);
    border:1px solid #e6dfca; border-radius:6px; overflow:hidden;
    box-shadow:0 1px 0 #fffdf6 inset, 0 18px 40px -22px rgba(var(--shadow)/.45), 0 2px 8px -4px rgba(var(--shadow)/.2);
  }
  .keepsake.tilt{ transform:rotate(-1deg); }
  .keepsake .ribbon{ height:7px; }
  .keepsake .body{ padding:24px 26px 26px; }
  .keepsake .head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; gap:10px; }
  .keepsake .head .kick{ font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:#a39a80; }
  .keepsake .head .word{ font-size:18px; }
  .keepsake .frame{ border:2px dashed var(--cardframe,#cdbf9a); border-radius:4px; padding:7px; background:var(--cardbg,#f6efde); margin-bottom:18px; }
  .keepsake .frame img{ display:block; width:100%; height:210px; object-fit:contain; border-radius:2px; }
  .keepsake .frame .empty{ height:160px; display:flex; align-items:center; justify-content:center; text-align:center; color:#b6ad96; font-style:italic; font-size:14px; padding:0 14px; }
  .keepsake h3.name{ font-size:34px; line-height:1.08; font-weight:600; margin-bottom:2px; }
  .keepsake .sub{ font-style:italic; color:var(--hint); font-size:16px; margin-bottom:14px; }
  .keepsake .rows{ border-top:1px solid #ece5d2; padding-top:14px; display:flex; flex-direction:column; gap:11px; }
  .keepsake .rw .rl{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#a39a80; margin-bottom:2px; }
  .keepsake .rw .rv{ font-size:16px; color:var(--ink-soft); line-height:1.4; }
  .keepsake .elt{ display:flex; align-items:center; gap:8px; }
  .keepsake .elt .dot{ width:9px; height:9px; border-radius:50%; }
  .keepsake .quote{ margin-top:16px; padding:13px 15px; background:var(--cardbg,#f6efde); border-left:3px solid var(--accent,#b98e3c); border-radius:2px; }
  .keepsake .quote .hand{ font-size:20px; line-height:1.35; color:#54503f; }
  .keepsake .cardfoot{ margin-top:16px; text-align:center; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#bcb39a; }

  /* ---------- ledger / grids / chart ---------- */
  .ledger{ width:100%; border-collapse:collapse; }
  .ledger th{ text-align:left; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); padding:6px 10px; font-weight:600; }
  .ledger td{ padding:5px 10px; }
  .ledger input{ width:100%; border:none; border-bottom:1.5px solid var(--gold-soft); background:transparent; font-family:inherit; font-size:18px; color:var(--ink-soft); padding:4px 2px; }
  .ledger input:focus{ outline:none; border-bottom-color:var(--green); }
  .ledger .locked input{ color:var(--slate); font-style:italic; }
  .ledger .open-flag{ font-size:13px; color:#b07a2e; }
  .specgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media (max-width:680px){ .specgrid{ grid-template-columns:repeat(2,1fr); } }
  .specslot{ background:var(--paper-slot); border:1.5px dashed var(--gold-soft); border-radius:8px; padding:10px; text-align:center; }
  .specslot .circle{ width:100%; aspect-ratio:1/1; border:1.5px solid var(--gold-soft); border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#fffdf7; }
  .specslot .circle img{ width:100%; height:100%; object-fit:cover; }
  .specslot .circle span{ color:#b6ad96; font-style:italic; font-size:12px; }
  .specslot label{ display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin:8px 0 4px; }
  .specslot input{ width:100%; border:none; border-bottom:1px solid var(--gold-soft); background:transparent; text-align:center; font-family:inherit; font-size:15px; color:var(--ink-soft); padding:2px; }
  .palette-grid{ display:flex; gap:12px; flex-wrap:wrap; }
  .palette-grid .pw{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .palette-grid input[type=color]{ width:46px; height:46px; border:1.5px solid var(--gold-soft); border-radius:8px; background:none; padding:2px; }
  .palette-grid input[type=text]{ width:74px; border:none; border-bottom:1px solid var(--gold-soft); background:transparent; text-align:center; font-family:inherit; font-size:13px; color:var(--ink-soft); }

  /* ---------- gallery ---------- */
  .gal-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .gal-card{ background:var(--paper-card); border:1px solid #e6dcc4; border-radius:8px; overflow:hidden; display:flex; flex-direction:column; }
  .gal-card .thumb{ height:130px; background:#f3ecda; display:flex; align-items:center; justify-content:center; border-bottom:1px solid #ece5d2; }
  .gal-card .thumb img{ width:100%; height:100%; object-fit:cover; }
  .gal-card .thumb .none{ color:#c3b89c; font-style:italic; font-size:13px; }
  .gal-card .meta{ padding:10px 12px; }
  .gal-card .meta b{ color:var(--ink); }
  .gal-card .meta small{ display:block; color:var(--hint); font-style:italic; }
  .gal-card .acts{ display:flex; gap:4px; padding:0 8px 10px; flex-wrap:wrap; }
  .gal-card .acts button{ font-size:13px; border:1px solid var(--gold-soft); background:#fff8; border-radius:6px; padding:4px 9px; color:var(--ink-soft); }
  .empty-note{ color:var(--hint); font-style:italic; padding:18px 2px; }
  .spark-row{ display:flex; gap:12px; align-items:flex-start; justify-content:space-between; background:var(--paper-card); border:1px solid #e6dcc4; border-radius:8px; padding:10px 13px; margin-bottom:8px; }
  .spark-text{ white-space:pre-wrap; color:var(--ink-soft); flex:1; }

  /* ---------- prose (tour) ---------- */
  .prose{ max-width:760px; margin:0 auto; }
  .prose h3{ font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin:22px 0 6px; }
  .prose p{ margin:0 0 12px; }
  .prose .layer{ border-left:3px solid var(--gold-soft); padding-left:14px; margin:8px 0; }
  .prose table{ border-collapse:collapse; margin:8px 0; }
  .prose td{ padding:3px 14px 3px 0; }
  .prose code{ background:#f0e7d0; padding:1px 6px; border-radius:4px; font-size:.92em; }

  /* ---------- modal ---------- */
  .modal-bg{ position:fixed; inset:0; background:#2e2a2466; display:flex; align-items:center; justify-content:center; padding:18px; z-index:60; }
  .modal{ background:var(--paper); border:1.5px solid var(--gold); border-radius:10px; max-width:620px; width:100%; max-height:88vh; overflow:auto; padding:24px 26px; box-shadow:0 30px 60px -20px #2e2a2480; }
  .modal h2{ font-size:24px; margin-bottom:6px; }
  .modal textarea{ width:100%; min-height:240px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; line-height:1.5; border:1px solid var(--gold-soft); border-radius:8px; padding:12px; background:#fffdf7; color:var(--ink-soft); }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--ink); color:#faf4e6; padding:11px 20px; border-radius:999px; font-size:15px; z-index:80; box-shadow:0 12px 30px -12px #2e2a24aa; }
  .toast-undo{ background:none; border:none; color:#e7c989; font:inherit; font-size:15px; margin-left:14px; padding:0; text-decoration:underline; cursor:pointer; }

  /* ---------- mode gating (Cozy / Full kit) ---------- */
  body.mode-simple .advanced-only{ display:none !important; }
  body.mode-full .simple-only{ display:none !important; }
  body.profile-maker .world-only{ display:none !important; }
  body.profile-world .maker-only{ display:none !important; }

  /* ---------- Naming Tree plate (scaled 1500x1480) ---------- */
  .plate-wrap{ width:100%; overflow:hidden; margin:0 auto; }
  .plate-inner{ width:1500px; transform-origin:top left; }
  .plate-stage{ position:relative; width:1500px; height:1480px; overflow:hidden; border-radius:6px; box-shadow:0 14px 40px -22px rgba(60,52,30,0.5); }

  /* ---------- Canon Studio (worldbuilder) ---------- */
  .studio-tabs{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:18px; }
  .studio-tabs .tab{ border:1.5px solid var(--gold-soft); background:#fff8; color:var(--ink-soft); border-radius:999px; padding:8px 16px; font-size:15px; }
  .studio-tabs .tab.on{ background:#efe7d3; border-color:var(--gold); color:var(--ink); font-weight:600; }
  .canon-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  .canon-list .pick small{ text-transform:none; letter-spacing:0; }
  .canon-doc{ background:#fffdf7; border:1px solid var(--gold-soft); border-radius:10px; padding:20px 22px; max-width:820px; margin:0 auto; box-sizing:border-box; overflow-wrap:anywhere; overflow-x:hidden; }
  .canon-doc h2, .canon-doc h4{ overflow-wrap:anywhere; }
  .canon-doc h2{ font-size:24px; margin:14px 0 6px; }
  .canon-doc h3{ font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin:16px 0 4px; overflow-wrap:anywhere; }
  .canon-doc p, .canon-doc li{ margin:0 0 10px; overflow-wrap:anywhere; }
  /* diagram/structured blocks: a self-contained scrollable box — keeps ASCII aligned and never spills the page (iOS pre-wrap is unreliable for wide lines) */
  .canon-doc pre{ background:#f0e7d0; border-radius:8px; padding:12px 14px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; line-height:1.5; white-space:pre; max-width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .canon-doc pre.raw{ white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; }   /* View raw = prose source: wrap it */
  .canon-doc code{ background:#f0e7d0; padding:1px 6px; border-radius:4px; overflow-wrap:anywhere; }
  .search-row{ display:flex; gap:10px; margin-bottom:16px; max-width:820px; margin-inline:auto; }
  .search-row input{ flex:1; min-width:0; border:1.5px solid var(--gold-soft); border-radius:999px; background:#fffdf7; padding:9px 16px; font-family:inherit; font-size:16px; color:var(--ink-soft); }
  .search-hit{ background:#fffdf7; border:1px solid var(--gold-soft); border-radius:8px; padding:10px 14px; margin-bottom:8px; max-width:820px; margin-inline:auto; box-sizing:border-box; overflow-wrap:anywhere; }
  .search-hit b{ color:var(--green); } .search-hit .ln{ color:var(--ink-soft); font-size:14px; overflow-wrap:anywhere; word-break:break-word; }
  .board{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
  .board .col{ background:#faf4e6; border:1px solid var(--gold-soft); border-radius:10px; padding:10px; }
  .board .col h4{ font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; text-align:center; }
  .board .pcard{ background:#fff8; border:1px solid #e6dcc4; border-radius:7px; padding:8px 10px; margin-bottom:7px; font-size:14px; }
  .board .pcard b{ color:var(--ink); display:block; }
  .board .pcard small{ color:var(--hint); }
  .drafter label{ display:block; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); margin:12px 0 4px; }
  .drafter input, .drafter textarea, .drafter select{ width:100%; border:1.5px solid var(--gold-soft); border-radius:8px; background:#fffdf7; padding:9px 11px; font-family:inherit; font-size:15px; color:var(--ink-soft); }
  .drafter textarea{ min-height:64px; resize:vertical; }
  .drafter .idline{ font-family:ui-monospace,monospace; color:var(--green); font-weight:600; }
  .drafter .preview{ background:#f0e7d0; border-radius:8px; padding:12px 14px; white-space:pre-wrap; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; line-height:1.5; max-height:320px; overflow:auto; }
  /* tags */
  .taginput{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .tagchip{ background:#eef0e4; border:1px solid #cdd4b9; border-radius:999px; padding:3px 10px; font-size:13px; color:#4d5a36; display:inline-flex; gap:6px; align-items:center; }
  .tagchip button{ border:none; background:none; color:#8a8268; font-size:14px; padding:0; line-height:1; }

  const e = document.createElement(tag);

    if (v == null || v === false) continue;
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'html') e.innerHTML = v;           // trusted static markup only

    else e.setAttribute(k, v);
  }
  for (const kid of kids.flat()){
    if (kid == null || kid === false) continue;
    e.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return e;

    req.onerror=()=>rej(req.error||new Error('indexedDB open failed'));
  });
}
function idbGet(key){ return idbOpen().then(db=>new Promise((res,rej)=>{ const r=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); })); }
function idbSet(key,val){ return idbOpen().then(db=>new Promise((res,rej)=>{ const t=db.transaction(IDB_STORE,'readwrite'); t.objectStore(IDB_STORE).put(val,key); t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); t.onabort=()=>rej(t.error||new Error('write aborted')); })); }

// the Naming Tree's seed state — Del's draft (maren/aeryn proposed; druun/thari locked canon)
function namingDefault(){ return {
  established: { Earth:'-druun', Wood:'-thari', Water:'-maren', Air:'-aeryn' },
  locked: ['-druun','-thari'],
  openRoots: ['-karin','-lunai','-sorin'],
  tweaks: { atmosphere:'Cloud-sea', awaitingPresence:'Stirring', ornament:'Illuminated plate' },
}; }
function defaults(){ return { creations:[], sparks:[], roots:{}, counters:{}, elements:[], expressions:[], github:null, mode:'simple', seenIntro:false, profile:'maker', profileChosen:false, syncOnOpen:false, naming:namingDefault() }; }
function hydrate(d){ const merged=Object.assign(defaults(), d); merged.naming=Object.assign(namingDefault(), d.naming||{}); return merged; }
function validState(s){ return !!s && typeof s==='object' && Array.isArray(s.creations); }   // shape check — corruption guard
function migrateFromLocal(){
  try{
    let d = JSON.parse(localStorage.getItem(KEY));
    if(!validState(d)){ d = JSON.parse(localStorage.getItem('vfj.v3')) || JSON.parse(localStorage.getItem('vfj.v2')) || JSON.parse(localStorage.getItem('vfj.v1')); }  // migrate v3/v2/v1
    if(validState(d)) return hydrate(d);
  }catch(e){}
  return null;
}
// Source of truth is IndexedDB (large quota). If it's empty or corrupt, recover from
// the localStorage mirror rather than silently handing back a blank journal.
async function loadState(){
  try{ const s=await idbGet(IDB_KEY); if(validState(s)){ return hydrate(s); } }catch(e){}
  const local=migrateFromLocal();
  if(local){ idbSet(IDB_KEY, local).catch(()=>{}); return local; }
  return defaults();
}
let DB = defaults();   // replaced by loadState() in init() before the first render
let _stateT=null;
function scheduleStateWrite(){ clearTimeout(_stateT); _stateT=setTimeout(flushState, 120); }
function flushState(){ clearTimeout(_stateT); idbSet(IDB_KEY, DB).catch(()=>{ toast('Could not save to storage.'); }); }
function saveLocal(){
  scheduleStateWrite();                                            // IndexedDB — the real store
  // best-effort recovery mirror; never let a momentarily-empty journal wipe a non-empty
  // backup (guards against a transient blank destroying the only local copy).
  try{ if((DB.creations&&DB.creations.length) || !localStorage.getItem(KEY)) localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){}
}
function save(){ saveLocal(); scheduleSync(); }                    // local + a (debounced, de-duped) repo sync

/* ---------- doodle component ---------------------------------------------- */
function Doodle(initial, placeholder){
  const W=900, H=680;
  const cv = h('canvas');
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr,dpr); ctx.lineCap='round'; ctx.lineJoin='round';
  let color='#4a463b', erasing=false, drawing=false, last=null;
  const undo=[];
  function snapshot(){ try{ undo.push(cv.toDataURL('image/png')); if(undo.length>14) undo.shift(); }catch(e){} }
  function loadDataURL(url){ const img=new Image(); img.onload=()=>{ ctx.clearRect(0,0,W,H); const r=Math.min(W/img.width,H/img.height); const w=img.width*r,hh=img.height*r; ctx.drawImage(img,(W-w)/2,(H-hh)/2,w,hh); }; img.src=url; }
  if (initial) loadDataURL(initial);
  function pos(e){ const r=cv.getBoundingClientRect(); return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height), p:e.pressure&&e.pressure>0?e.pressure:0.5 }; }
  cv.addEventListener('pointerdown', e=>{ e.preventDefault(); cv.setPointerCapture(e.pointerId); snapshot(); drawing=true; last=pos(e); dab(last); });
  cv.addEventListener('pointermove', e=>{ if(!drawing) return; e.preventDefault(); const p=pos(e); stroke(last,p); last=p; });
  function end(){ drawing=false; last=null; }
  cv.addEventListener('pointerup', end); cv.addEventListener('pointercancel', end); cv.addEventListener('pointerleave', end);
  function setBrush(p){ ctx.globalCompositeOperation = erasing?'destination-out':'source-over'; ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth = (erasing?22:2.2) + (p?.p?p.p*4:2); }
  function dab(p){ setBrush(p); ctx.beginPath(); ctx.arc(p.x,p.y, ctx.lineWidth/2, 0, Math.PI*2); ctx.fill(); }
  function stroke(a,b){ setBrush(b); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }

  const colors=['#4a463b','#3e6b4f','#b98e3c','#b3566a','#4a6b8a','#8a6bb0'];
  const palette = h('div',{class:'palette no-print'});
  const swatches = colors.map(c=>{
    const b=h('button',{class:'swatch'+(c===color?' sel':''), style:{background:c}, title:c, onclick:()=>{ color=c; erasing=false; refreshSel(); }});
    b.dataset.c=c; return b;
  });
  function refreshSel(){ swatches.forEach(s=> s.classList.toggle('sel', !erasing && s.dataset.c===color)); eraseBtn.classList.toggle('sel', erasing); }
  const eraseBtn = h('button',{class:'swatch', style:{background:'#fff', borderStyle:'dashed'}, title:'eraser', onclick:()=>{ erasing=true; refreshSel(); }}, '');
  const fileIn = h('input',{type:'file', accept:'image/*', style:{display:'none'}, onchange:e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{ snapshot(); loadDataURL(rd.result); }; rd.readAsDataURL(f); }});
  palette.append(...swatches, eraseBtn,
    h('button',{class:'toolbtn', onclick:()=>{ if(undo.length){ loadDataURL(undo.pop()); } }}, '↶ Undo'),
    h('button',{class:'toolbtn', onclick:()=>{ snapshot(); ctx.clearRect(0,0,W,H); }}, 'Clear'),
    h('button',{class:'toolbtn', onclick:()=>fileIn.click()}, '+ Photo'), fileIn,
  );

  const el = h('div',{class:'doodle'}, placeholder? h('div',{class:'ph no-print'},placeholder):null, cv, palette);
  function isBlank(){ const d=ctx.getImageData(0,0,cv.width,cv.height).data; for(let i=3;i<d.length;i+=4){ if(d[i]!==0) return false; } return true; }
  return { el, getData:()=> isBlank()? null : shrinkCanvasURL(cv, 1100, 'image/png') };
}

// Rebuildable card editor. `seedImage` lets "Show me the example" (and edit)
// re-open the same page pre-filled, without any router round-trip.
function buildCardEditor(w, existing, state, seedImage){
  const f = framed(w.title, w.subtitle, w.kit==='field'? 'The Vael Field Journal — go gently, go slow' : "The Worldmaker's Pages — the world is wider because you're in it");
  const wrap = h('div',{class:'editor-wrap'});
  const editor = h('div',{class:'editor-col no-print'});
  const cardCol = h('div',{class:'card-col'});

  const doodle = Doodle(seedImage, w.imageHint);
  let importedImage = existing? (existing.importedImage||null) : null;   // full-res photo / Procreate art
  let tags = existing? (existing.tags||[]).slice() : [];
  const currentImage = ()=> importedImage || doodle.getData();
  const previewSpec = (w.specimen && !existing)? (DB.counters[w.id]||0)+1 : (existing && existing.specimenNo);
  function repaint(){ cardCol.replaceChildren(keepsake(w, state, currentImage(), {specimenNo:previewSpec}), cardActions()); }

  w.fields.forEach(fld=>{
    if (fld.type==='element'){
      editor.append(h('div',{class:'field'},
        h('label',null,fld.label),
        fld.hint? h('div',{class:'fhint'}, fld.hint):null,
        elementPicker(state, repaint),
      ));
    } else if (fld.type==='choice'){
      editor.append(choiceField(fld, state, repaint));
    } else {
      const tag = fld.type==='long'? 'textarea':'input';
      const inp = h(tag,{ value: state[fld.key]||'', placeholder: fld.hint||'', rows: fld.type==='long'?2:null,
        oninput:e=>{ state[fld.key]=e.target.value; repaint(); } });
      editor.append(h('div',{class:'field'}, h('label',null,fld.label), inp));
    }
  });

  editor.append(h('div',{class:'field'}, h('label',null,'A doodle — draw with finger or Pencil'), doodle.el));
  doodle.el.addEventListener('pointerup', ()=> setTimeout(repaint,0));
  doodle.el.querySelector('.palette').addEventListener('click', ()=> setTimeout(repaint,30));

  // full-res import (a photo, or finished art from Procreate)
  const importPreview = h('div',null);
  const importIn = h('input',{type:'file', accept:'image/*', style:{display:'none'}, onchange:e=>{ const file=e.target.files[0]; if(!file) return; downscaleToDataURL(file, 1400, 0.82, url=>{ importedImage=url; paintImport(); repaint(); }); }});
  function paintImport(){
    importPreview.replaceChildren();
    if (importedImage){
      importPreview.append(
        h('img',{src:importedImage, style:{maxWidth:'190px', maxHeight:'150px', borderRadius:'6px', display:'block', marginBottom:'6px', border:'1px solid var(--gold-soft)'}}),
        h('button',{class:'toolbtn', onclick:()=>{ importedImage=null; paintImport(); repaint(); }}, 'Use my doodle instead'));
    }
  }
  paintImport();
  editor.append(h('div',{class:'field'},
    h('label',null,'Or add a finished picture'),
    h('div',{class:'fhint'},'a photo, or art painted in Procreate (kept full size)'),
    importPreview,
    h('button',{class:'navbtn', onclick:()=>importIn.click()}, 'Add a photo / Procreate art'), importIn));

  // tags (advanced) — for search/filter in the gallery
  const tagWrap=h('div',{class:'taginput'});
  function paintTags(){ tagWrap.replaceChildren(...tags.map((t,i)=> h('span',{class:'tagchip'}, '#'+t, h('button',{title:'remove', 'aria-label':'remove tag', onclick:()=>{ tags.splice(i,1); paintTags(); }}, '×'))),
    (function(){ const ti=h('input',{placeholder:'add a tag…', style:{border:'none',background:'transparent',fontFamily:'inherit',fontSize:'14px',minWidth:'90px'}, onkeydown:e=>{ if(e.key==='Enter'){ e.preventDefault(); const v=e.target.value.trim().toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/(^-|-$)/g,''); if(v&&!tags.includes(v)){ tags.push(v); paintTags(); } } }}); return ti; })()); }
  paintTags();
  editor.append(h('div',{class:'field advanced-only'}, h('label',null,'Tags'), h('div',{class:'fhint'},'press Enter after each — for searching later'), tagWrap));

  const tools = h('div',{class:'toolrow'});
  if (w.example) tools.append(h('button',{class:'navbtn', onclick:()=>{
    const rebuilt = buildCardEditor(w, existing, Object.assign({}, w.example), seedImage);
    $app.replaceChildren(topbar(), rebuilt); window.scrollTo(0,0);
  }}, 'Show me the example'));
  tools.append(h('button',{class:'navbtn primary', onclick:()=>{ saveCreation(w, state, doodle.getData(), existing, importedImage, tags); }}, existing?'Save changes':'Save to my journal'));
  tools.append(h('button',{class:'navbtn', onclick:()=>go('home')}, 'Start fresh'));
  editor.append(tools);

  function cardActions(){
    return h('div',{class:'toolrow no-print'},
      h('button',{class:'navbtn', onclick:()=>window.print()}, 'Print / Save PDF'),
      h('button',{class:'navbtn advanced-only', onclick:()=>sendToProcreate(w, state, currentImage(), {specimenNo:previewSpec})}, 'Save as image →'));
  }

  wrap.append(editor, cardCol);
  f.querySelector('.framed-body').append(wrap);
  repaint();
  return f;
}

// element picker: the 12 (+ her own); an optional expression "flavor" (advanced).
function elementPicker(state, repaint){

    return h('button',{class:'chip'+(on?' active':''), 'aria-pressed':on?'true':'false', style:{ borderColor:on?(e.accent||'var(--gold-soft)'):'var(--gold-soft)', background:on?deriveBg(e.accent||ACCENTS.gold):'#fbf8ef' },

  function paintEls(){ erow.replaceChildren(...allElements().map(elChip),
    h('button',{class:'chip dash advanced-only', onclick:()=>{ const n=prompt('Name your own element'); if(n&&n.trim()){ const key='c_'+uid(); (DB.elements=DB.elements||[]).push({key,label:n.trim(),accent:ACCENTS.gold,custom:true}); save(); state.element=key; paintEls(); repaint(); } }}, '+ add your own')); }
  paintEls();

  const xwrap = h('div',{class:'advanced-only', style:{marginTop:'12px'}}, h('div',{class:'fhint'}, 'their flavor — optional (same element, different skin)'));

    return h('button',{class:'chip'+(on?' active':''), 'aria-pressed':on?'true':'false', style:{ borderColor:on?'var(--green)':'var(--gold-soft)', background:on?'#eef0e4':'#fbf8ef' },
      onclick:()=>{ state.expression = on? '' : e.key; paintX(); repaint(); }}, e.label); }
  function paintX(){ xrow.replaceChildren(...allExpressions().map(xChip),
    h('button',{class:'chip dash', onclick:()=>{ const n=prompt('Name a flavor (an expression)'); if(n&&n.trim()){ const key='x_'+uid(); (DB.expressions=DB.expressions||[]).push({key,label:n.trim()}); save(); state.expression=key; paintX(); repaint(); } }}, '+ add a flavor')); }
  paintX();
  xwrap.append(xrow);

// choice field (e.g. Seed type): chips that reveal a per-option example prompt.
function choiceField(fld, state, repaint){
  const wrapc = h('div',{class:'field'+(fld.advanced?' advanced-only':'')}, h('label',null,fld.label));
  if (fld.note) wrapc.append(h('div',{class:'fhint'}, fld.note));
  const row = h('div',{class:'chips'});
  const hintEl = h('div',{class:'choice-hint'});
  function opts(){ const o=fld.options.slice(); const v=state[fld.key]; if(v && !o.some(x=>x.value===v)) o.push({value:v, prompt:''}); return o; }
  function promptFor(v){ const o=fld.options.find(x=>x.value===v); return o? o.prompt : (v? 'for example only — if this is '+v+', what would it do?' : ''); }
  function paint(){
    row.replaceChildren(...opts().map(o=>{ const on=state[fld.key]===o.value;
      return h('button',{class:'chip'+(on?' active':''), 'aria-pressed':on?'true':'false', style:{borderColor:on?'var(--gold)':'var(--gold-soft)', background:on?'#f4ecd6':'#fbf8ef'},
        onclick:()=>{ state[fld.key]= on? '' : o.value; paint(); hintEl.textContent=promptFor(state[fld.key]); repaint(); }}, o.value); }),
      h('button',{class:'chip dash', onclick:()=>{ const n=prompt('What kind of Seed?'); if(n&&n.trim()){ state[fld.key]=n.trim(); paint(); hintEl.textContent=promptFor(state[fld.key]); repaint(); } }}, '+ add your own'));
  }
  paint(); hintEl.textContent = promptFor(state[fld.key]);
  wrapc.append(row, hintEl);
  return wrapc;
}

/* ---------- keepsake card renderer ----------------------------------------- */
function keepsake(w, state, image, opts){
  opts = opts||{};
  const c = w.card || {};
  let accent = accentOf(w);
  const hasElement = w.fields && w.fields.some(f=>f.type==='element');
  if (hasElement && state.element) accent = elementAccentOf(state.element);
  const cardBg = deriveBg(accent), cardFrame = deriveFrame(accent);
  const nameVal = (state[c.name]||'').trim();
  const wordVal = c.word? (state[c.word]||'').trim():'';
  const quoteVal = (state[c.quote]||'').trim();
  const subVal = c.sub? (state[c.sub]||'').trim():'';

  const k = h('div',{class:'keepsake'+(opts.flat?'':' tilt'), style:{ '--accent':accent, '--cardbg':cardBg, '--cardframe':cardFrame }});
  k.append(h('div',{class:'ribbon', style:{background:accent}}));
  const body = h('div',{class:'body'});

  const kick = c.kicker || w.title;
  body.append(h('div',{class:'head'},
    h('div',{class:'kick'}, opts.specimenNo? `${kick} · no. ${opts.specimenNo}` : kick),
    wordVal? h('div',{class:'word hand', style:{color:accent}}, wordVal): h('span'),
  ));

  // image frame
  const frame = h('div',{class:'frame'});
  if (image) frame.append(h('img',{src:image, alt:''}));
  else frame.append(h('div',{class:'empty'}, w.imageHint||'a little drawing goes here'));
  body.append(frame);

  body.append(h('h3',{class:'name display'}, nameVal || placeholderName(w)));
  if (c.sub && subVal) body.append(h('div',{class:'sub'}, (c.subPrefix||'')+subVal));

  // remaining rows (skip name/sub/word/quote/element)
  const skip = new Set([c.name, c.sub, c.word, c.quote].filter(Boolean));
  const rows = h('div',{class:'rows'});
  let any=false;
  (w.fields||[]).forEach(fld=>{
    if (skip.has(fld.key)) return;
    if (fld.type==='element'){
      if (state.element){ any=true; const lbl=elementLabelOf(state.element)+(state.expression? ' · '+expressionLabelOf(state.expression):'');
        rows.append(h('div',{class:'rw elt'}, h('span',{class:'dot', style:{background:accent}}), h('span',{class:'rl', style:{margin:0}}, 'Element'), h('span',{class:'rv', style:{fontStyle:'italic'}}, lbl))); }
      return;
    }
    const v=(state[fld.key]||'').trim(); if(!v) return; any=true;
    rows.append(h('div',{class:'rw'}, h('div',{class:'rl'}, fld.cardLabel||fld.label), h('div',{class:'rv'}, v)));
  });
  if (any) body.append(rows);

  if (c.quote){
    body.append(h('div',{class:'quote'}, h('div',{class:'hand'}, quoteVal || quotePlaceholder(w))));
  }
  body.append(h('div',{class:'cardfoot'}, w.kit==='field'?'The Vael Field Journal':"The Worldmaker's Pages"));
  k.append(body);
  return k;
}
function placeholderName(w){
  return { portrait:'A New Vael', grove:'A New Grove', ourgrove:'Our Grove', sacred:'A Sacred Creature',
    people:'A New People', creature:'A New Creature', place:'A New Place', seed:'A New Seed',
    case:'An Open Case', folk:'A Vael' }[w.id] || 'Something New';
}
function quotePlaceholder(w){ return 'A small, true line goes here — only you know it yet.'; }

/* ---------- save / specimen numbering -------------------------------------- */
function saveCreation(w, state, image, existing, importedImage, tags){
  const named = (state[(w.card&&w.card.name)] || state.name || state.called || state.title || '').trim();
  if (existing){
    existing.fields = Object.assign({}, state);
    existing.image = image; existing.importedImage = importedImage||null; existing.tags = tags||[]; existing.updatedAt = Date.now();
    save(); toast('Saved.'); go('gallery'); return;
  }
  const rec = { id:uid(), worksheetId:w.id, kit:w.kit, fields:Object.assign({},state), image, importedImage:importedImage||null, tags:tags||[], createdAt:Date.now(), updatedAt:Date.now() };
  if (w.specimen) rec.specimenNo = nextSpecimen(w.id);
  DB.creations.push(rec); save();
  toast(named? `“${named}” is real now.` : 'Saved to your journal.');
  go('gallery');
}

// journal, and surfaces in the Worldbuilder's Studio Inbox as raw ideas to card.
function viewSparks(){
  const f = framed('Ideas & Sparks', 'jot any little spark — no need to finish a thought', 'Little sparks become whole worlds. Keep them all.');
  const body=f.querySelector('.framed-body');

    style:{width:'100%',border:'1.5px solid var(--gold-soft)',borderRadius:'8px',padding:'10px',fontFamily:'inherit',fontSize:'17px',background:'#fffdf7',color:'var(--ink-soft)'}});
  function add(){ const t=ta.value.trim(); if(!t) return; (DB.sparks=DB.sparks||[]).push({id:uid(), text:t, at:Date.now()}); ta.value=''; save(); paint(); ta.focus(); }
  ta.addEventListener('keydown', e=>{ if(e.key==='Enter' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); add(); } });
  body.append(h('div',{class:'field', style:{maxWidth:'640px',margin:'0 auto 6px'}},
    h('label',null,'A new spark'), ta,

  const listHost=h('div',{style:{maxWidth:'640px',margin:'0 auto'}}); body.append(listHost);
  function paint(){
    const items=(DB.sparks||[]).slice().reverse();
    if(!items.length){ listHost.replaceChildren(h('p',{class:'empty-note', style:{textAlign:'center'}},'No sparks yet — drop the next little idea here, however small.')); return; }

        undoToast('Spark removed.', ()=>{ (DB.sparks=DB.sparks||[]).push(s); DB.sparks.sort((a,b)=>(a.at||0)-(b.at||0)); save(); paint(); }); }}, 'remove'))));
    listHost.replaceChildren(h('div',{class:'kicker', style:{margin:'14px 0 8px'}}, items.length+' spark'+(items.length===1?'':'s')), wrap);

}

function viewGallery(){
  const wrap = h('div',null);
  wrap.append(h('div',{class:'cover', style:{padding:'10px 0 6px'}},
    h('h1',{class:'display', style:{fontSize:'34px'}}, DB.profile==='worldbuilder'?'My Journal':'My Field Journal'),

  wrap.append(backupRow());
  if (!DB.creations.length){
    wrap.append(h('div',{class:'empty-note'},'Nothing yet — and that’s alright. Pick a page from the home shelf and make a little something. (Already have a backup from another device? Restore it above.)'));
    return wrap;
  }
  const state={ q:'', kit:'', tag:'' };
  const allTags=[...new Set(DB.creations.flatMap(c=>c.tags||[]))].sort();
  const qIn=h('input',{placeholder:'search…', oninput:e=>{ state.q=e.target.value.toLowerCase(); paint(); }});
  const kitSel=h('select',{onchange:e=>{ state.kit=e.target.value; paint(); }}, h('option',{value:''},'all kits'), h('option',{value:'field'},'Field Journal'), h('option',{value:'world'},"Worldmaker's"));
  const row=h('div',{class:'filter-row'}, qIn, kitSel);
  if(allTags.length) row.append(h('select',{onchange:e=>{ state.tag=e.target.value; paint(); }}, h('option',{value:''},'all tags'), ...allTags.map(t=>h('option',{value:t},'#'+t))));
  row.append(h('button',{class:'navbtn advanced-only', onclick:()=>exportBook()}, '📖 Make a book (PDF)'));
  wrap.append(row);
  const host=h('div',null); wrap.append(host);
  function match(c){
    if(state.kit && c.kit!==state.kit) return false;
    if(state.tag && !(c.tags||[]).includes(state.tag)) return false;
    if(state.q){ const hay=(creationTitle(c)+' '+JSON.stringify(c.fields||{})+' '+((c.tags||[]).join(' '))).toLowerCase(); if(!hay.includes(state.q)) return false; }
    return true;
  }
  function paint(){
    host.replaceChildren(); let any=false;
    ['field','world'].forEach(kit=>{
      const items=DB.creations.filter(c=>c.kit===kit && match(c)).reverse(); if(!items.length) return; any=true;
      const s=h('div',{class:'shelf'}, h('h3',null, kit==='field'? 'The Field Journal':"The Worldmaker's Pages"));
      const g=h('div',{class:'gal-grid'}); items.forEach(c=> g.append(galCard(c))); s.append(g); host.append(s);
    });
    if(!any) host.append(h('div',{class:'empty-note'},'Nothing matches that.'));
  }
  paint();
  return wrap;
}
function exportBook(){
  let stage=document.getElementById('book-stage');
  if(!stage){ stage=h('div',{id:'book-stage', class:'book-stage'}); document.body.append(stage); }
  stage.replaceChildren();
  const name=(DB.github&&DB.github.displayName)||'';
  stage.append(h('div',{class:'book-cover'}, svgUse('ic-seedling','emblem'),
    h('h1',{class:'display'}, (name? name+'’s ':'')+'Field Journal'),
    h('div',{class:'hint'},'a corner of the Godling Universe — same trunk, different branches')));
  let pages=0;
  DB.creations.forEach(c=>{ const w=WS[c.worksheetId]; if(!w||!w.card) return; pages++;
    stage.append(h('div',{class:'book-page'}, keepsake(w, c.fields||{}, creationThumb(c), {specimenNo:c.specimenNo, flat:true}))); });
  if(!pages){ toast('Nothing to put in the book yet.'); return; }
  document.body.classList.add('printing-book'); window.print();
  setTimeout(()=>document.body.classList.remove('printing-book'), 600);
}
function creationTitle(c){
  const w=WS[c.worksheetId];
  if (c.worksheetId==='specimens') return 'Seeds & Specimens';
  if (c.worksheetId==='warmth') return (c.fields&&c.fields.what)||'A Warmth-Keeper piece';
  const f=c.fields||{};
  if (!w || !w.card) return (f.name||f.called||f.title||'Untitled').trim()||'Untitled';
  return (f[w.card.name]||f.name||f.called||f.title||'Untitled').trim()||'Untitled';
}
function creationThumb(c){
  if (c.importedImage) return c.importedImage;
  if (c.image) return c.image;
  if (c.slots){ const s=c.slots.find(x=>x.image); return s?s.image:null; }
  return null;
}
function galCard(c){
  const w=WS[c.worksheetId] || {title:'(unknown page)', fields:[]};
  const thumb=creationThumb(c);
  const card=h('div',{class:'gal-card'},
    h('div',{class:'thumb'}, thumb? h('img',{src:thumb, alt:''}) : h('span',{class:'none'}, w.title)),
    h('div',{class:'meta'}, h('b',null, creationTitle(c)), h('small',null, w.title + (c.specimenNo? ` · no. ${c.specimenNo}`:''))),
    h('div',{class:'acts'},
      h('button',{onclick:()=>openCreation(c)}, 'Open'),
      h('button',{onclick:()=>{ const copy=JSON.parse(JSON.stringify(c)); copy.id=uid(); copy.createdAt=copy.updatedAt=Date.now(); if(w.specimen) copy.specimenNo=nextSpecimen(w.id); DB.creations.push(copy); save(); render(); }}, 'Duplicate'),
      (w.card? h('button',{class:'advanced-only', onclick:()=>sendToProcreate(w, c.fields||{}, creationThumb(c), {specimenNo:c.specimenNo})}, 'Save as image'):null),
      (w.card? h('button',{class:'advanced-only', onclick:()=>shareCreation(c)}, 'Weave into the world →'):null),
      h('button',{onclick:()=>{ const idx=DB.creations.indexOf(c); if(idx<0) return; DB.creations.splice(idx,1); save(); render();
        undoToast('Removed “'+creationTitle(c)+'.”', ()=>{ DB.creations.splice(Math.min(idx,DB.creations.length),0,c); save(); render(); }); }}, 'Remove'),
    ),
  );
  return card;
}
function openCreation(c){
  if (c.worksheetId==='specimens'){ go('worksheet',{id:'specimens', editId:c.id}); return; }
  if (c.worksheetId==='warmth'){ go('worksheet',{id:'warmth', editId:c.id}); return; }
  go('worksheet',{id:c.worksheetId, editId:c.id});
}

  creature:'domains/50_ARKBORNE_AND_SEEDS.md', place:'domains/10_COSMOLOGY.md', seed:'domains/50_ARKBORNE_AND_SEEDS.md',
  case:'(campaign / lore thread)' };
function shareCreation(c){
  const w=WS[c.worksheetId]; const f=c.fields||{};
  const title=creationTitle(c);
  const lines=[];
  lines.push(`## [new] — ${w.title}: ${title}`,'',
    '**Status:** Draft (made in the Vael Field Journal kit)',
    `**Source:** ${w.title} — made by hand in the kit, ${new Date(c.updatedAt||Date.now()).toISOString().slice(0,10)}`,
    `**Category:** ${DOMAIN_HINT[w.id]||'(Del to file)'}`,'',
    '### What was made','');
  w.fields.forEach(fld=>{
    if (fld.type==='element'){ if(f.element) lines.push(`- **Element:** ${elementLabelOf(f.element)}${f.expression? ' · '+expressionLabelOf(f.expression):''}`); return; }
    const v=(f[fld.key]||'').trim(); if(v) lines.push(`- **${fld.cardLabel||fld.label}:** ${v}`);
  });
  if (c.specimenNo) lines.push(`- **${w.specimen}** ${c.specimenNo}`);
  lines.push('', '### Note for canon',
    '> Player-made via the kit — **not canon until Del audits.** Forwarded as a Draft candidate only.');
  if (Object.values(DB.roots||{}).some(Boolean)){
    lines.push('> Name-root guesses (if any) are play-proposals for the five **deliberately OPEN** roots (-maren, -aeryn, -karin, -lunai, -sorin) — do not treat as assigned.');
  }
  const md=lines.join('\n');
  showModal('Weave it into the world', 'A clean Draft card for Del’s promotion queue (`02_PROMOTION_QUEUE.md`). Nothing is canon until he audits it — this is just a gentle hand-off.', md);
}
// Shared overlay: builds a scrim + inner node, closes on Escape and on scrim-click
// (unless dismissible:false), and returns focus to the opener. Returns a close fn.
function openOverlay(buildInner, opts){
  opts=opts||{};
  const prev=document.activeElement;
  const bg=h('div',{class:opts.cls||'modal-bg', role:'dialog', 'aria-modal':'true'});
  function close(){ if(bg._closed) return; bg._closed=true; document.removeEventListener('keydown', onKey); bg.remove(); try{ prev&&prev.focus&&prev.focus(); }catch(_){}; if(opts.onClose) opts.onClose(); }
  function onKey(e){ if(e.key==='Escape' && opts.dismissible!==false) close(); }
  if(opts.dismissible!==false) bg.addEventListener('click', e=>{ if(e.target===bg) close(); });
  bg.append(buildInner(close));
  document.addEventListener('keydown', onKey);
  document.body.append(bg);
  if(!opts.noAutofocus) setTimeout(()=>{ const f=bg.querySelector('button,[href],input,textarea,select,[tabindex]'); if(f) try{ f.focus(); }catch(_){} }, 0);
  return close;
}
function showModal(title, note, text){
  const ta=h('textarea',{readonly:true}, text);
  openOverlay(close=> h('div',{class:'modal'},
    h('h2',{class:'display'},title),
    h('p',{class:'hint'},note),
    ta,
    h('div',{class:'toolrow'},
      h('button',{class:'navbtn primary', onclick:()=>{ ta.select(); try{ document.execCommand('copy'); }catch(e){} navigator.clipboard&&navigator.clipboard.writeText(text); toast('Copied.'); }}, 'Copy'),
      h('button',{class:'navbtn', onclick:()=>{ const b=new Blob([text],{type:'text/markdown'}); const a=h('a',{href:URL.createObjectURL(b), download:'field-journal-card.md'}); document.body.append(a); a.click(); a.remove(); }}, 'Download .md'),
      h('button',{class:'navbtn', onclick:()=>close()}, 'Close'),
    )));
}
function showModalNode(title, note, node){
  return openOverlay(close=> h('div',{class:'modal'}, h('h2',{class:'display'},title), note?h('p',{class:'hint'},note):null, node));
}

/* ---------- toast ---------------------------------------------------------- */
let toastT=null;
function toast(msg){ const t=h('div',{class:'toast'},msg); document.querySelectorAll('.toast').forEach(x=>x.remove()); document.body.append(t); clearTimeout(toastT); toastT=setTimeout(()=>t.remove(),2600); }
// a toast with an Undo action — gives a gentle few seconds to take a delete back
function undoToast(msg, onUndo){
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  const t=h('div',{class:'toast'}, msg,
    h('button',{class:'toast-undo', onclick:()=>{ clearTimeout(toastT); t.remove(); onUndo(); }}, 'Undo'));
  document.body.append(t); clearTimeout(toastT); toastT=setTimeout(()=>t.remove(),5500);
}

function firstRun(){ if(!DB.profileChosen){ chooseProfile(); return; } showIntro(false); }

// A deliberate one-time pick — "whose space is this?" — so the Maker's journal and
// the Worldbuilder's canon studio are genuinely separate, not a one-tap toggle apart.
function chooseProfile(){
  openOverlay(close=>{
    function pick(p){
      DB.profile=p; DB.profileChosen=true; if(p==='worldbuilder') DB.mode='full';
      save(); applyMode(); close();
      if(p==='worldbuilder'){ go('studio'); toast('Welcome, Worldbuilder.'); }

      h('div',{class:'profile-pick'},
        h('button',{class:'navbtn ppick', onclick:()=>pick('maker')},
          h('b',null,'✿ The Maker'), h('small',null,'her journal — make Vael folk, places, creatures, and seeds')),
        h('button',{class:'navbtn ppick', onclick:()=>pick('worldbuilder')},
          h('b',null,'⚒ The Worldbuilder'), h('small',null,'the canon studio — browse, draft, and triage the world')),

/* ---------- Procreate: send a card out as an image ------------------------- */
let _probe;
function probeCtx(){ if(!_probe) _probe=document.createElement('canvas').getContext('2d'); return _probe; }
function safeColor(col, fb){ try{ const x=probeCtx(); x.fillStyle='#000000'; x.fillStyle=col; const got=x.fillStyle; return (got==='#000000' && String(col).toLowerCase()!=='#000000')? (fb||'#b98e3c') : col; }catch(e){ return fb||'#b98e3c'; } }
function loadImg(src){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>res(null); i.src=src; }); }
// downscale a canvas to a capped dimension and return a data URL (keeps the journal
// small so it stays well inside storage and syncs fast). PNG keeps transparency.
function shrinkCanvasURL(cv, maxDim, type, quality){
  const w=cv.width, hgt=cv.height, m=Math.max(w,hgt);
  if(m<=maxDim){ try{ return cv.toDataURL(type, quality); }catch(e){ return cv.toDataURL('image/png'); } }
  const s=maxDim/m, t=document.createElement('canvas'); t.width=Math.max(1,Math.round(w*s)); t.height=Math.max(1,Math.round(hgt*s));
  t.getContext('2d').drawImage(cv,0,0,t.width,t.height);
  try{ return t.toDataURL(type, quality); }catch(e){ return t.toDataURL('image/png'); }
}
function downscaleToDataURL(file, maxDim, quality, cb){
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=()=>{
    let{width:wd,height:ht}=img; const s=Math.min(1, maxDim/Math.max(wd,ht));
    if(s>=1){ cb(rd.result); return; }
    const cv=document.createElement('canvas'); cv.width=Math.round(wd*s); cv.height=Math.round(ht*s);
    const x=cv.getContext('2d'); x.drawImage(img,0,0,cv.width,cv.height);
    try{ cb(cv.toDataURL('image/jpeg', quality||0.85)); }catch(e){ cb(rd.result); }
  }; img.onerror=()=>cb(rd.result); img.src=rd.result; };
  rd.readAsDataURL(file);
}
function wrapLines(ctx, text, font, maxW){
  ctx.font=font; const words=String(text).split(/\s+/); const lines=[]; let line='';
  for(const wd of words){ const t=line? line+' '+wd : wd; if(ctx.measureText(t).width>maxW && line){ lines.push(line); line=wd; } else line=t; }
  if(line) lines.push(line); return lines;
}
async function renderCardCanvas(w, state, image, opts){
  opts=opts||{}; const c=w.card||{}; const W=920, M=58, cw=W-M*2;
  const accent=(w.fields&&w.fields.some(f=>f.type==='element')&&state.element)? elementAccentOf(state.element) : (ACCENTS[w.accent]||ACCENTS.gold);
  const aCol=safeColor(accent,'#b98e3c');
  const img=image? await loadImg(image) : null;
  const ctx0=probeCtx();
  // build blocks with measured heights
  const blocks=[];
  blocks.push({h:34, draw:(x,y)=>{ x.fillStyle='#a39a80'; x.font='600 19px Georgia,serif'; x.fillText(((c.kicker||w.title)+(opts.specimenNo?' · no. '+opts.specimenNo:'')).toUpperCase(), M, y+20); }});
  if(img){ const ih=360; blocks.push({h:ih+18, draw:(x,y)=>{ x.strokeStyle=safeColor(deriveFrame(accent),'#cdbf9a'); x.lineWidth=2; x.setLineDash&&x.setLineDash([6,5]); x.strokeRect(M,y,cw,ih); x.setLineDash&&x.setLineDash([]);
    const r=Math.min(cw/img.width,(ih-8)/img.height), iw=img.width*r, hh=img.height*r; x.drawImage(img, M+(cw-iw)/2, y+(ih-hh)/2, iw, hh); }}); }
  const nameLines=wrapLines(ctx0,(state[c.name]||'').trim()||placeholderName(w),'600 38px Georgia,serif',cw);
  blocks.push({h:nameLines.length*44+6, draw:(x,y)=>{ x.fillStyle='#2e2a24'; x.font='600 38px Georgia,serif'; nameLines.forEach((ln,i)=>x.fillText(ln,M,y+34+i*44)); }});
  const subV=c.sub?(state[c.sub]||'').trim():''; if(c.sub&&subV){ const sl=wrapLines(ctx0,(c.subPrefix||'')+subV,'italic 22px Georgia,serif',cw); blocks.push({h:sl.length*28+8, draw:(x,y)=>{ x.fillStyle='#9a8f7a'; x.font='italic 22px Georgia,serif'; sl.forEach((ln,i)=>x.fillText(ln,M,y+22+i*28)); }}); }
  const skip=new Set([c.name,c.sub,c.word,c.quote].filter(Boolean));
  (w.fields||[]).forEach(fld=>{ if(skip.has(fld.key))return; let label,val;
    if(fld.type==='element'){ if(!state.element)return; label='ELEMENT'; val=elementLabelOf(state.element)+(state.expression?' · '+expressionLabelOf(state.expression):''); }
    else { const v=(state[fld.key]||'').trim(); if(!v)return; label=(fld.cardLabel||fld.label).toUpperCase(); val=v; }
    const vl=wrapLines(ctx0,val,'20px Georgia,serif',cw);
    blocks.push({h:18+vl.length*26+10, draw:(x,y)=>{ x.fillStyle='#a39a80'; x.font='600 12px Georgia,serif'; x.fillText(label,M,y+12); x.fillStyle='#4a463b'; x.font='20px Georgia,serif'; vl.forEach((ln,i)=>x.fillText(ln,M,y+34+i*26)); }}); });
  const qV=c.quote?(state[c.quote]||'').trim():''; if(c.quote&&qV){ const ql=wrapLines(ctx0,qV,'italic 24px Georgia,serif',cw-30); blocks.push({h:ql.length*30+34, draw:(x,y)=>{ x.fillStyle=safeColor(deriveBg(accent),'#f6efde'); x.fillRect(M,y,cw,ql.length*30+26); x.fillStyle=aCol; x.fillRect(M,y,4,ql.length*30+26); x.fillStyle='#54503f'; x.font='italic 24px Georgia,serif'; ql.forEach((ln,i)=>x.fillText(ln,M+18,y+30+i*30)); }}); }
  // total height
  let total=M; blocks.forEach(b=>total+=b.h+10); total+=M;
  const dpr=2, cv=document.createElement('canvas'); cv.width=W*dpr; cv.height=total*dpr; const x=cv.getContext('2d'); x.scale(dpr,dpr);
  x.fillStyle='#fbf7ec'; x.fillRect(0,0,W,total);
  x.fillStyle=aCol; x.fillRect(0,0,W,12);
  let y=M; blocks.forEach(b=>{ b.draw(x,y); y+=b.h+10; });
  x.fillStyle='#bcb39a'; x.font='600 12px Georgia,serif'; x.fillText((w.kit==='field'?'THE VAEL FIELD JOURNAL':"THE WORLDMAKER'S PAGES"), M, total-22);
  return cv;
}
function sendToProcreate(w, state, image, opts){
  renderCardCanvas(w, state, image, opts).then(cv=>{
    cv.toBlob(blob=>{ if(!blob){ toast('Could not make the image.'); return; }
      const fname=(slug((state[(w.card&&w.card.name)])||w.title)||'card')+'.png';
      try{ if(navigator.canShare){ const file=new File([blob],fname,{type:'image/png'}); if(navigator.canShare({files:[file]})){ navigator.share({files:[file], title:w.title}).catch(()=>{}); return; } } }catch(e){}
      const a=h('a',{href:URL.createObjectURL(blob), download:fname}); document.body.append(a); a.click(); a.remove();
      toast('Saved an image — open it in Procreate or Photos.');
    }, 'image/png');
  }).catch(()=>toast('Could not make the image.'));
}

/* ---------- push to her own file in the repo (GitHub Contents API) --------- */
function ghCfg(){ return DB.github; }
function ghReady(){ const g=DB.github; return !!(g && g.token && g.owner && g.repo); }
function ghHeaders(token){ return { 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }
const ghSleep=ms=>new Promise(r=>setTimeout(r,ms));
// a friendly, typed error for a GitHub response status
function ghErr(status, body){
  const m = (status===401||status===403) ? 'GitHub rejected the token — check it’s valid with Contents: read & write.'
    : status===404 ? 'Not found on GitHub.'
    : (status===409||status===422) ? 'The file changed on the server since you loaded it.'
    : status===429 ? 'GitHub is rate-limiting — try again in a moment.'
    : status>=500 ? 'GitHub is having trouble (server error) — try again shortly.'
    : status ? ('GitHub error '+status) : 'Could not reach GitHub (check your connection).';
  const e=new Error(m + (body? ' '+String(body).replace(/\s+/g,' ').slice(0,120):'')); e.status=status||0; return e;
}
function isConflict(e){ return !!e && (e.status===409 || e.status===422); }
// fetch with retry/backoff on transient failures (network, 429, 5xx). Returns the
// Response (caller checks .ok for non-retryable statuses like 401/404/409); throws a
// typed ghErr only when transient retries are exhausted or the network is unreachable.
async function ghFetch(url, opts, tries){
  tries=tries||3; let last;
  for(let i=0;i<tries;i++){
    if(i) await ghSleep(400*Math.pow(2,i-1) + Math.floor(Math.random()*200));
    let r; try{ r=await fetch(url, opts); }catch(e){ last=ghErr(0); continue; }
    if(r.status===429 || r.status>=500){ last=ghErr(r.status); continue; }
    return r;
  }
  throw last || ghErr(0);
}
function ghUrl(cfg, path){ return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path.split('/').map(encodeURIComponent).join('/')}`; }
function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function ub64(b64str){ return decodeURIComponent(escape(atob(String(b64str||'').replace(/\s+/g,'')))); }   // base64 (GitHub wraps it at 60 cols) -> UTF-8 text
function slug(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||'field-journal'; }
function stemOf(cfg){ return cfg.displayName? slug(cfg.displayName) : 'field-journal'; }
async function ghTest(cfg){ const r=await ghFetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {headers:ghHeaders(cfg.token)}); if(!r.ok) throw ghErr(r.status); return r.json(); }
async function ghMeta(cfg, path){ const r=await ghFetch(ghUrl(cfg,path)+`?ref=${encodeURIComponent(cfg.branch)}`, {headers:ghHeaders(cfg.token)}); if(r.status===404) return null; if(!r.ok) throw ghErr(r.status, await r.text().catch(()=>'')); return r.json(); }
async function ghPut(cfg, path, content, message, sha){ const body={ message, content:b64(content), branch:cfg.branch }; if(sha) body.sha=sha;
  const r=await ghFetch(ghUrl(cfg,path), {method:'PUT', headers:ghHeaders(cfg.token), body:JSON.stringify(body)});
  if(!r.ok) throw ghErr(r.status, await r.text().catch(()=>'')); return r.json(); }
// conflict-safe transform write: read -> guard? -> transform(text) -> put; if the file
// changed underneath us (sha conflict), re-read and re-apply the transform on the fresh
// text. `transform` must be a pure function of the current text, so re-applying is safe.
async function ghUpdate(cfg, path, transform, message, opts){
  opts=opts||{};
  for(let attempt=0; attempt<3; attempt++){
    const r=await ghGetText(cfg, path);
    if(!r && !opts.create) throw new Error(path+' not found');
    const cur = r ? r.text : '';
    if(opts.guard) opts.guard(cur);
    const next = transform(cur);
    if(r && next===cur) return r;            // nothing to change
    try{ return await ghPut(cfg, path, next, message, r && r.sha); }
    catch(e){ if(isConflict(e) && attempt<2) continue; throw e; }
  }
}
// read a repo text file -> { text, sha } (or null if missing). Decodes the authenticated
// base64 the Contents API already returned — never the raw.githubusercontent CDN, which can
// serve a stale "404: Not Found" body for private/just-written files (that bogus body once
// got parsed as canon AND written back, clobbering the queue). Only files over the ~1MB
// inline limit (no inline content) fall back to download_url.
async function ghGetText(cfg, path){ const meta=await ghMeta(cfg, path); if(!meta) return null;
  let text;
  if(meta.encoding==='base64' && typeof meta.content==='string'){ text=ub64(meta.content); }
  else if(meta.download_url){ text=await (await fetch(meta.download_url)).text(); }
  else throw new Error('could not read '+path);
  text=text.replace(/^﻿/,'');   // strip a UTF-8 BOM if present
  return { text, sha:meta.sha }; }
// Only the *shareable* journal travels to the repo — never device-only flags
// (token, mode, profile, seenIntro, the GitHub config). That way toggling Cozy/Full,
// dismissing a dialog, or switching sides never makes a commit, and an unchanged
// journal produces an identical payload we can skip.
function syncPayload(){ return { creations:DB.creations||[], sparks:DB.sparks||[], roots:DB.roots||{}, counters:DB.counters||{}, elements:DB.elements||[], expressions:DB.expressions||[], naming:DB.naming||namingDefault() }; }
let syncTimer=null, syncing=false, _lastSyncedJSON=null;
function scheduleSync(){ if(!ghReady()) return; clearTimeout(syncTimer); syncTimer=setTimeout(()=>syncToRepo({silent:true}), 20000); }   // 20s debounce — coalesce bursts
async function syncToRepo(opts){ opts=opts||{}; if(!ghReady()){ if(!opts.silent) toast('Connect to GitHub first.'); return; } if(syncing) return;
  const payload = JSON.stringify(syncPayload(), null, 1);
  if(opts.silent && payload===_lastSyncedJSON) return;            // nothing actually changed — don't spam commits
  syncing=true;
  const cfg=ghCfg(); const base=(cfg.path||'kit/journal/').replace(/\/+$/,''); const stem=stemOf(cfg);
  try{
    const jsonPath=`${base}/${stem}.json`;
    // conflict-safe: if the file moved on the server (another device synced), fold that
    // remote journal into ours before writing, so a second device never erases the first.
    await ghUpdate(cfg, jsonPath, remote=>{ if(remote){ try{ mergeIncoming(JSON.parse(remote)); }catch(_){} } return JSON.stringify(syncPayload(), null, 1); }, `Update ${stem} journal`, {create:true});
    _lastSyncedJSON = JSON.stringify(syncPayload(), null, 1); saveLocal();   // capture any merged-in remote work
    // the human-readable .md only re-renders on an explicit save, so background syncs stay one commit
    if(!opts.silent){ const mdPath=`${base}/${stem}.md`; await ghUpdate(cfg, mdPath, ()=>renderJournalMarkdown(), `Update ${stem} journal (readable)`, {create:true}); }
    if(!opts.silent) toast('Saved to your file in the world.');
  }catch(e){ if(!opts.silent) toast('Sync failed: '+e.message); }
  finally{ syncing=false; }
}
function stripForBackup(db){ const d=Object.assign({}, db); if(d.github){ d.github=Object.assign({}, d.github); delete d.github.token; } return d; } // never write the token into the repo
// merge an incoming journal (from the repo or a backup file) into DB — additive only,
// never deletes: existing creations win, new ones are appended by id.
function mergeIncoming(inc){
  if(!inc || typeof inc!=='object') return;
  const have=new Set(DB.creations.map(c=>c.id)); (inc.creations||[]).forEach(c=>{ if(c && c.id && !have.has(c.id)) DB.creations.push(c); });
  DB.roots=Object.assign({}, inc.roots, DB.roots);
  DB.counters=Object.assign({}, inc.counters, DB.counters);
  DB.elements=mergeBy(DB.elements, inc.elements, 'key');
  DB.expressions=mergeBy(DB.expressions, inc.expressions, 'key');
  DB.sparks=mergeBy(DB.sparks||[], inc.sparks, 'id');
}
async function loadFromRepo(opts){ opts=opts||{}; if(!ghReady()){ if(!opts.silent) toast('Connect to GitHub first.'); return; }
  const cfg=ghCfg(); const base=(cfg.path||'kit/journal/').replace(/\/+$/,''); const stem=stemOf(cfg);
  try{ const r=await ghGetText(cfg, `${base}/${stem}.json`); if(!r){ if(!opts.silent) toast('No saved file found yet.'); return; }
    mergeIncoming(JSON.parse(r.text));
    saveLocal(); if(!opts.silent) toast('Loaded from your file.'); render();   // don't echo a sync back out
  }catch(e){ if(!opts.silent) toast('Load failed: '+e.message); }
}
function mergeBy(a,b,k){ a=a||[]; const seen=new Set(a.map(x=>x[k])); (b||[]).forEach(x=>{ if(!seen.has(x[k])) a.push(x); }); return a; }

/* ---------- local backup file (a safety net against data eviction) --------- */
// the journal travels with its images inline; the token is never written into a backup.
function exportBackup(){
  const data=JSON.stringify(stripForBackup(DB), null, 1);
  const b=new Blob([data],{type:'application/json'});
  const a=h('a',{href:URL.createObjectURL(b), download:'vael-journal-backup-'+new Date().toISOString().slice(0,10)+'.json'});
  document.body.append(a); a.click(); a.remove(); toast('Saved a backup file.');
}
function importBackupFile(file){
  const rd=new FileReader();
  rd.onload=()=>{ try{ const inc=JSON.parse(rd.result); if(!inc || !('creations' in inc)) throw 0; mergeIncoming(inc); save(); toast('Restored from your backup.'); render(); }
    catch(e){ toast('That file could not be read as a journal backup.'); } };
  rd.readAsText(file);
}
function pickBackupFile(){
  const fi=h('input',{type:'file', accept:'application/json,.json', style:{display:'none'}, onchange:e=>{ const f=e.target.files[0]; if(f) importBackupFile(f); }});
  document.body.append(fi); fi.click(); setTimeout(()=>fi.remove(), 0);
}
function renderJournalMarkdown(){
  const name=(DB.github&&DB.github.displayName)||''; const out=[`# ${name? name+'’s ':''}Field Journal`, '', '*Made in the Vael Field Journal kit — a corner of the Godling Universe.*', ''];
  ['field','world'].forEach(kit=>{ const items=DB.creations.filter(c=>c.kit===kit); if(!items.length) return;
    out.push(`## ${kit==='field'?'The Field Journal':"The Worldmaker's Pages"}`, ''); items.forEach(c=> out.push(...creationMarkdown(c))); });
  if((DB.sparks||[]).length){ out.push('## Sparks — raw ideas',''); DB.sparks.forEach(s=> out.push('- '+String(s.text||'').replace(/\s*\n\s*/g,' '))); out.push(''); }
  out.push('_Same trunk, different branches._'); return out.join('\n');
}
function creationMarkdown(c){
  const w=WS[c.worksheetId]||{title:'(unknown page)', fields:[]}, f=c.fields||{}; const L=[`### ${creationTitle(c)} — _${w.title}_`, ''];
  if(c.worksheetId==='specimens'){ (c.slots||[]).forEach(s=>{ if(s.caption||s.image) L.push(`- **${s.label}:** ${s.caption||'[picture]'}`); }); L.push(''); return L; }
  if(c.worksheetId==='warmth'){ ['what','who','fiber','palette'].forEach(k=>{ if(f[k]) L.push(`- **${k}:** ${f[k]}`); }); if(c.colors) L.push(`- **colorway:** ${c.colors.join(', ')}`); L.push(''); return L; }
  (w.fields||[]).forEach(fld=>{ if(fld.type==='element'){ if(f.element) L.push(`- **Element:** ${elementLabelOf(f.element)}${f.expression?' · '+expressionLabelOf(f.expression):''}`); return; } const v=(f[fld.key]||'').trim(); if(v) L.push(`- **${fld.cardLabel||fld.label}:** ${v}`); });
  if(c.specimenNo) L.push(`- **${w.specimen}** ${c.specimenNo}`);
  if(c.image||c.importedImage) L.push('- _[has a drawing]_');
  L.push(''); return L;
}

/* ========================================================================== *
   THE VAEL NAMING TREE — an illustrated plate (ported faithfully from the
   Claude-Design artifact in kit/source/naming-tree/, vanilla, no DCLogic).
   Trunk = Vaelrith; 12 element branches; lineage-suffix chips; crown buds.
   Maker sees a read-only plate + tweaks; Worldbuilder can assign suffix<->element
   (druun/thari locked canon; maren/aeryn & co. shown as DRAFT) and draft a Canon Card.
 * ========================================================================== */
const NT_LEVELS = [
  { y:880, left:'Earth', right:'Wood' }, { y:770, left:'Water', right:'Air' },
  { y:662, left:'Fire', right:'Ice' },   { y:556, left:'Light', right:'Shadow' },
  { y:454, left:'Metal', right:'Lightning' }, { y:360, left:'Crystal', right:'Life' },
];
const NT_ED = {
  Earth:{dark:'#574433',light:'#80664a',fol:'stone',orig:true}, Wood:{dark:'#566c3c',light:'#84995b',fol:'leaf',orig:true},
  Water:{dark:'#4f7390',light:'#7ea2b9',fol:'drop',orig:true},  Air:{dark:'#7f8d95',light:'#b6c1c8',fol:'wisp',orig:true},
  Fire:{dark:'#a85f3e',light:'#c6855c',fol:'ember'}, Ice:{dark:'#6f99a1',light:'#a6c6cc',fol:'drop'},
  Light:{dark:'#bb9f49',light:'#dcc578',fol:'ember'}, Shadow:{dark:'#5e576b',light:'#837c8d',fol:'leaf'},
  Metal:{dark:'#7c848d',light:'#a7adb4',fol:'wisp'}, Lightning:{dark:'#a98f32',light:'#d0b755',fol:'wisp'},
  Crystal:{dark:'#8b83a0',light:'#b3abc6',fol:'drop'}, Life:{dark:'#6f9356',light:'#8aab6e',fol:'leaf'},
};
const NT_ORDER = ['Earth','Wood','Water','Air','Fire','Ice','Light','Shadow','Metal','Lightning','Crystal','Life'];
const f1 = n => (+n).toFixed(1);
function ntRnd(n){ const x=Math.sin(n*127.1+311.7)*43758.5453; return x-Math.floor(x); }
function ntTrunkHalf(y){ const t=Math.max(0,Math.min(1,(y-360)/540)); return 28+24*t; }
function ntEll(cx,cy,rx,ry,rot,fill,op){ let a='<ellipse cx="'+f1(cx)+'" cy="'+f1(cy)+'" rx="'+f1(rx)+'" ry="'+f1(ry)+'"'; if(rot) a+=' transform="rotate('+rot+' '+f1(cx)+' '+f1(cy)+')"'; a+=' fill="'+fill+'"'; if(op!=null) a+=' opacity="'+op+'"'; return a+'/>'; }
function ntSampleCubic(P0,P1,P2,P3,t){ const u=1-t;
  const x=u*u*u*P0[0]+3*u*u*t*P1[0]+3*u*t*t*P2[0]+t*t*t*P3[0];
  const y=u*u*u*P0[1]+3*u*u*t*P1[1]+3*u*t*t*P2[1]+t*t*t*P3[1];
  const dx=3*u*u*(P1[0]-P0[0])+6*u*t*(P2[0]-P1[0])+3*t*t*(P3[0]-P2[0]);
  const dy=3*u*u*(P1[1]-P0[1])+6*u*t*(P2[1]-P1[1])+3*t*t*(P3[1]-P2[1]);
  const len=Math.hypot(dx,dy)||1; return {x,y,nx:-dy/len,ny:dx/len}; }
function ntBranch(P0,P1,P2,P3,color,w0,w1){ const N=22,L=[],R=[];
  for(let k=0;k<=N;k++){ const t=k/N,s=ntSampleCubic(P0,P1,P2,P3,t),w=(w0*Math.pow(1-t,1.15)+w1)/2; L.push([s.x+s.nx*w,s.y+s.ny*w]); R.push([s.x-s.nx*w,s.y-s.ny*w]); }
  let d='M '+f1(L[0][0])+' '+f1(L[0][1]); for(let k=1;k<=N;k++) d+=' L '+f1(L[k][0])+' '+f1(L[k][1]);
  for(let k=N;k>=0;k--) d+=' L '+f1(R[k][0])+' '+f1(R[k][1]); d+=' Z'; return '<path d="'+d+'" fill="'+color+'"/>'; }
function ntFoliage(type,x,y,dark,light,big){ const m=big?1:0.84;
  const uL=type==='stone'?'#a8a196':light, uD=type==='stone'?'#8a847a':dark;
  const out=[ntEll(x+2,y+4,38*m,30*m,0,uL,0.4),ntEll(x-19,y+13,27*m,22*m,0,uD,0.26),ntEll(x+21,y-7,25*m,20*m,0,uL,0.3)];
  let arr=[];
  if(type==='leaf') arr=[ntEll(x,y-4,16,9,20,dark),ntEll(x-21,y+6,15,9,-12,light),ntEll(x+19,y+9,14,8,42,dark),ntEll(x-8,y+19,13,8,8,light),ntEll(x+11,y-16,13,8,-30,dark),ntEll(x-2,y+3,12,7,15,light)];
  else if(type==='drop') arr=[ntEll(x,y-2,12,16,0,dark),ntEll(x-19,y+9,10,13,0,light),ntEll(x+18,y+11,9,12,0,dark),ntEll(x-5,y-16,9,12,0,light),ntEll(x+11,y-6,8,10,0,dark),ntEll(x+3,y+5,8,11,0,light)];
  else if(type==='wisp') arr=[ntEll(x,y-3,18,9,15,light),ntEll(x-23,y+4,16,8,-8,dark),ntEll(x+21,y+7,15,8,30,light),ntEll(x-9,y+13,13,7,10,dark),ntEll(x+9,y-14,12,7,-20,light),ntEll(x+2,y+3,12,6,5,dark)];
  else if(type==='ember') arr=[ntEll(x,y-1,12,13,0,dark),ntEll(x-19,y+6,10,11,0,light),ntEll(x+18,y+9,9,10,0,dark),ntEll(x-5,y-13,9,10,0,light),ntEll(x+12,y-4,8,9,0,light),ntEll(x+3,y+4,9,10,0,dark)];
  else if(type==='stone') arr=[ntEll(x,y+2,19,14,0,'#9c958b'),ntEll(x-22,y-2,14,11,0,'#878176'),ntEll(x+20,y+6,13,10,0,'#8d877c'),ntEll(x-2,y-13,12,9,0,'#7f8567'),ntEll(x+13,y-9,9,7,0,'#909679'),ntEll(x-12,y+13,10,8,0,'#878176')];
  return out.concat(arr); }
function ntTuft(x,y,dark,light){ return [ntEll(x,y,17,14,0,light,0.5),ntEll(x-9,y+5,9,7,0,dark),ntEll(x+9,y+4,9,7,0,light),ntEll(x,y-7,8,7,0,dark)]; }
function ntTier(naming, element){ const s=(naming.established||{})[element]; if(!s) return {suffix:null,tier:'awaiting'}; return {suffix:s, tier:(naming.locked||[]).includes(s)?'locked':'draft'}; }

  svg.push('<g fill="none" stroke="#3f2f20" stroke-linecap="round"><path d="M 748 1120 C 750 860 752 560 750 360" stroke-width="3" opacity="0.18"/><path d="M 716 1090 C 720 840 730 560 738 384" stroke-width="2.5" opacity="0.14"/><path d="M 784 1090 C 780 840 770 560 762 384" stroke-width="2.5" opacity="0.14"/><path d="M 700 1150 C 690 1095 690 1050 700 1008" stroke-width="2" opacity="0.12"/><path d="M 800 1150 C 810 1095 810 1050 800 1008" stroke-width="2" opacity="0.12"/></g>');

  crownPts.sort((p,q)=>p[1]-q[1]); crownPts.forEach(p=>{ const dk=p[2]%3===0?'#5d7644':'#6f8350', lt=p[2]%3===0?'#8aa063':'#94a46e'; ntTuft(p[0],p[1],dk,lt).forEach(e=>svg.push(e)); });

  function box(left,top,side,extra){ return Object.assign({position:'absolute',left:left+'px',top:top+'px',transform:side<0?'translate(-100%,-50%)':'translate(0,-50%)'}, extra||{}); }

  }); });

/* ---- markdown -> safe html (for the Canon Browser) ---- */
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s){ return escapeHtml(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'); }
function mdToHtml(md){
  const lines=String(md).split('\n'); let html='', i=0, inList=false;
  const closeList=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  while(i<lines.length){ const ln=lines[i];
    if(/^```/.test(ln)){ closeList(); i++; let buf=''; while(i<lines.length && !/^```/.test(lines[i])){ buf+=lines[i]+'\n'; i++; } i++; html+='<pre>'+escapeHtml(buf)+'</pre>'; continue; }
    if(/^###\s/.test(ln)){ closeList(); html+='<h4>'+inlineMd(ln.replace(/^###\s/,''))+'</h4>'; i++; continue; }
    if(/^##\s/.test(ln)){ closeList(); html+='<h3>'+inlineMd(ln.replace(/^##\s/,''))+'</h3>'; i++; continue; }
    if(/^#\s/.test(ln)){ closeList(); html+='<h2>'+inlineMd(ln.replace(/^#\s/,''))+'</h2>'; i++; continue; }
    if(/^[-*]\s/.test(ln)){ if(!inList){ html+='<ul>'; inList=true; } html+='<li>'+inlineMd(ln.replace(/^[-*]\s/,''))+'</li>'; i++; continue; }
    if(/^>\s?/.test(ln)){ closeList(); html+='<p class="hint">'+inlineMd(ln.replace(/^>\s?/,''))+'</p>'; i++; continue; }
    if(ln.trim()===''){ closeList(); i++; continue; }
    closeList(); html+='<p>'+inlineMd(ln)+'</p>'; i++;
  }
  closeList(); return html;
}

/* ---- ids & the index ---- */
function pad3(n){ return String(n).padStart(3,'0'); }
function parseHighest(indexText, tag){ const m=new RegExp('\\*\\*Highest assigned:\\*\\*\\s*'+tag+'-(\\d+)','i').exec(indexText); return m? parseInt(m[1],10) : 0; }
function cardId(title){ const m=/^([A-Z]{3})-(\d{3})\b/.exec(String(title||'')); return m? {tag:m[1], num:parseInt(m[2],10), id:m[1]+'-'+m[2]} : null; }
function indexReservedIds(indexText){ const ids=[]; String(indexText).split('\n').forEach(l=>{ const m=/^-\s+([A-Z]{3}-\d{3})\b/.exec(l.trim()); if(m) ids.push(m[1]); }); return ids; }
function tagFromCategory(cat){ cat=String(cat||''); if(/41_VAEL/.test(cat))return 'VAE'; if(/40_PEOPLES/.test(cat))return 'PEO'; if(/50_ARKBORNE/.test(cat))return 'SED'; if(/10_COSMOLOGY/.test(cat))return 'PLC'; if(/30_GODLING/.test(cat))return 'GLG'; if(/60_MAGIC/.test(cat))return 'MAG'; return 'PEO'; }

/* ---- queue read/write helpers ---- */
// guard a write: refuse to touch the queue unless the text we read back really is the queue.
// (A stale "404: Not Found" body once slipped through and got written over the whole file.)
function assertQueue(text){ if(!/^#\s+02_PROMOTION_QUEUE\.md/m.test(text) || !/^#\s+RAW DUMP INBOX/m.test(text)) throw new Error('refusing to write — the file I read back isn’t the queue (try again in a moment)'); return text; }
// same guard idea for the other canon files we write — never write back something that
// isn't the file we think it is (e.g. a stale "404: Not Found" body).
function assertIndex(text){ if(!/^#\s+01_CANON_INDEX\.md/m.test(text) && !/Canon ID Registry/.test(text)) throw new Error('refusing to write — that file isn’t the canon index'); return text; }
function assertDomain(text){ if(text && !/^#\s/m.test(text)) throw new Error('refusing to write — that domain file doesn’t look right'); return text; }
function validCanonId(id){ return /^[A-Z]{3}-\d{3}$/.test(String(id||'')); }
function validCanonTag(tag){ return CANON_TAGS.indexOf(String(tag)) >= 0; }
function insertUnderSection(text, header, block){
  const lines=text.split('\n'); const hi=lines.findIndex(l=>l.trim()===header);
  if(hi<0) return text.replace(/\s*$/,'')+'\n\n'+header+'\n\n'+block.trim()+'\n';
  let ni=lines.length; for(let i=hi+1;i<lines.length;i++){ if(/^#\s/.test(lines[i])){ ni=i; break; } }
  lines.splice(ni, 0, '', block.trim(), '', '---', ''); return lines.join('\n');
}
function bumpIndex(text, tag, id, title){
  const lines=text.split('\n'); const si=lines.findIndex(l=>new RegExp('^##\\s+'+tag+'\\b').test(l));
  if(si<0) return text;
  let end=lines.length; for(let i=si+1;i<lines.length;i++){ if(/^##\s/.test(lines[i])){ end=i; break; } }
  for(let i=si+1;i<end;i++){ if(/\*\*Highest assigned:\*\*/.test(lines[i])){ lines[i]=lines[i].replace(new RegExp(tag+'-\\d+'), id); break; } }
  const bullet='- '+id+' — '+(title||'(untitled)')+' — *drafted in Studio* (Draft; not yet promoted)';
  let np=-1; for(let i=si+1;i<end;i++){ if(/\(none promoted\)/.test(lines[i])){ np=i; break; } }
  if(np>=0) lines[np]=bullet; else lines.splice(end,0,bullet,'');
  return lines.join('\n');
}
