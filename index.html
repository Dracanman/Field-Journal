function regionFiniteNumber(value){
  if(typeof value==='number') return Number.isFinite(value) ? value : value;
  if(typeof value==='string' && value.trim()!==''){
    const n=Number(value); if(Number.isFinite(n)) return n;
  }
  return value;
}
function regionOptionalArray(value){ return value==null ? [] : value; }
function regionOptionalRecord(value){ return value==null ? {} : value; }
function regionNormalizeId(value){ return typeof value==='string' ? value.trim() : value; }
function regionNormalizePosition(position){
  if(!regionIsRecord(position)) return position;
  const out={...position};
  ['x','y','z'].forEach(k=>{ if(k in out) out[k]=regionFiniteNumber(out[k]); });
  return out;
}
function regionNormalizeBounds(bounds){
  if(!regionIsRecord(bounds)) return bounds;
  const out={...bounds};
  ['x','y','z','width','height','depth','minX','minY','minZ','maxX','maxY','maxZ'].forEach(k=>{
    if(k in out) out[k]=regionFiniteNumber(out[k]);
  });
  return out;
}
function regionNormalizeList(value, mapper){
  if(value==null) return [];
  if(!Array.isArray(value)) return value;
  return value.map(item=>mapper(regionClone(item)));
}

function normalizeRegion(region){
  const src=regionClone(region);
  if(!regionIsRecord(src)) return src;
  const out={...src};
  if('schemaVersion' in out) out.schemaVersion=regionFiniteNumber(out.schemaVersion);
  if('id' in out) out.id=regionNormalizeId(out.id);
  if('title' in out) out.title=regionTrim(out.title);
  if('campaign' in out) out.campaign=regionTrim(out.campaign);
  if(typeof out.cosmicLayer==='string') out.cosmicLayer=out.cosmicLayer.trim().toLowerCase();

  out.localLayers=regionNormalizeList(out.localLayers, layer=>{
    if(!regionIsRecord(layer)) return layer;
    const next={...layer};
    if('id' in next) next.id=regionNormalizeId(next.id);
    if(typeof next.type==='string') next.type=next.type.trim().toLowerCase();
    if('label' in next) next.label=regionTrim(next.label);
    if('verticalOrder' in next) next.verticalOrder=regionFiniteNumber(next.verticalOrder);
    if(next.visible===undefined) next.visible=true;
    if('bounds' in next) next.bounds=regionNormalizeBounds(next.bounds);
    if('featureIds' in next) next.featureIds=regionOptionalArray(next.featureIds);
    return next;
  });

  out.features=regionNormalizeList(out.features, feature=>{
    if(!regionIsRecord(feature)) return feature;
    const next={...feature};
    if('id' in next) next.id=regionNormalizeId(next.id);
    if('type' in next) next.type=regionTrim(next.type);
    if('label' in next) next.label=regionTrim(next.label);
    if('layerId' in next) next.layerId=regionNormalizeId(next.layerId);
    if('position' in next) next.position=regionNormalizePosition(next.position);
    if('geometry' in next) next.geometry=regionClone(next.geometry);
    if('tags' in next) next.tags=regionOptionalArray(next.tags);
    if('notes' in next) next.notes=regionOptionalArray(next.notes);
    return next;
  });

  out.connections=regionNormalizeList(out.connections, connection=>{
    if(!regionIsRecord(connection)) return connection;
    const next={...connection};
    if('id' in next) next.id=regionNormalizeId(next.id);
    if('from' in next) next.from=regionNormalizeId(next.from);
    if('to' in next) next.to=regionNormalizeId(next.to);
    if('type' in next) next.type=regionTrim(next.type);
    if('status' in next) next.status=regionTrim(next.status);
    if(next.bidirectional===undefined) next.bidirectional=false;
    if('notes' in next) next.notes=regionOptionalArray(next.notes);
    return next;
  });

  out.pins=regionNormalizeList(out.pins, pin=>{
    if(!regionIsRecord(pin)) return pin;
    const next={...pin};
    if('id' in next) next.id=regionNormalizeId(next.id);
    if('label' in next) next.label=regionTrim(next.label);
    if('layerId' in next) next.layerId=regionNormalizeId(next.layerId);
    if('category' in next) next.category=regionTrim(next.category);
    if('iconLabel' in next) next.iconLabel=regionTrim(next.iconLabel);
    if('position' in next) next.position=regionNormalizePosition(next.position);
    if('notes' in next) next.notes=regionOptionalArray(next.notes);
    return next;
  });

  out.markers=regionNormalizeList(out.markers, marker=>{
    if(!regionIsRecord(marker)) return marker;
    const next={...marker};
    if('id' in next) next.id=regionNormalizeId(next.id);
    if('characterId' in next) next.characterId=regionNormalizeId(next.characterId);
    if('label' in next) next.label=regionTrim(next.label);
    if('layerId' in next) next.layerId=regionNormalizeId(next.layerId);
    if('status' in next) next.status=regionTrim(next.status);
    if('position' in next) next.position=regionNormalizePosition(next.position);
    if('notes' in next) next.notes=regionOptionalArray(next.notes);
    return next;
  });

  out.notes=regionNormalizeList(out.notes, note=>{
    if(!regionIsRecord(note)) return note;
    const next={...note};
    if('id' in next) next.id=regionNormalizeId(next.id);
    if('text' in next) next.text=regionTrim(next.text);
    if('category' in next) next.category=regionTrim(next.category);
    if('visibility' in next) next.visibility=regionTrim(next.visibility);
    return next;
  });

  out.terrain=regionOptionalRecord(out.terrain);
  out.revealed=regionOptionalRecord(out.revealed);
  out.elementalInfluence=regionOptionalRecord(out.elementalInfluence);
  out.metadata=regionOptionalRecord(out.metadata);
  return out;
}

function parseRegionJson(text){
  let parsed;
  try{ parsed=JSON.parse(String(text==null?'':text)); }
  catch(error){
    const detail=error && error.message ? error.message : String(error);
    throw new Error('Malformed region JSON: '+detail);
  }
  return normalizeRegion(parsed);
}

function regionPushError(errors,path,message){ errors.push({path,message,text:(path?path+': ':'')+message}); }
function regionValidateId(errors,path,value,required=true){
  if(value==null || value===''){
    if(required) regionPushError(errors,path,'is required');
    return false;
  }
  if(typeof value!=='string' || !REGION_ID_RE.test(value)){
    regionPushError(errors,path,'must use lowercase letters, numbers, and internal hyphens');
    return false;
  }
  return true;
}
function regionValidatePosition(errors,path,value,required=false){
  if(value==null){ if(required) regionPushError(errors,path,'is required'); return; }
  if(!regionIsRecord(value)){ regionPushError(errors,path,'must be an object'); return; }
  if(!Number.isFinite(value.x)) regionPushError(errors,path+'.x','must be a finite number');
  if(!Number.isFinite(value.y)) regionPushError(errors,path+'.y','must be a finite number');
  if(value.z!==undefined && !Number.isFinite(value.z)) regionPushError(errors,path+'.z','must be a finite number');
}
function regionValidateArray(errors,path,value){
  if(!Array.isArray(value)){ regionPushError(errors,path,'must be an array'); return false; }
  return true;
}
function regionValidateRecord(errors,path,value){
  if(!regionIsRecord(value)){ regionPushError(errors,path,'must be an object'); return false; }
  return true;
}
function regionVisibilityHidden(item){
  if(!regionIsRecord(item)) return false;
  if(item.hidden===true || item.revealed===false) return true;
  const v=typeof item.visibility==='string' ? item.visibility.trim().toLowerCase() : '';
  return REGION_HIDDEN_VISIBILITIES.includes(v);
}
function regionTerrainLayerComplete(layer){
  if(!regionIsRecord(layer) || typeof layer.format!=='string' || !layer.format.trim()) return false;
  if(Array.isArray(layer.cells) && layer.cells.length) return true;
  if(Array.isArray(layer.shapes) && layer.shapes.length) return true;
  if(Array.isArray(layer.tiles) && layer.tiles.length) return true;
  if(regionIsRecord(layer.data) && Object.keys(layer.data).length) return true;
  return false;
}
function regionHasCompleteTerrain(region){
  const terrain=region && region.terrain;
  if(!regionIsRecord(terrain) || !regionIsRecord(terrain.layers)) return false;
  const values=Object.values(terrain.layers);
  return values.length>0 && values.every(regionTerrainLayerComplete);
}
function regionHasGenerationProvenance(region){
  const metadata=region && region.metadata;
  return regionIsRecord(metadata) && (metadata.seed!==undefined || metadata.generator!==undefined || metadata.generatorVersion!==undefined);
}

function validateRegion(region,options){
  const opts=options||{}, errors=[];
  if(!regionIsRecord(region)){
    regionPushError(errors,'region','must be a JSON object');
    return errors;
  }
  if(region.schemaVersion!==REGION_SCHEMA_VERSION) regionPushError(errors,'schemaVersion','must equal '+REGION_SCHEMA_VERSION);
  regionValidateId(errors,'id',region.id,true);
  if(typeof region.title!=='string' || !region.title.trim()) regionPushError(errors,'title','is required');
  if(typeof region.campaign!=='string' || !region.campaign.trim()) regionPushError(errors,'campaign','is required');
  if(opts.expectedCampaign && region.campaign!==opts.expectedCampaign) regionPushError(errors,'campaign','must match selected campaign '+opts.expectedCampaign);
  if(opts.expectedId && region.id!==opts.expectedId) regionPushError(errors,'id','must match expected region '+opts.expectedId);
  if(!REGION_COSMIC_LAYERS.includes(region.cosmicLayer)) regionPushError(errors,'cosmicLayer','must be one of: '+REGION_COSMIC_LAYERS.join(', '));

  const allIds=new Map(), layerIds=new Set(), featureIds=new Set();
  const registerId=(path,id)=>{
    if(!regionValidateId(errors,path,id,true)) return;
    if(allIds.has(id)) regionPushError(errors,path,'duplicates '+allIds.get(id));
    else allIds.set(id,path);
  };

  if(regionValidateArray(errors,'localLayers',region.localLayers)){
    region.localLayers.forEach((layer,index)=>{
      const path='localLayers['+index+']';
      if(!regionIsRecord(layer)){ regionPushError(errors,path,'must be an object'); return; }
      registerId(path+'.id',layer.id); if(typeof layer.id==='string') layerIds.add(layer.id);
      if(!REGION_LOCAL_LAYER_TYPES.includes(layer.type)) regionPushError(errors,path+'.type','must be one of: '+REGION_LOCAL_LAYER_TYPES.join(', '));
      if(typeof layer.label!=='string' || !layer.label.trim()) regionPushError(errors,path+'.label','is required');
      if(layer.verticalOrder!==undefined && !Number.isFinite(layer.verticalOrder)) regionPushError(errors,path+'.verticalOrder','must be a finite number');
      if(layer.visible!==undefined && typeof layer.visible!=='boolean') regionPushError(errors,path+'.visible','must be true or false');
      if(layer.bounds!==undefined && !regionIsRecord(layer.bounds)) regionPushError(errors,path+'.bounds','must be an object');
      if(layer.featureIds!==undefined && !Array.isArray(layer.featureIds)) regionPushError(errors,path+'.featureIds','must be an array');
    });
  }

  if(regionValidateArray(errors,'features',region.features)){
    region.features.forEach((feature,index)=>{
      const path='features['+index+']';
      if(!regionIsRecord(feature)){ regionPushError(errors,path,'must be an object'); return; }
      registerId(path+'.id',feature.id); if(typeof feature.id==='string') featureIds.add(feature.id);
      if(typeof feature.type!=='string' || !feature.type.trim()) regionPushError(errors,path+'.type','is required');
      if(typeof feature.label!=='string' || !feature.label.trim()) regionPushError(errors,path+'.label','is required');
      if(feature.layerId!==undefined && !layerIds.has(feature.layerId)) regionPushError(errors,path+'.layerId','references an unknown local layer');
      if(feature.position!==undefined) regionValidatePosition(errors,path+'.position',feature.position,false);
      if(feature.tags!==undefined && !Array.isArray(feature.tags)) regionPushError(errors,path+'.tags','must be an array');
      if(feature.notes!==undefined && !Array.isArray(feature.notes)) regionPushError(errors,path+'.notes','must be an array');
    });
  }

  if(regionValidateArray(errors,'connections',region.connections)){
    region.connections.forEach((connection,index)=>{
      const path='connections['+index+']';
      if(!regionIsRecord(connection)){ regionPushError(errors,path,'must be an object'); return; }
      registerId(path+'.id',connection.id);
      if(typeof connection.from!=='string' || !connection.from) regionPushError(errors,path+'.from','is required');
      if(typeof connection.to!=='string' || !connection.to) regionPushError(errors,path+'.to','is required');
      const endpoints=new Set([...layerIds,...featureIds]);
      if(typeof connection.from==='string' && !endpoints.has(connection.from)) regionPushError(errors,path+'.from','references an unknown layer or feature');
      if(typeof connection.to==='string' && !endpoints.has(connection.to)) regionPushError(errors,path+'.to','references an unknown layer or feature');
      if(typeof connection.type!=='string' || !connection.type.trim()) regionPushError(errors,path+'.type','is required');
      if(connection.bidirectional!==undefined && typeof connection.bidirectional!=='boolean') regionPushError(errors,path+'.bidirectional','must be true or false');
    });
  }

  if(regionValidateArray(errors,'pins',region.pins)){
    region.pins.forEach((pin,index)=>{
      const path='pins['+index+']';
      if(!regionIsRecord(pin)){ regionPushError(errors,path,'must be an object'); return; }
      registerId(path+'.id',pin.id);
      if(typeof pin.label!=='string' || !pin.label.trim()) regionPushError(errors,path+'.label','is required');
      if(!layerIds.has(pin.layerId)) regionPushError(errors,path+'.layerId','references an unknown local layer');
      regionValidatePosition(errors,path+'.position',pin.position,true);
    });
  }

  if(regionValidateArray(errors,'markers',region.markers)){
    region.markers.forEach((marker,index)=>{
      const path='markers['+index+']';
      if(!regionIsRecord(marker)){ regionPushError(errors,path,'must be an object'); return; }
      registerId(path+'.id',marker.id);
      regionValidateId(errors,path+'.characterId',marker.characterId,true);
      if(typeof marker.label!=='string' || !marker.label.trim()) regionPushError(errors,path+'.label','is required');
      if(!layerIds.has(marker.layerId)) regionPushError(errors,path+'.layerId','references an unknown local layer');
      regionValidatePosition(errors,path+'.position',marker.position,true);
    });
  }

  if(regionValidateArray(errors,'notes',region.notes)){
    region.notes.forEach((note,index)=>{
      const path='notes['+index+']';
      if(!regionIsRecord(note)){ regionPushError(errors,path,'must be an object'); return; }
      registerId(path+'.id',note.id);
      if(typeof note.text!=='string' || !note.text.trim()) regionPushError(errors,path+'.text','is required');
      if(note.text && /[\r\n]{3,}/.test(note.text)) regionPushError(errors,path+'.text','must not contain repeated blank-line payloads');
    });
  }

  regionValidateRecord(errors,'terrain',region.terrain);
  regionValidateRecord(errors,'revealed',region.revealed);
  regionValidateRecord(errors,'elementalInfluence',region.elementalInfluence);
  regionValidateRecord(errors,'metadata',region.metadata);

  if(regionIsRecord(region.terrain) && region.terrain.layers!==undefined){
    if(!regionIsRecord(region.terrain.layers)) regionPushError(errors,'terrain.layers','must be an object keyed by local layer ID');
    else Object.entries(region.terrain.layers).forEach(([layerId,payload])=>{
      if(!layerIds.has(layerId)) regionPushError(errors,'terrain.layers.'+layerId,'references an unknown local layer');
      if(!regionIsRecord(payload)) regionPushError(errors,'terrain.layers.'+layerId,'must be an object');
      else{
        if(payload.width!==undefined && (!Number.isInteger(payload.width) || payload.width<=0)) regionPushError(errors,'terrain.layers.'+layerId+'.width','must be a positive integer');
        if(payload.height!==undefined && (!Number.isInteger(payload.height) || payload.height<=0)) regionPushError(errors,'terrain.layers.'+layerId+'.height','must be a positive integer');
        if(Array.isArray(payload.cells) && Number.isInteger(payload.width) && Number.isInteger(payload.height) && payload.cells.length!==payload.width*payload.height){
          regionPushError(errors,'terrain.layers.'+layerId+'.cells','length must equal width × height');
        }
      }
    });
  }

  if(regionIsRecord(region.revealed) && region.revealed.layers!==undefined){
    if(!regionIsRecord(region.revealed.layers)) regionPushError(errors,'revealed.layers','must be an object keyed by local layer ID');
    else Object.entries(region.revealed.layers).forEach(([layerId,value])=>{
      if(!layerIds.has(layerId)) regionPushError(errors,'revealed.layers.'+layerId,'references an unknown local layer');
      if(!(regionIsRecord(value) || Array.isArray(value))) regionPushError(errors,'revealed.layers.'+layerId,'must be an object or array');
    });
  }

  if(regionHasGenerationProvenance(region) && !regionHasCompleteTerrain(region)){
    regionPushError(errors,'terrain','generated-region provenance requires complete serialized terrain; a seed alone is not an exact save');
  }
  return errors;
}

function assertRegion(region,options){
  const normalized=normalizeRegion(region), errors=validateRegion(normalized,options);
  if(errors.length) throw new Error('Invalid region: '+errors.map(e=>e.text).join('; '));
  return normalized;
}
function assertRegionJson(text,options){ return assertRegion(parseRegionJson(text),options); }

function regionStableValue(value){
  if(Array.isArray(value)) return value.map(regionStableValue);
  if(!regionIsRecord(value)) return value;
  const keys=Object.keys(value).sort();
  const out={}; keys.forEach(key=>{ out[key]=regionStableValue(value[key]); });
  return out;
}
function regionStableObject(region){
  const source=regionStableValue(region), out={};
  REGION_TOP_LEVEL_ORDER.forEach(key=>{ if(Object.prototype.hasOwnProperty.call(source,key)) out[key]=source[key]; });
  Object.keys(source).sort().forEach(key=>{ if(!Object.prototype.hasOwnProperty.call(out,key)) out[key]=source[key]; });
  return out;
}
function serializeRegion(region){
  const valid=assertRegion(region);
  return JSON.stringify(regionStableObject(valid),null,2)+'\n';
}

function regionSummaryItems(items){ return Array.isArray(items) ? items.filter(item=>!regionVisibilityHidden(item)) : []; }
function regionSummaryBullet(label,detail){ return '- '+label+(detail?' — '+detail:''); }
function formatRegionSummary(region,options){
  const opts=options||{}, valid=assertRegion(region,opts.expectedCampaign?{expectedCampaign:opts.expectedCampaign}:undefined);
  const layers=regionSummaryItems(valid.localLayers), features=regionSummaryItems(valid.features), connections=regionSummaryItems(valid.connections),
    pins=regionSummaryItems(valid.pins), markers=regionSummaryItems(valid.markers), notes=regionSummaryItems(valid.notes);
  const lines=[
    '# Region — '+valid.title,'',
    '**Region ID:** '+valid.id,
    '**Campaign:** '+valid.campaign,
    '**Cosmic Layer:** '+valid.cosmicLayer.charAt(0).toUpperCase()+valid.cosmicLayer.slice(1),
    '**Schema Version:** '+valid.schemaVersion,'',
    '## Local Layers','',
  ];
  if(layers.length) layers.forEach(layer=>lines.push(regionSummaryBullet(layer.label,layer.type)));
  else lines.push('- None recorded');

  const addSection=(title,items,render)=>{
    lines.push('', '## '+title, '');
    if(items.length) items.forEach(item=>lines.push(render(item)));
    else lines.push('- None recorded');
  };
  addSection('Major Features',features,item=>regionSummaryBullet(item.label,item.type+(item.layerId?' · '+item.layerId:'')));
  addSection('Connections',connections,item=>regionSummaryBullet(item.id,item.from+' → '+item.to+(item.type?' · '+item.type:'')));
  addSection('Pins',pins,item=>regionSummaryBullet(item.label,item.category||item.layerId));
  addSection('Markers',markers,item=>regionSummaryBullet(item.label,item.status||item.layerId));
  addSection('Notes',notes,item=>regionSummaryBullet(item.text,item.category||''));
  return lines.join('\n').replace(/\s+$/,'')+'\n';
}

function classifyRegionEntries(items,campaignName){
  const list=Array.isArray(items)?items:[], byBase=new Map(), ignored=[];
  list.forEach(item=>{
    if(!item || item.type!=='file' || typeof item.name!=='string'){ ignored.push(item); return; }
    const match=/^(.+)\.(json|md)$/i.exec(item.name);
    if(!match){ ignored.push(item); return; }
    const base=match[1], ext=match[2].toLowerCase();
    const row=byBase.get(base)||{base,campaign:campaignName||'',json:null,markdown:null};
    row[ext==='json'?'json':'markdown']={name:item.name,path:item.path||''}; byBase.set(base,row);
  });
  const rows=[...byBase.values()].sort((a,b)=>a.base.localeCompare(b.base));
  return {
    regions:rows.filter(row=>row.json),
    orphanMarkdown:rows.filter(row=>!row.json && row.markdown),
    ignored,
  };
}

function regionExpectedPath(campaignName,regionId){ return 'campaign/'+campaignName+'/regions/'+regionId+'.json'; }
function assertRegionWriteTarget(path,campaignName,region,currentText){
  const valid=assertRegion(region,{expectedCampaign:campaignName});
  const expected=regionExpectedPath(campaignName,valid.id);
  if(path!==expected) throw new Error('Refusing region write: expected '+expected+' but received '+path);
  if(currentText!=null && String(currentText).trim()){
    const current=assertRegionJson(currentText,{expectedCampaign:campaignName,expectedId:valid.id});
    if(current.id!==valid.id) throw new Error('Refusing region write: current region ID changed');
  }
  return valid;
}
/* ========================================================================== *
   THE GAME SPACE — manage campaigns and hand sessions off to the GM. The
   campaign counterpart to the Canon Studio: a landing that lists your runs, and
   a per-campaign view (Resume / Ledger / Threads / Character) over the repo files.
   Format/parse lives in campaign-parse.js. Play happens with the GM (handoffs);
   the app keeps the save.
 * ========================================================================== */
const CAMP_DIR='campaign', CHAR_DIR='characters';
const CAMP_TABS=[
  ['resume','Resume','The save file — where the story stands right now. Copy a prompt to resume play.'],
  ['ledger','Ledger','Everything captured in play, newest first — lore, mechanics, moments, questions.'],
  ['threads','Threads','Open storylines by heat: live, warming, distant, blocked, closed.'],
  ['character','Character','The protagonist sheet.'],
];

async function listCampaigns(cfg){ return (await ghList(cfg, CAMP_DIR)).filter(x=>x.type==='dir').map(x=>x.name).sort(); }
async function campaignFiles(cfg, name){
  const inDir=(items,pfx)=> (items.find(x=>x.type==='file' && x.name.toUpperCase().startsWith(pfx))||{}).path;
  const camp=await ghList(cfg, `${CAMP_DIR}/${name}`);
  let chars=[]; try{ chars=await ghList(cfg, `${CHAR_DIR}/${name}`); }catch(e){}
  return {
    tracker: inDir(camp,'CAMPAIGN STATE TRACKER'),
    threads: inDir(camp,'CAMPAIGN THREADS'),
    ledger:  inDir(camp,'CAMPAIGN LEDGER'),
    character: inDir(chars,'CHARACTER SHEET'),
  };
}

function viewCampaigns(){
  const f=framed('Campaigns', 'your runs — pick up where you left off', 'play happens with the GM; the app keeps the save');
  const body=f.querySelector('.framed-body');
  if(!ghReady()){
    body.append(h('p',{class:'hint', style:{textAlign:'center'}}, 'Connect your GitHub file first — the Game space reads and writes your campaign files.'),
      h('div',{class:'toolrow', style:{justifyContent:'center'}}, h('button',{class:'navbtn primary', onclick:()=>openGitHubPanel()}, 'Connect GitHub')));
    return f;
  }
  const cfg=ghCfg(); const host=h('div',null); body.append(host); host.append(h('p',{class:'hint', style:{textAlign:'center'}},'Loading your campaigns…'));
  (async()=>{ try{
    const names=await listCampaigns(cfg); const rows=[];
    for(const name of names){ let status=''; try{ const files=await campaignFiles(cfg,name); if(files.tracker){ const r=await ghGetText(cfg, files.tracker); if(r) status=parseTracker(r.text).status; } }catch(e){} rows.push({name,status,archived:trackerIsArchived(status)}); }
    const wrap=h('div',null,
      h('div',{class:'toolrow', style:{justifyContent:'center', marginBottom:'12px'}}, h('button',{class:'navbtn primary', onclick:()=>startCampaignModal()}, '+ Start a new campaign')));
    wrap.append(campaignGroup('Current', rows.filter(r=>!r.archived), 'No active campaigns yet — start one above.'));
    const arch=rows.filter(r=>r.archived); if(arch.length) wrap.append(campaignGroup('Archived', arch, ''));
    host.replaceChildren(wrap);
  }catch(e){ host.replaceChildren(h('p',{class:'hint'},'Error: '+e.message)); } })();
  return f;
}
function campaignGroup(label, rows, empty){
  const g=h('div',{style:{marginTop:'8px'}}, h('div',{class:'kicker', style:{margin:'12px 0 8px'}}, label));
  if(!rows.length){ g.append(h('p',{class:'hint'}, empty||'(none)')); return g; }
  const list=h('div',{class:'canon-list'});
  rows.forEach(r=> list.append(h('button',{class:'pick', onclick:()=>go('campaign',{camp:r.name})},
    h('div',{class:'ribbon', style:{background:ACCENTS.gold}}), h('b',null, r.name), h('small',null, r.status? r.status.slice(0,90) : 'campaign'))));

const CAMPAIGN_REGION_DIR='regions';

function regionDirectoryPath(campaignName){ return CAMP_DIR+'/'+campaignName+'/'+CAMPAIGN_REGION_DIR; }
function regionArrayCount(value){ return Array.isArray(value)?value.length:0; }
function regionTerrainStatus(region){
  if(!regionIsRecord(region&&region.terrain) || !regionIsRecord(region.terrain.layers) || !Object.keys(region.terrain.layers).length){
    return regionHasGenerationProvenance(region)?'Incomplete generated save':'No serialized terrain';
  }
  return regionHasCompleteTerrain(region)?'Complete serialized terrain':'Partial serialized terrain';
}
function regionRecordStatus(region,errors,hasMarkdown){
  const safe=regionIsRecord(region)?region:{};
  return {
    title:typeof safe.title==='string'&&safe.title?safe.title:'Unreadable region',
    id:typeof safe.id==='string'&&safe.id?safe.id:'unknown',
    schemaVersion:safe.schemaVersion==null?'—':safe.schemaVersion,
    cosmicLayer:typeof safe.cosmicLayer==='string'&&safe.cosmicLayer?safe.cosmicLayer:'—',
    layers:regionArrayCount(safe.localLayers),
    layerLabels:Array.isArray(safe.localLayers)?safe.localLayers.filter(regionIsRecord).map(x=>x.label||x.id||x.type).filter(Boolean):[],
    terrain:regionTerrainStatus(safe),
    features:regionArrayCount(safe.features), connections:regionArrayCount(safe.connections),
    pins:regionArrayCount(safe.pins), markers:regionArrayCount(safe.markers), notes:regionArrayCount(safe.notes),
    hasMarkdown:!!hasMarkdown, errors:Array.isArray(errors)?errors:[], valid:!errors||errors.length===0,
  };
}

async function campaignRegionEntries(cfg,campaignName){
  try{ return classifyRegionEntries(await ghList(cfg,regionDirectoryPath(campaignName)),campaignName); }
  catch(error){
    const message=String(error&&error.message||error);
    if(/404|not found|does not exist/i.test(message)) return {regions:[],orphanMarkdown:[],ignored:[]};
    throw error;
  }
}

async function loadCampaignRegions(cfg,campaignName){
  const discovered=await campaignRegionEntries(cfg,campaignName), loaded=[];
  for(const entry of discovered.regions){
    let region=null, errors=[];
    try{
      const response=await ghGetText(cfg,entry.json.path);
      if(!response) throw new Error('Region JSON could not be read');
      region=parseRegionJson(response.text);
      errors=validateRegion(region,{expectedCampaign:campaignName});
    }catch(error){
      const message=String(error&&error.message||error);
      errors=[{path:entry.json.path,message,text:message}];
    }
    loaded.push({...entry,region,errors});
  }
  const ids=new Map();
  loaded.forEach(entry=>{
    if(!entry.region||typeof entry.region.id!=='string'||!entry.region.id) return;
    if(ids.has(entry.region.id)){
      const first=ids.get(entry.region.id);
      entry.errors.push({path:'id',message:'duplicate region ID',text:'id: duplicates '+first.json.name});
      first.errors.push({path:'id',message:'duplicate region ID',text:'id: duplicates '+entry.json.name});
    }else ids.set(entry.region.id,entry);
  });
  return {...discovered,regions:loaded};
}

/* ========================================================================== *
