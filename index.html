  dirt:'#b08a5e', soil:'#a07c4f', loam:'#967048', sand:'#e3d59a', desert:'#e6d79b',
  stone:'#b8b2a6', rock:'#a39d92', cliff:'#8f897e', mountain:'#9a9488', peak:'#cfcabf',
  cave:'#5b5448', 'cave-floor':'#6a6253', cavern:'#544d42', tunnel:'#4f4940',
  water:'#7fb4d4', sea:'#5f9fc6', lake:'#82b8d8', river:'#88bcd9', deep:'#3f6f93',
  ice:'#cfe6ef', snow:'#eef4f6', frost:'#dceaf0',
  lava:'#cf5b3a', ash:'#7a716a', void:'#2c2a33', dimensional:'#6a5acd',
  path:'#cdbf99', road:'#c4b486', bridge:'#b59a6a',
};

function regionMapRound(n){ return Math.round((Number.isFinite(n)?n:0) * 1e4) / 1e4; }
function regionClampScale(scale){
  const s = Number.isFinite(scale) ? scale : 1;
  return Math.min(REGION_MAP_MAX_SCALE, Math.max(REGION_MAP_MIN_SCALE, s));
}
function regionCosmicLabel(region){
  const c = region && typeof region.cosmicLayer === 'string' ? region.cosmicLayer : '';
  return c ? c.charAt(0).toUpperCase() + c.slice(1) : 'Unknown';
}

// Local layers a player may switch between: visible, GM-hidden excluded, sorted
// so higher elevation lands first; ties keep the original (stable) order.
function regionMapLayers(region){
  const layers = (region && Array.isArray(region.localLayers)) ? region.localLayers : [];
  return layers
    .map((layer, index) => ({ layer, index }))
    .filter(({ layer }) => regionIsRecord(layer) && layer.visible !== false && !regionVisibilityHidden(layer))
    .sort((a, b) => {
      const av = Number.isFinite(a.layer.verticalOrder) ? a.layer.verticalOrder : 0;
      const bv = Number.isFinite(b.layer.verticalOrder) ? b.layer.verticalOrder : 0;
      if (av !== bv) return bv - av;
      return a.index - b.index;
    })
    .map(({ layer }) => layer);
}

function regionTerrainLayer(region, layerId){
  const terrain = region && region.terrain;
  if (!regionIsRecord(terrain) || !regionIsRecord(terrain.layers)) return null;
  const payload = terrain.layers[layerId];
  return regionIsRecord(payload) ? payload : null;
}

// Exact cell-grid terrain -> deterministic cells. Returns null when the layer
// has no renderable serialized grid; we never invent or regenerate terrain.
function regionTerrainGrid(region, layerId){
  const payload = regionTerrainLayer(region, layerId);
  if (!payload) return null;
  const width = payload.width, height = payload.height;
  if (!Number.isInteger(width) || !Number.isInteger(height) || width <= 0 || height <= 0) return null;
  if (!Array.isArray(payload.cells) || payload.cells.length !== width * height) return null;
  const cells = payload.cells.map((value, i) => ({ index:i, x:i % width, y:Math.floor(i / width), value }));
  return { width, height, format: payload.format, cells };
}

// Reveal/fog mask for a layer. Explicit fog hides; the ABSENCE of a mask shows
// everything (a GM who set no fog has not hidden anything).
function regionRevealMask(region, layerId){
  const revealed = region && region.revealed;
  if (!regionIsRecord(revealed) || !regionIsRecord(revealed.layers)) return null;
  const value = revealed.layers[layerId];
  if (Array.isArray(value)) return value;
  if (regionIsRecord(value) && Array.isArray(value.cells)) return value.cells;
  return null;
}
function regionCellRevealed(mask, index){
  if (!Array.isArray(mask)) return true;
  const v = mask[index];
  return !(v === 0 || v === false || v == null);
}

function regionFeatureHidden(feature, grid, mask){
  if (!regionIsRecord(feature) || regionVisibilityHidden(feature)) return true;
  if (!grid || !Array.isArray(mask)) return false;
  const p = feature.position;
  if (!regionIsRecord(p) || !Number.isFinite(p.x) || !Number.isFinite(p.y)) return false;
  const x = Math.floor(p.x), y = Math.floor(p.y);
  if (x < 0 || y < 0 || x >= grid.width || y >= grid.height) return false;  // off-grid: no fog basis
  return !regionCellRevealed(mask, y * grid.width + x);
}

function regionMapVisibleFeatures(region, layerId, grid, mask){
  const features = (region && Array.isArray(region.features)) ? region.features : [];
  return features.filter(f =>
    regionIsRecord(f) && f.layerId === layerId &&
    regionIsRecord(f.position) && Number.isFinite(f.position.x) && Number.isFinite(f.position.y) &&
    !regionFeatureHidden(f, grid, mask));
}

// Visible pins/markers share the same layer, GM-only, and fog rules as features.
// The returned kind stays separate from the serialized item so editors never
// have to guess which collection owns an ID.
function regionMapVisibleItems(region, layerId, grid, mask){
  const out = [];
  [['pin','pins'],['marker','markers']].forEach(([kind,key]) => {
    const items = region && Array.isArray(region[key]) ? region[key] : [];
    items.forEach(item => {
      if (regionIsRecord(item) && item.layerId === layerId &&
        regionIsRecord(item.position) && Number.isFinite(item.position.x) && Number.isFinite(item.position.y) &&
        !regionFeatureHidden(item, grid, mask)) out.push({ kind, item });
    });
  });
  return out;
}

// Drawable connection lines: only between two visible features on this layer
// (both endpoint positions are known). Cross-layer connections are listed
// textually instead — see regionMapConnectionList.
function regionMapConnectionLines(region, layerId, posById){
  const conns = (region && Array.isArray(region.connections)) ? region.connections : [];
  const get = id => posById && (posById instanceof Map ? posById.get(id) : posById[id]);
  return conns
    .filter(c => regionIsRecord(c) && !regionVisibilityHidden(c) && get(c.from) && get(c.to))
    .map(c => ({ id:c.id, type:c.type, from:get(c.from), to:get(c.to) }));
}
function regionMapConnectionList(region, layerId, visibleFeatureIds){
  const ids = new Set(visibleFeatureIds || []);
  const allowed = new Set(regionMapLayers(region).map(layer => layer.id));
  regionMapLayers(region).forEach(layer => {
    const grid = regionTerrainGrid(region, layer.id), mask = regionRevealMask(region, layer.id);
    regionMapVisibleFeatures(region, layer.id, grid, mask).forEach(feature => allowed.add(feature.id));
  });
  const conns = (region && Array.isArray(region.connections)) ? region.connections : [];
  return conns.filter(c => regionIsRecord(c) && !regionVisibilityHidden(c) &&
    allowed.has(c.from) && allowed.has(c.to) &&
    (c.from === layerId || c.to === layerId || ids.has(c.from) || ids.has(c.to)));
}

// Content bounding box (cells + features) with padding, for fit-to-view.
function regionMapBounds(grid, features){
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  if (grid){ minX = Math.min(minX, 0); minY = Math.min(minY, 0); maxX = Math.max(maxX, grid.width); maxY = Math.max(maxY, grid.height); }
  (features || []).forEach(f => {
    const p = f && f.position;
    if (regionIsRecord(p) && Number.isFinite(p.x) && Number.isFinite(p.y)){
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x + 1); maxY = Math.max(maxY, p.y + 1);
    }
  });
  if (!Number.isFinite(minX)) return null;
  return { minX:minX - REGION_MAP_PAD, minY:minY - REGION_MAP_PAD, maxX:maxX + REGION_MAP_PAD, maxY:maxY + REGION_MAP_PAD };
}

// Deterministic SVG viewBox string from content bounds + viewport state. Larger
// scale -> smaller viewBox (more zoom); pan shifts the centre.
function regionMapViewBox(bounds, viewport){
  const v = viewport || {}, scale = regionClampScale(v.scale);
  const w0 = bounds.maxX - bounds.minX, h0 = bounds.maxY - bounds.minY;
  const w = w0 / scale, h = h0 / scale;
  const cx = (bounds.minX + bounds.maxX) / 2 + (Number.isFinite(v.panX) ? v.panX : 0);
  const cy = (bounds.minY + bounds.maxY) / 2 + (Number.isFinite(v.panY) ? v.panY : 0);
  return [regionMapRound(cx - w / 2), regionMapRound(cy - h / 2), regionMapRound(w), regionMapRound(h)].join(' ');
}

// Deterministic terrain colour: known terrain words map to a fixed palette;
// anything else hashes to a stable pastel so the same value always paints alike.
function regionCellColor(value){
  const key = String(value == null ? '' : value).toLowerCase();
  if (Object.prototype.hasOwnProperty.call(REGION_TERRAIN_COLORS, key)) return REGION_TERRAIN_COLORS[key];
  let hash = 0; for (let i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) >>> 0;
  return 'hsl(' + (hash % 360) + ' 42% 76%)';
}

function regionSvg(tag, attrs, ...kids){
  const el = document.createElementNS(REGION_MAP_NS, tag);
  if (attrs) for (const k in attrs){ const v = attrs[k]; if (v == null || v === false) continue; el.setAttribute(k, String(v)); }
  for (const kid of kids.flat()){ if (kid == null || kid === false) continue; el.append(kid.nodeType ? kid : document.createTextNode(String(kid))); }
  return el;
}

function regionMapPoint(svg, event){
  if (svg && typeof svg.createSVGPoint === 'function' && typeof svg.getScreenCTM === 'function'){
    const matrix = svg.getScreenCTM();
    if (matrix && typeof matrix.inverse === 'function'){
      const point = svg.createSVGPoint();
      point.x = event.clientX; point.y = event.clientY;
      const mapped = point.matrixTransform(matrix.inverse());
      return { x:regionMapRound(mapped.x), y:regionMapRound(mapped.y) };
    }
  }
  const box = svg && svg.getBoundingClientRect ? svg.getBoundingClientRect() : null;
  const values = String(svg && svg.getAttribute('viewBox') || '').trim().split(/\s+/).map(Number);
  if (!box || !box.width || !box.height || values.length !== 4 || values.some(v => !Number.isFinite(v))) return null;
  return {
    x:regionMapRound(values[0] + (event.clientX - box.left) * values[2] / box.width),
    y:regionMapRound(values[1] + (event.clientY - box.top) * values[3] / box.height),
  };
}

function regionMapPlacementPosition(region, layerId, point){
  if (!point || !Number.isFinite(point.x) || !Number.isFinite(point.y)) return null;
  const grid = regionTerrainGrid(region, layerId);
  if (grid) return {
    x:Math.min(grid.width - 1, Math.max(0, Math.floor(point.x))),
    y:Math.min(grid.height - 1, Math.max(0, Math.floor(point.y))),
  };
  return { x:regionMapRound(point.x - 0.5), y:regionMapRound(point.y - 0.5) };
}

function regionMapTextSummary(region){
  const lines = [
    (region && region.title ? region.title : 'Region') + ' map',
    'Cosmic layer: ' + regionCosmicLabel(region),
  ];
  const layers = regionMapLayers(region);
  if (!layers.length){ lines.push('', 'No visible local layers.'); return lines.join('\n') + '\n'; }
  layers.forEach(layer => {
    const grid = regionTerrainGrid(region, layer.id), mask = regionRevealMask(region, layer.id);
    const features = regionMapVisibleFeatures(region, layer.id, grid, mask);
    const items = regionMapVisibleItems(region, layer.id, grid, mask);
    const conns = regionMapConnectionList(region, layer.id, features.map(feature => feature.id));
    lines.push('', (layer.label || layer.id) + ':');
    features.forEach(feature => lines.push('- Feature: ' + feature.label));
    items.forEach(({ kind, item }) => lines.push('- ' + (kind === 'pin' ? 'Pin' : 'Marker') + ': ' + item.label));
    conns.forEach(connection => lines.push('- ' + (connection.type ? connection.type + ': ' : '') + connection.from + ' → ' + connection.to));
    if (!features.length && !items.length && !conns.length) lines.push('- Nothing visible on this layer');
  });
  return lines.join('\n') + '\n';
}

// Build the read-only SVG for one local layer at a given viewport. Pure of any
// writes; honours fog and GM-only hiding via the helpers above.
function regionMapSvg(region, layerId, viewport, options){
  const opts = options || {};
  const grid = regionTerrainGrid(region, layerId);
  const mask = regionRevealMask(region, layerId);
  const features = regionMapVisibleFeatures(region, layerId, grid, mask);
  const items = regionMapVisibleItems(region, layerId, grid, mask);
  const bounds = regionMapBounds(grid, features.concat(items.map(x => x.item)));
  const layer = (region && Array.isArray(region.localLayers) ? region.localLayers : []).find(l => regionIsRecord(l) && l.id === layerId);
  const label = (region && region.title ? region.title : 'Region') + ' — ' + ((layer && layer.label) || layerId) + ' map';
  const svg = regionSvg('svg', { class:'region-map-svg', role:'img', 'aria-label':label, preserveAspectRatio:'xMidYMid meet' });
  if (!bounds){
    svg.setAttribute('viewBox', '0 0 10 6');
    svg.append(regionSvg('text', { x:5, y:3, 'text-anchor':'middle', class:'region-map-empty-text' }, 'Nothing to render for this layer'));
    return svg;
  }
  svg.setAttribute('viewBox', regionMapViewBox(bounds, viewport));
  if (grid){
    const g = regionSvg('g', { class:'region-cells' });
    grid.cells.forEach(cell => {
      if (regionCellRevealed(mask, cell.index))
        g.append(regionSvg('rect', { x:cell.x, y:cell.y, width:1, height:1, class:'region-cell', fill:regionCellColor(cell.value) }));
      else
        g.append(regionSvg('rect', { x:cell.x, y:cell.y, width:1, height:1, class:'region-fog' }));
    });
    svg.append(g);
  }
  const posById = {}; features.forEach(f => { posById[f.id] = f.position; });
  const lines = regionMapConnectionLines(region, layerId, posById);
  if (lines.length){
    const g = regionSvg('g', { class:'region-conns' });
    lines.forEach(l => g.append(regionSvg('line', { x1:l.from.x + 0.5, y1:l.from.y + 0.5, x2:l.to.x + 0.5, y2:l.to.y + 0.5, class:'region-conn-line' })));
    svg.append(g);
  }
  if (features.length){
    const g = regionSvg('g', { class:'region-features' });
    features.forEach(f => {
      const cx = f.position.x + 0.5, cy = f.position.y + 0.5;
      g.append(regionSvg('circle', { cx, cy, r:0.22, class:'region-feature-dot' }));
      if (f.label) g.append(regionSvg('text', { x:cx, y:cy - 0.35, 'text-anchor':'middle', class:'region-feature-label' }, f.label));
    });
    svg.append(g);
  }
  if (items.length){
    const g = regionSvg('g', { class:'region-map-items' });
    items.forEach(({ kind, item }) => {
      const cx = item.position.x + 0.5, cy = item.position.y + 0.5;
      const selected = opts.selected && opts.selected.kind === kind && opts.selected.id === item.id;
      const itemGroup = regionSvg('g', {
        class:'region-map-item region-' + kind + (selected ? ' selected' : ''),
        'data-region-kind':kind, 'data-region-id':item.id,
        role:typeof opts.onSelect === 'function' ? 'button' : null,
        tabindex:typeof opts.onSelect === 'function' ? '0' : null,
        'aria-label':(kind === 'pin' ? 'Pin: ' : 'Marker: ') + item.label,
      });
      if (kind === 'pin'){
        itemGroup.append(
          regionSvg('line', { x1:cx, y1:cy + 0.12, x2:cx, y2:cy + 0.48, class:'region-pin-stem' }),
          regionSvg('circle', { cx, cy, r:0.27, class:'region-pin-dot' }));
      }else{
        itemGroup.append(regionSvg('rect', { x:cx - 0.28, y:cy - 0.28, width:0.56, height:0.56, rx:0.12, class:'region-marker-dot' }));
      }
      itemGroup.append(regionSvg('text', { x:cx, y:cy - 0.42, 'text-anchor':'middle', class:'region-map-item-label' }, item.label));
      if (typeof opts.onSelect === 'function'){
        itemGroup.addEventListener('click', e => { e.stopPropagation(); opts.onSelect(kind, item.id); });
        itemGroup.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); opts.onSelect(kind, item.id); }
        });
      }
      g.append(itemGroup);
    });
    svg.append(g);
  }
  return svg;
}

// The interactive, read-only map panel for one validated region entry.
function regionMapPanel(entry, options){
  const opts = options || {};
  const region = entry && entry.region;
  const layers = regionMapLayers(region);
  const panel = h('div', { class:'region-map cosmic-' + (region && typeof region.cosmicLayer === 'string' ? region.cosmicLayer : 'middle') });
  panel.append(h('div', { class:'region-map-head' },
    h('h3', null, 'Region map'),
    h('span', { class:'hint' }, 'Cosmic layer: ' + regionCosmicLabel(region) + ' · local elevation is a separate axis')));
  if (!layers.length){ panel.append(h('p', { class:'hint' }, 'No visible local layers to map.')); return panel; }

  const initialLayer = layers.some(layer => layer.id === opts.initialLayerId) ? opts.initialLayerId : layers[0].id;
  const state = { layerId:initialLayer, viewport:{ scale:1, panX:0, panY:0 }, showText:false };

  const switchRow = h('div', { class:'region-layer-switch', role:'group', 'aria-label':'Local layer' });
  const switchBtns = layers.map(layer => {
    const b = h('button', { class:'tab', type:'button', 'aria-pressed':layer.id === state.layerId ? 'true' : 'false',
      onclick:() => {
        state.layerId = layer.id; state.viewport = { scale:1, panX:0, panY:0 };
        if (typeof opts.onLayerChange === 'function') opts.onLayerChange(layer.id, regionTerrainGrid(region, layer.id));
        draw();
      } }, layer.label || layer.id);
    return { id:layer.id, b };
  });
  switchBtns.forEach(x => switchRow.append(x.b));

  const zoom = f => { state.viewport.scale = regionClampScale(state.viewport.scale * f); draw(); };
  const fit = () => { state.viewport = { scale:1, panX:0, panY:0 }; draw(); };
  const toolbar = h('div', { class:'region-map-toolbar' },
    h('button', { class:'navbtn', type:'button', title:'Zoom out', 'aria-label':'Zoom out', onclick:() => zoom(1 / 1.5) }, '−'),
    h('button', { class:'navbtn', type:'button', title:'Zoom in', 'aria-label':'Zoom in', onclick:() => zoom(1.5) }, '+'),
    h('button', { class:'navbtn', type:'button', onclick:fit }, 'Fit'),
    h('button', { class:'navbtn', type:'button', onclick:() => { state.layerId = layers[0].id; fit(); } }, 'Reset'),
    h('button', { class:'navbtn', type:'button', 'aria-pressed':'false', onclick(){ state.showText = !state.showText; this.setAttribute('aria-pressed', state.showText ? 'true' : 'false'); draw(); } }, 'Text summary'));

  const stage = h('div', { class:'region-map-stage' });
  const meta = h('div', { class:'region-map-meta' });
  const textBox = h('pre', { class:'region-map-text', style:{ display:'none' } });

  function attachPan(svg){
    if (opts.placementMode) return;
    let active = false, sx = 0, sy = 0, box = null;
    svg.addEventListener('pointerdown', e => { active = true; sx = e.clientX; sy = e.clientY; box = svg.getBoundingClientRect && svg.getBoundingClientRect(); });
    svg.addEventListener('pointermove', e => {
      if (!active || !box || !box.width || !box.height) return;
      const grid = regionTerrainGrid(region, state.layerId);
      const mask = regionRevealMask(region, state.layerId);
      const features = regionMapVisibleFeatures(region, state.layerId, grid, mask);
      const items = regionMapVisibleItems(region, state.layerId, grid, mask);
      const bounds = regionMapBounds(grid, features.concat(items.map(x => x.item)));
      if (!bounds) return;
      const s = regionClampScale(state.viewport.scale);
      const w = (bounds.maxX - bounds.minX) / s, hh = (bounds.maxY - bounds.minY) / s;
      state.viewport.panX -= (e.clientX - sx) * (w / box.width);
      state.viewport.panY -= (e.clientY - sy) * (hh / box.height);
      sx = e.clientX; sy = e.clientY;
      svg.setAttribute('viewBox', regionMapViewBox(bounds, state.viewport));
    });
    const end = () => { active = false; };
    svg.addEventListener('pointerup', end); svg.addEventListener('pointerleave', end);
  }

  function draw(){
    switchBtns.forEach(x => x.b.setAttribute('aria-pressed', x.id === state.layerId ? 'true' : 'false'));
    const grid = regionTerrainGrid(region, state.layerId);
    const mask = regionRevealMask(region, state.layerId);
    const features = regionMapVisibleFeatures(region, state.layerId, grid, mask);
    const items = regionMapVisibleItems(region, state.layerId, grid, mask);
    const svg = regionMapSvg(region, state.layerId, state.viewport, {
      selected:opts.selected,
      onSelect:opts.placementMode === 'fog' ? null : opts.onSelect,
    });
    if (opts.placementMode){
      svg.setAttribute('class', svg.getAttribute('class') + ' is-placing');
      svg.addEventListener('click', e => {
        const point = regionMapPoint(svg, e);
        const position = regionMapPlacementPosition(region, state.layerId, point);
        if (position && typeof opts.onPlace === 'function') opts.onPlace(state.layerId, position);
      });
    }
    stage.replaceChildren(svg); attachPan(svg);
    const conns = regionMapConnectionList(region, state.layerId, features.map(f => f.id));
    meta.replaceChildren(h('p', { class:'hint' },
      features.length + ' feature' + (features.length === 1 ? '' : 's') + ' · ' +
      items.filter(x => x.kind === 'pin').length + ' pin' + (items.filter(x => x.kind === 'pin').length === 1 ? '' : 's') + ' · ' +
      items.filter(x => x.kind === 'marker').length + ' marker' + (items.filter(x => x.kind === 'marker').length === 1 ? '' : 's') + ' · ' +
      conns.length + ' connection' + (conns.length === 1 ? '' : 's') + ' on this layer' +
      (grid ? '' : ' · no serialized terrain for this layer')));
    if (conns.length)
      meta.append(h('ul', { class:'region-conn-list' }, ...conns.map(c => h('li', null, (c.type ? c.type + ': ' : '') + c.from + ' → ' + c.to))));
    if (state.showText){
      try { textBox.textContent = regionMapTextSummary(region); } catch (e){ textBox.textContent = 'Summary unavailable: ' + e.message; }
      textBox.style.display = 'block';
    } else { textBox.style.display = 'none'; }
  }

  panel.append(switchRow, toolbar, stage, meta, textBox,
    h('p', { class:'region-readonly-note hint' }, opts.footerText ||
       'Read-only view of saved data. Pin/marker and reveal/fog tools can be layered around this map; terrain editing remains deferred.'));
  draw();
  return panel;
}

// Replace the Region tab body (defined in region.js) with the map view: each
// readable region keeps its validation card and gains an interactive map.
campRegion = async function(host, name){
  const cfg = ghCfg();
  host.append(h('p', { class:'hint', style:{ textAlign:'center' } }, 'Loading saved regions…'));
  try{
    const result = await loadCampaignRegions(cfg, name);
    const wrap = h('div', { class:'region-view' },
      h('div', { class:'region-readonly' }, h('b', null, 'Region map · saved data'),
        h('span', null, 'Pins, markers, and reveal/fog can be edited. Terrain remains read-only.')));
    if (!result.regions.length){
      wrap.append(h('div', { class:'region-empty' }, h('h3', null, 'No saved regions'),
        h('p', { class:'hint' }, 'No saved regions exist for this campaign yet. Add a region JSON under campaign/' + name + '/regions/ to see it mapped here.')));
    } else result.regions.forEach(entry => {
      wrap.append(regionStatusCard(entry));
      if (entry.region && (!entry.errors || !entry.errors.length)){
        wrap.append(typeof regionEditableMapPanel === 'function' ? regionEditableMapPanel(entry, cfg, name) : regionMapPanel(entry));
      }
    });
    if (result.orphanMarkdown.length){
      wrap.append(h('div', { class:'region-warning' }, h('b', null, 'Markdown summaries without JSON'),
        h('ul', null, ...result.orphanMarkdown.map(entry => h('li', null, entry.markdown.name)))));
    }
    host.replaceChildren(wrap);
  }catch(error){
    host.replaceChildren(h('p', { class:'hint' }, 'Region data unavailable: ' + String(error && error.message || error)));
  }
};
/* ========================================================================== *
   REGION EDIT — Region Update 3 pins/markers + Update 4 reveal/fog harness.

   Every write re-parses the latest GitHub copy, applies one focused operation,
   validates the complete region, and serializes stable JSON. Hidden or fogged
   items are never exposed by the editor and cannot be changed through it.

   TODO (Region Update 5): add terrain editing behind its own guarded operation.
 * ========================================================================== */
const REGION_EDIT_KINDS = ['pin','marker'];

function regionMapItemListKey(kind){
  if (kind === 'pin') return 'pins';
  if (kind === 'marker') return 'markers';
  throw new Error('Unknown region map item kind: ' + kind);
}

function regionMapItemSlug(value){
  return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'item';
}

function regionMapAllIds(region){
  const ids = new Set();
  ['localLayers','features','connections','pins','markers','notes'].forEach(key => {
    const values = region && Array.isArray(region[key]) ? region[key] : [];
    values.forEach(value => { if (regionIsRecord(value) && typeof value.id === 'string') ids.add(value.id); });
  });
  return ids;
}

function regionMapNextItemId(region, kind, label){
  const ids = regionMapAllIds(region);
  const base = kind + '-' + regionMapItemSlug(label);
  if (!ids.has(base)) return base;
  let n = 2;
  while (ids.has(base + '-' + n)) n++;
  return base + '-' + n;
}

function regionMapEditableLayer(region, layerId){
  const layers = region && Array.isArray(region.localLayers) ? region.localLayers : [];
  return layers.find(layer => regionIsRecord(layer) && layer.id === layerId &&
    layer.visible !== false && !regionVisibilityHidden(layer)) || null;
}

function regionMapPositionRevealed(region, layerId, position){
  if (!regionIsRecord(position) || !Number.isFinite(position.x) || !Number.isFinite(position.y)) return false;
  const grid = regionTerrainGrid(region, layerId);
  const mask = regionRevealMask(region, layerId);
  if (!grid || !Array.isArray(mask)) return true;
  const x = Math.floor(position.x), y = Math.floor(position.y);
  if (x < 0 || y < 0 || x >= grid.width || y >= grid.height) return true;
  return regionCellRevealed(mask, y * grid.width + x);
}

function regionFindMapItem(region, kind, id){
  const key = regionMapItemListKey(kind);
  const items = region && Array.isArray(region[key]) ? region[key] : [];
  return items.find(item => regionIsRecord(item) && item.id === id) || null;
}

function regionMapItemEditable(region, item){
  return !!item && !!regionMapEditableLayer(region, item.layerId) &&
    !regionVisibilityHidden(item) && regionMapPositionRevealed(region, item.layerId, item.position);
}

function regionApplyMapItemEdit(region, edit, options){
  const opts = options || {};
  const valid = assertRegion(region, opts.expectedCampaign ? { expectedCampaign:opts.expectedCampaign } : undefined);
  if (!edit || !REGION_EDIT_KINDS.includes(edit.kind)) throw new Error('Choose a pin or marker');
  const next = regionClone(valid), key = regionMapItemListKey(edit.kind), items = next[key];
  const action = edit.action;

  if (action === 'place'){
    const label = regionTrim(edit.label);
    if (!label) throw new Error('A label is required');
    if (!regionMapEditableLayer(next, edit.layerId)) throw new Error('That local layer is hidden or unavailable');
    const position = regionNormalizePosition(edit.position);
    if (!regionMapPositionRevealed(next, edit.layerId, position)) throw new Error('Pins and markers cannot be placed under fog');
    const item = {
      id:regionMapNextItemId(next, edit.kind, label),
      label,
      layerId:edit.layerId,
      position,
    };
    if (edit.kind === 'marker'){
      item.characterId = regionNormalizeId(edit.characterId);
      if (!item.characterId) throw new Error('A character ID is required for a marker');
    }
    items.push(item);
  }else{
    const index = items.findIndex(item => regionIsRecord(item) && item.id === edit.id);
    if (index < 0) throw new Error('That ' + edit.kind + ' no longer exists');
    const current = items[index];
    if (!regionMapItemEditable(next, current)) throw new Error('That ' + edit.kind + ' is hidden or under fog');
    if (action === 'move'){
      if (!regionMapEditableLayer(next, edit.layerId)) throw new Error('That local layer is hidden or unavailable');
      const position = regionNormalizePosition(edit.position);
      if (!regionMapPositionRevealed(next, edit.layerId, position)) throw new Error('Pins and markers cannot be moved under fog');
      items[index] = { ...current, layerId:edit.layerId, position };
    }else if (action === 'label'){
      const label = regionTrim(edit.label);
      if (!label) throw new Error('A label is required');
      items[index] = { ...current, label };
    }else if (action === 'delete'){
      items.splice(index, 1);
    }else throw new Error('Unknown region map item action: ' + action);
  }
  return assertRegion(next, opts.expectedCampaign ? { expectedCampaign:opts.expectedCampaign } : undefined);
}

function regionTransformMapItemEdit(currentText, path, campaignName, expectedRegionId, edit){
  const current = assertRegionJson(currentText, { expectedCampaign:campaignName, expectedId:expectedRegionId });
  const next = regionApplyMapItemEdit(current, edit, { expectedCampaign:campaignName });
  assertRegionWriteTarget(path, campaignName, next, currentText);
  return serializeRegion(next);
}

function regionMapEditCommitMessage(edit){
  const action = edit.action === 'label' ? 'Label' : edit.action.charAt(0).toUpperCase() + edit.action.slice(1);
  return action + ' region ' + edit.kind + ' via Game';
}

async function regionSaveMapItemEdit(cfg, entry, campaignName, edit){
  const path = entry && entry.json && entry.json.path;
  const expectedRegionId = entry && entry.region && entry.region.id;
  if (!path || !expectedRegionId) throw new Error('Region write target is unavailable');
  let savedText = '';
  await ghUpdate(cfg, path, currentText => {
    savedText = regionTransformMapItemEdit(currentText, path, campaignName, expectedRegionId, edit);
    return savedText;
  }, regionMapEditCommitMessage(edit), {
    guard:currentText => assertRegionJson(currentText, { expectedCampaign:campaignName, expectedId:expectedRegionId }),
  });
  entry.region = assertRegionJson(savedText, { expectedCampaign:campaignName, expectedId:expectedRegionId });
  entry.errors = [];
  return entry.region;
}

function regionEditableMapPanel(entry, cfg, campaignName){
  const root = h('div', { class:'region-edit-wrap' });
  const firstLayer = regionMapLayers(entry.region)[0];
  const state = {
    mode:null, kind:'pin', label:'', characterId:'', selected:null, status:'', saving:false,
    activeLayerId:firstLayer ? firstLayer.id : '',
  };

  const selectedItem = () => state.selected &&
    regionFindMapItem(entry.region, state.selected.kind, state.selected.id);

  async function save(edit, success){
    state.saving = true; state.status = 'Saving to the region file…'; draw();
    try{
      await regionSaveMapItemEdit(cfg, entry, campaignName, edit);
      state.mode = null; state.selected = null; state.status = success;
      toast(success);
    }catch(error){
      state.status = 'Failed: ' + String(error && error.message || error);
    }finally{
      state.saving = false; draw();
    }
  }

  async function saveReveal(edit, success){
    state.saving = true; state.status = 'Saving reveal state to the region file…'; draw();
    try{
      await regionSaveRevealEdit(cfg, entry, campaignName, edit);
      state.status = success; toast(success);
    }catch(error){
      state.status = 'Failed: ' + String(error && error.message || error);
    }finally{
      state.saving = false; draw();
    }
  }

  function beginPlace(kind, label, characterId){
    const clean = regionTrim(label);
    if (!clean){ state.status = 'Enter a label before placing it.'; draw(); return; }
    if (kind === 'marker' && !REGION_ID_RE.test(regionNormalizeId(characterId) || '')){
      state.status = 'Marker character ID must use lowercase letters, numbers, and internal hyphens.'; draw(); return;
    }
    state.kind = kind; state.label = clean; state.characterId = regionNormalizeId(characterId);
    state.selected = null; state.mode = 'place'; state.status = 'Click a revealed map position to place the ' + kind + '.'; draw();
  }

  function draw(){
    const item = selectedItem();
    if (state.selected && (!item || !regionMapItemEditable(entry.region, item))) state.selected = null;

    const kind = h('select', { 'aria-label':'Map item type' },
      h('option', { value:'pin' }, 'Pin'),
      h('option', { value:'marker' }, 'Marker'));
    kind.value = state.kind;
    const label = h('input', { type:'text', maxlength:'120', placeholder:'Label', value:state.label, 'aria-label':'New pin or marker label' });
    const characterId = h('input', { type:'text', maxlength:'80', placeholder:'Character ID (marker)', value:state.characterId,
      'aria-label':'Marker character ID' });
    const place = h('button', { class:'navbtn primary', type:'button' }, state.mode === 'place' ? 'Choose a map position…' : 'Place on map');
    place.disabled = state.saving;
    kind.onchange = () => { state.kind = kind.value; characterId.style.display = state.kind === 'marker' ? '' : 'none'; };
    characterId.style.display = state.kind === 'marker' ? '' : 'none';
    place.onclick = () => beginPlace(kind.value, label.value, characterId.value);

    const create = h('div', { class:'region-edit-create' },
      h('label', null, 'Add', kind), label, characterId, place);

    const activeGrid = regionTerrainGrid(entry.region, state.activeLayerId);
    const fogToggle = h('button', { class:'navbtn', type:'button', onclick:() => {
      state.mode = state.mode === 'fog' ? null : 'fog';
      state.selected = null;
      state.status = state.mode === 'fog'
        ? 'Tap a terrain cell to toggle it revealed or fogged.'
        : 'Reveal/fog tool closed.';
      draw();
    } }, state.mode === 'fog' ? 'Done toggling' : 'Toggle cells');
    const revealAll = h('button', { class:'navbtn', type:'button', onclick:() =>
      saveReveal({ action:'reveal-all', layerId:state.activeLayerId }, 'Layer fully revealed.') }, 'Reveal all');
    const fogAll = h('button', { class:'navbtn', type:'button', onclick:() =>
      saveReveal({ action:'fog-all', layerId:state.activeLayerId }, 'Layer fully fogged.') }, 'Fog all');
    [fogToggle, revealAll, fogAll].forEach(button => { button.disabled = state.saving || !activeGrid; });
    const fogControls = h('div', { class:'region-fog-controls' },
      h('div', { class:'region-editor-head' }, h('h3', null, 'Reveal / fog'),
        h('span', { class:'hint' }, activeGrid
          ? activeGrid.width + ' × ' + activeGrid.height + ' cell mask'
          : 'unavailable · this layer has no terrain grid')),
      h('div', { class:'toolrow' }, fogToggle, revealAll, fogAll));

    const inspector = h('div', { class:'region-edit-inspector' });
    if (!item){
      inspector.append(h('span', { class:'hint' }, 'Select a visible pin or marker on the map to move, relabel, or delete it.'));
    }else{
      const editLabel = h('input', { type:'text', maxlength:'120', value:item.label, 'aria-label':'Selected item label' });
      const saveLabel = h('button', { class:'navbtn', type:'button', onclick:() =>
        save({ action:'label', kind:state.selected.kind, id:state.selected.id, label:editLabel.value }, 'Label saved.') }, 'Save label');
      const move = h('button', { class:'navbtn', type:'button', onclick:() => {
        state.mode = 'move'; state.status = 'Click a revealed map position to move ' + item.label + '.'; draw();
      } }, state.mode === 'move' ? 'Choose a map position…' : 'Move');
      const remove = h('button', { class:'navbtn region-delete', type:'button', onclick:() => {
        if (confirm('Delete ' + item.label + '?')) save({ action:'delete', kind:state.selected.kind, id:state.selected.id }, item.label + ' deleted.');
      } }, 'Delete');
      [saveLabel, move, remove].forEach(button => { button.disabled = state.saving; });
      inspector.append(h('b', null, state.selected.kind === 'pin' ? 'Selected pin' : 'Selected marker'),
        editLabel, saveLabel, move, remove);
    }

    const map = regionMapPanel(entry, {
      initialLayerId:state.activeLayerId,
      selected:state.selected,
      placementMode:state.mode,
      onLayerChange:(layerId) => { state.activeLayerId = layerId; state.mode = null; state.selected = null; draw(); },
      onSelect:(itemKind, id) => {
        if (state.saving) return;
        const next = regionFindMapItem(entry.region, itemKind, id);
        if (!regionMapItemEditable(entry.region, next)) return;
        state.selected = { kind:itemKind, id }; state.mode = null; state.status = ''; draw();
      },
      onPlace:(layerId, position) => {
        if (state.saving) return;
        if (state.mode === 'fog'){
          const grid = regionTerrainGrid(entry.region, layerId);
          if (!grid){ state.status = 'Reveal/fog is unavailable without a terrain grid.'; draw(); return; }
          const index = position.y * grid.width + position.x;
          const currentMask = regionRevealMask(entry.region, layerId);
          const revealed = !regionCellRevealed(currentMask, index);
          saveReveal({ action:'cell', layerId, index, revealed },
            revealed ? 'Cell revealed.' : 'Cell fogged.');
        }else if (state.mode === 'place'){
          save({ action:'place', kind:state.kind, label:state.label, characterId:state.characterId, layerId, position },
            (state.kind === 'pin' ? 'Pin' : 'Marker') + ' placed.');
        }else if (state.mode === 'move' && state.selected){
          const moving = selectedItem();
          save({ action:'move', kind:state.selected.kind, id:state.selected.id, layerId, position },
            (moving ? moving.label : 'Map item') + ' moved.');
        }
      },
      footerText:'Pins and markers are editable on revealed positions. Reveal/fog changes only the selected layer mask. GM-only data stays hidden; terrain remains read-only.',
    });

    const status = h('div', { class:'region-edit-status hint', role:'status' }, state.status);
    root.replaceChildren(h('section', { class:'region-editor' },
      h('div', { class:'region-editor-head' }, h('h3', null, 'Pins & markers'),
        h('span', { class:'hint' }, 'place · move · label · delete')),
      create, inspector), h('section', { class:'region-editor' }, fogControls, status), map);
  }

  draw();
  return root;
}
/* ========================================================================== *
   REGION REVEAL EDIT — Region Update 4.

   Small DOM-free helpers own the exact reveal-mask math. Every persisted edit
   re-parses the latest region JSON, changes only revealed.layers[layerId],
   validates the whole region, and serializes stable JSON.
 * ========================================================================== */
function regionRevealGridOrThrow(region, layerId){
  const grid = regionTerrainGrid(region, layerId);
  if (!grid) throw new Error('Reveal/fog requires a complete terrain grid on that layer');
  return grid;
}

function regionRevealExactMask(region, layerId){
  const grid = regionRevealGridOrThrow(region, layerId);
  const mask = regionRevealMask(region, layerId);
  return Array.from({ length:grid.width * grid.height }, (_, index) =>
    regionCellRevealed(mask, index) ? 1 : 0);
}

function regionRevealEditCopy(region){
  const next = regionClone(region);
  if (!regionIsRecord(next.revealed)) next.revealed = {};
  if (!regionIsRecord(next.revealed.layers)) next.revealed.layers = {};
  return next;
}

function regionSetCellRevealed(region, layerId, index, revealed){
  const grid = regionRevealGridOrThrow(region, layerId);
  const count = grid.width * grid.height;
  if (!Number.isInteger(index) || index < 0 || index >= count) throw new Error('Reveal cell index is outside the terrain grid');
  const next = regionRevealEditCopy(region);
  const mask = regionRevealExactMask(region, layerId);
  mask[index] = revealed ? 1 : 0;
  next.revealed.layers[layerId] = mask;
  return next;
}

function regionRevealAll(region, layerId){
  regionRevealGridOrThrow(region, layerId);
  const next = regionRevealEditCopy(region);
  delete next.revealed.layers[layerId];  // absence of a mask means fully revealed
  return next;
}

function regionFogAll(region, layerId){
  const grid = regionRevealGridOrThrow(region, layerId);
  const next = regionRevealEditCopy(region);
  next.revealed.layers[layerId] = Array(grid.width * grid.height).fill(0);
  return next;
}

function regionApplyRevealEdit(region, edit, options){
  const opts = options || {};
  const valid = assertRegion(region, opts.expectedCampaign ? { expectedCampaign:opts.expectedCampaign } : undefined);
  if (!edit || !regionMapEditableLayer(valid, edit.layerId)) throw new Error('That local layer is hidden or unavailable');
  let next;
  if (edit.action === 'cell') next = regionSetCellRevealed(valid, edit.layerId, edit.index, edit.revealed);
  else if (edit.action === 'reveal-all') next = regionRevealAll(valid, edit.layerId);
  else if (edit.action === 'fog-all') next = regionFogAll(valid, edit.layerId);
  else throw new Error('Unknown reveal/fog action: ' + String(edit.action || ''));
  return assertRegion(next, opts.expectedCampaign ? { expectedCampaign:opts.expectedCampaign } : undefined);
}

function regionTransformRevealEdit(currentText, path, campaignName, expectedRegionId, edit){
  const current = assertRegionJson(currentText, { expectedCampaign:campaignName, expectedId:expectedRegionId });
  const next = regionApplyRevealEdit(current, edit, { expectedCampaign:campaignName });
  assertRegionWriteTarget(path, campaignName, next, currentText);
  return serializeRegion(next);
}

function regionRevealCommitMessage(edit){
  if (edit.action === 'reveal-all') return 'Reveal all region cells via Game';
  if (edit.action === 'fog-all') return 'Fog all region cells via Game';
  return (edit.revealed ? 'Reveal' : 'Fog') + ' region cell via Game';
}

async function regionSaveRevealEdit(cfg, entry, campaignName, edit){
  const path = entry && entry.json && entry.json.path;
  const expectedRegionId = entry && entry.region && entry.region.id;
  if (!path || !expectedRegionId) throw new Error('Region write target is unavailable');
  let savedText = '';
  await ghUpdate(cfg, path, currentText => {
    savedText = regionTransformRevealEdit(currentText, path, campaignName, expectedRegionId, edit);
    return savedText;
  }, regionRevealCommitMessage(edit), {
    guard:currentText => assertRegionJson(currentText, { expectedCampaign:campaignName, expectedId:expectedRegionId }),
  });
  entry.region = assertRegionJson(savedText, { expectedCampaign:campaignName, expectedId:expectedRegionId });
  entry.errors = [];
  return entry.region;
}
/* ========================================================================== *
   GAUGE CONTROLS — one small, shared meter+number+nudge control used by BOTH
   the Runtime gauges panel and the Mortal survival panel. Pure UI (uses h()),
   no parsing or network. Each control returns its node plus read() -> the
   clamped { current, max }. Clamping and the meter ARIA live here so the two
   panels can't drift apart.
 * ========================================================================== */
function gaugeClampInt(value, max){
  let n = Math.round(Number(value));
  if(!Number.isFinite(n)) n = 0;
  return Math.max(0, Math.min(max, n));
}

// opts: { label, current, max } -> { node, read }
function gaugeControl(opts){
  const o = opts || {};
  const label = String(o.label || '');
  const max = Math.max(1, Math.round(Number(o.max)) || 100);
  const number = h('input', { class:'gauge-number', type:'number', min:'0', max:String(max), step:'1',
    inputmode:'numeric', 'aria-label':label, value:String(gaugeClampInt(o.current, max)) });
  const fill = h('div', { class:'gauge-fill' });
  const track = h('div', { class:'gauge-track', role:'meter', 'aria-label':label,
    'aria-valuemin':'0', 'aria-valuemax':String(max), 'aria-valuenow':String(gaugeClampInt(o.current, max)) }, fill);
  const paint = ()=>{ const n = gaugeClampInt(number.value, max); number.value = String(n);
    fill.style.width = ((n/max)*100)+'%'; track.setAttribute('aria-valuenow', String(n)); };
  const nudge = d=>{ number.value = String((Number(number.value)||0) + d); paint(); };
  number.oninput = paint; number.onchange = paint; paint();
  const node = h('div', { class:'gauge' },
    h('div', { class:'gauge-head' }, h('b', null, label),
      h('span', { class:'gauge-readout' }, number, ' / '+max)),
    track,
    h('div', { class:'gauge-nudges' },
      h('button', { class:'toolbtn', type:'button', 'aria-label':'−5 '+label, onclick:()=>nudge(-5) }, '−5'),
      h('button', { class:'toolbtn', type:'button', 'aria-label':'−1 '+label, onclick:()=>nudge(-1) }, '−1'),
      h('button', { class:'toolbtn', type:'button', 'aria-label':'+1 '+label, onclick:()=>nudge(1) }, '+1'),
      h('button', { class:'toolbtn', type:'button', 'aria-label':'+5 '+label, onclick:()=>nudge(5) }, '+5')));
  return { node, read:()=>({ current: gaugeClampInt(number.value, max), max }) };
}
/* ========================================================================== *
   RUNTIME GAUGES — a manual editor for the four magical/divine runtime gauges
   (Personal Mana, Divine Mana, Divine Hunger, Strain) stored in the selected
   campaign's Campaign State Tracker. A SEPARATE layer from the mortal survival
   reserves; this panel never touches survival. No automatic mechanics: it only
   reads and writes the four runtime gauge lines. Parsing/writing live in
   campaign-parse.js; the gauge control is shared from gauge-controls.js.

   Layered onto the Resume view by wrapping campResume. It loads BEFORE
   survival.js so the panel order is: Where We Are -> Runtime gauges ->
   Mortal survival.
 * ========================================================================== */
const campResumeBeforeRuntime = campResume;

function runtimeEditor(cfg, trackerPath, parsed, host, campaignName){
  const state = parsed || {};
  const reads = {};
  const grid = h('div', { class:'gauge-grid' });
  RUNTIME_GAUGES.forEach(g=>{
    const gv = state[g.key] || { current:0, max:RUNTIME_FALLBACK_MAX };
    const ctl = gaugeControl({ label:g.label, current:gv.current, max:gv.max });
    reads[g.key] = ctl.read;
    grid.append(ctl.node);
  });

  const status = h('div', { class:'gauge-status hint' });
  const save = h('button', { class:'navbtn primary', type:'button' }, 'Save runtime gauges');
  save.onclick = async ()=>{
    save.disabled = true; status.textContent = 'Saving to the campaign tracker…';
    const next = {};
    RUNTIME_GAUGES.forEach(g=>{ next[g.key] = reads[g.key](); });
    try{
      await ghUpdate(cfg, trackerPath, text=>updateRuntimeState(text, next), 'Update runtime gauges via Game', { guard:assertRuntimeTracker });
      toast('Runtime gauges saved.'); host.replaceChildren(); await campResume(host, campaignName);
    }catch(e){ status.textContent = 'Failed: '+e.message; save.disabled = false; }
  };

  return h('div', { class:'gauge-panel runtime-panel' },
    h('div', { class:'gauge-title' }, h('h3', null, 'Runtime gauges'),
      h('span', { class:'hint' }, 'magical & divine runtime state')),
    h('p', { class:'hint' }, 'Magical and divine runtime state. These values are separate from the mortal survival reserves.'),
    grid,
    h('div', { class:'toolrow' }, save), status);
}

campResume = async function(host, name){
  await campResumeBeforeRuntime(host, name);
  if(!ghReady()) return;
  try{
    const cfg = ghCfg(), files = await campaignFiles(cfg, name);
    if(!files.tracker) return;
    const r = await ghGetText(cfg, files.tracker); if(!r) return;
    host.append(runtimeEditor(cfg, files.tracker, parseRuntime(r.text), host, name));
  }catch(e){ host.append(h('p', { class:'hint' }, 'Runtime gauges unavailable: '+e.message)); }
};
/* ========================================================================== *
   SURVIVAL STATE — a small, manual editor layered onto the Game Resume view.
   No automatic penalties yet: this only reads/writes the campaign tracker.
 * ========================================================================== */
const campResumeWithoutSurvival=campResume;

function survivalEditor(cfg, trackerPath, parsed, host, campaignName){
  const state=normalizeSurvivalState(parsed.survival);
  const reads={};
  let conditions=state.conditions.slice();
  const status=h('div',{class:'hint gauge-status'});
  const grid=h('div',{class:'gauge-grid'});

  SURVIVAL_GAUGES.forEach(g=>{
    const gauge=state[g.key];
    const ctl=gaugeControl({ label:g.label, current:gauge.current, max:gauge.max });
    reads[g.key]=ctl.read;
    grid.append(ctl.node);
  });

  const conditionList=h('div',{class:'survival-conditions'});
  const conditionInput=h('input',{placeholder:'Add a condition — Bleeding, Freezing, Poisoned…', maxlength:'80'});
  const drawConditions=()=>{
    conditionList.replaceChildren();
    if(!conditions.length){ conditionList.append(h('span',{class:'hint'},'No named conditions.')); return; }
    conditions.forEach((name,i)=> conditionList.append(h('span',{class:'condition-chip'}, name,
      h('button',{type:'button','aria-label':'Remove '+name, onclick:()=>{ conditions.splice(i,1); drawConditions(); }},'×'))));
  };
  const addCondition=()=>{
    const clean=conditionInput.value.replace(/[\r\n|]+/g,' ').trim().slice(0,80);
    if(!clean) return;
    if(!conditions.some(x=>x.toLowerCase()===clean.toLowerCase())) conditions.push(clean);
    conditionInput.value=''; drawConditions();
  };
  conditionInput.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); addCondition(); } };
  drawConditions();

  const save=h('button',{class:'navbtn primary', type:'button'},'Save survival state');
  save.onclick=async()=>{
    save.disabled=true; status.textContent='Saving to the campaign tracker…';
    const next={conditions};
    SURVIVAL_GAUGES.forEach(g=>{ next[g.key]=reads[g.key](); });
    try{
      await ghUpdate(cfg, trackerPath, text=>updateSurvivalState(text,next), 'Update survival state via Game', {guard:assertTracker});
      toast('Survival state saved.'); host.replaceChildren(); await campResume(host,campaignName);
    }catch(e){ status.textContent='Failed: '+e.message; save.disabled=false; }
  };

  return h('div',{class:'gauge-panel survival-panel'},
    h('div',{class:'gauge-title'}, h('h3',null,'Mortal survival'), h('span',{class:'hint'},'manual state · higher reserves are better')),
    h('p',{class:'hint'}, state.present
      ? 'These values describe the body. They are separate from Personal Mana, Divine Mana, Divine Hunger, and Strain.'
      : 'This tracker predates survival gauges. Saving will initialize the five reserves at 100 without adding automatic penalties.'),
    grid,
    h('div',{class:'survival-condition-editor'}, h('label',null,'Named wounds and hazards'), conditionList,
      h('div',{class:'survival-add'}, conditionInput, h('button',{class:'navbtn', type:'button', onclick:addCondition},'Add condition'))),
    h('div',{class:'toolrow'},save), status);
}

campResume=async function(host,name){
  await campResumeWithoutSurvival(host,name);
  if(!ghReady()) return;
  try{
    const cfg=ghCfg(), files=await campaignFiles(cfg,name);
    if(!files.tracker) return;
    const r=await ghGetText(cfg,files.tracker); if(!r) return;
    host.append(survivalEditor(cfg,files.tracker,parseTracker(r.text),host,name));
  }catch(e){ host.append(h('p',{class:'hint'},'Survival editor unavailable: '+e.message)); }
};
/* ---------- boot ----------------------------------------------------------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
// flush the in-memory state to IndexedDB when the app is backgrounded/closed
window.addEventListener('pagehide', flushState);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden'){ flushState(); if(ghReady()){ clearTimeout(syncTimer); syncToRepo({silent:true}); } } });   // push any pending change on backgrounding (no-op if nothing changed)
(async function init(){
  try{ DB = await loadState(); }catch(e){ DB = defaults(); }
  if(navigator.storage && navigator.storage.persist){ try{ navigator.storage.persist(); }catch(e){} }   // resist eviction
  applyMode();
  const initialView=initialOpenViewName(DB);
  if(initialView) VIEW={name:initialView};   // null leaves the untouched first-run screen in charge
  render();
  firstRun();
  // self-heal: load from the repo on open when asked to converge devices, OR whenever the
  // local journal came up empty but a repo file exists (recovers from storage eviction).
  if(ghReady() && (DB.syncOnOpen || !(DB.creations && DB.creations.length))) loadFromRepo({silent:true});
})();
</script>
