<head>

<title>The Vael Field Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---------- design tokens (extracted from the printed kits) ---------- */
  :root{
    --paper:#faf4e6;          /* parchment background          */
    --paper-card:#fbf7ec;     /* keepsake card body            */
    --paper-slot:#f0e7d0;     /* field/slot fill               */
    --ink:#2e2a24;            /* titles, dark brown-charcoal   */
    --ink-soft:#4a463b;       /* body text                     */
    --gold:#b98e3c;           /* frame + section labels        */
    --gold-soft:#cdbf9a;      /* rules, faint lines            */
    --green:#3e6b4f;          /* sprigs, footers, emblem       */
    --slate:#3e4a6b;          /* filled-in example answers     */
    --hint:#9a8f7a;           /* italic hints / subtitles      */
    --shadow:60 52 30;
    --maxw:1080px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink-soft);
    font-family:'EB Garamond', Georgia, 'Times New Roman', serif;
    font-size:17px;
    line-height:1.5;
    -webkit-text-size-adjust:100%;
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3{ font-weight:600; color:var(--ink); margin:0; }
  ::selection{ background:#e7ddc2; }
  /* touch-action:manipulation — on iPad, stops Safari from holding a tap to see if it's a
     double-tap-to-zoom, which otherwise delays or swallows quick taps (finicky buttons). */
  button{ font-family:inherit; cursor:pointer; touch-action:manipulation; }
  a{ color:var(--green); }

  /* serif-display fallback: EB Garamond loads if online; system serif otherwise */
  .display{ font-family:'EB Garamond', Georgia, serif; font-weight:600; letter-spacing:.01em; }
  .hand{ font-family:'Caveat', 'Segoe Script', cursive; }
  .kicker{ font-size:12px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold); }
  .hint{ color:var(--hint); font-style:italic; }

  /* ---------- app shell ---------- */
  #app{ max-width:var(--maxw); margin:0 auto; padding:24px 18px 96px; }
  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:12px; flex-wrap:nowrap;
    background:linear-gradient(var(--paper) 78%, transparent);
    padding:10px 4px 14px; margin:-8px -4px 8px;
  }
  /* one stable row that scrolls sideways if crowded — so toggling Cozy/Full never
     changes the bar's height and the page below it never jumps. */
  .navmid{ display:flex; flex-wrap:nowrap; align-items:center; gap:10px; flex:1 1 auto; min-width:0; overflow-x:auto; scrollbar-width:none; }
  .navmid::-webkit-scrollbar{ display:none; }
  .navmid .navbtn{ flex:0 0 auto; }
  /* utility cluster: mode toggle + the ⋯ More sheet — fixed on the right, always visible */
  .navutil{ display:flex; align-items:center; gap:10px; flex:0 0 auto; }
  .moremenu{ display:flex; flex-direction:column; gap:8px; }
  .moremenu .navbtn{ width:100%; }
  /* drop the wordmark when space is tight so the bar fits one line (logo still links home) */
  @media (max-width:1100px){ .brand b{ display:none; } }
  .brand{ display:flex; align-items:center; gap:10px; cursor:pointer; flex:0 0 auto; }
  .brand .mark{ width:30px; height:30px; color:var(--green); flex:0 0 auto; }
  .brand b{ font-family:'EB Garamond',serif; font-weight:600; color:var(--ink); font-size:18px; white-space:nowrap; }
  .navbtn{
    border:1.5px solid var(--gold-soft); background:#fff8; color:var(--ink-soft);
    border-radius:999px; padding:7px 15px; font-size:15px; white-space:nowrap;
  }
  .navbtn:hover{ border-color:var(--gold); }
  .navbtn.primary{ background:#eef0e4; border-color:#cdd4b9; color:#4d5a36; }

  /* ---------- decorative page frame ---------- */
  .framed{
    position:relative; background:var(--paper);
    border:1.5px solid var(--gold); border-radius:3px;
    padding:34px 30px 30px;
    box-shadow:0 0 0 4px var(--paper), 0 0 0 5.5px var(--gold-soft);
    margin:6px 4px 0;
  }
  .framed > .sprig{ position:absolute; width:34px; height:22px; color:var(--green); opacity:.9; }
  .sprig.tl{ top:10px; left:12px; }
  .sprig.tr{ top:10px; right:12px; transform:scaleX(-1); }
  .sprig.bl{ bottom:10px; left:12px; transform:scaleY(-1); }
  .sprig.br{ bottom:10px; right:12px; transform:scale(-1,-1); }
  .pagetitle{ text-align:center; margin-bottom:6px; }
  .pagetitle h2{ font-size:34px; }
  .divider{ display:flex; align-items:center; justify-content:center; gap:10px; margin:8px 0 4px; color:var(--gold); }
  .divider .rule{ width:70px; height:1px; background:var(--gold-soft); }
  .divider .o{ width:7px; height:7px; border:1.4px solid var(--gold); border-radius:50%; }
  .divider .dot{ width:5px; height:5px; background:var(--gold); border-radius:50%; }
  .subtitle{ text-align:center; color:var(--hint); font-style:italic; margin:2px 0 22px; }
  .pagefoot{ text-align:center; color:var(--green); font-style:italic; font-size:14px; margin-top:26px; opacity:.85; }

  /* ---------- home ---------- */
  .cover{ text-align:center; padding:30px 10px 24px; }
  .cover .emblem{ width:150px; height:150px; color:var(--green); margin:14px auto 18px; }
  .cover h1{ font-size:46px; }
  .cover .sub{ color:var(--gold); letter-spacing:.18em; text-transform:uppercase; font-size:13px; margin-top:8px; }
  .cover .tag{ color:var(--hint); font-style:italic; margin-top:16px; }
  .shelf{ margin-top:26px; }
  .shelf h3{ font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); border-bottom:1px solid var(--gold-soft); padding-bottom:8px; margin-bottom:16px; }
  /* warm hand-lettered category label inside a shelf — keeps the browsing playful, not filing-cabinet.
     Clickable to collapse/expand; collections also carry a × to remove them. */
  .shelf-cat{ font-family:'Caveat',cursive; font-size:22px; color:var(--green); margin:18px 0 8px; display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none; touch-action:manipulation; }
  .shelf-cat:first-of-type{ margin-top:4px; }
  .shelf-cat .chev{ font-size:13px; color:var(--gold); width:13px; flex:0 0 auto; }
  .shelf-cat .cat-del{ margin-left:auto; font-family:system-ui,sans-serif; font-size:18px; line-height:1; color:var(--gold-soft); padding:0 6px; }
  .shelf-cat .cat-del:hover{ color:#b0563f; }
  .grid-cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; margin-bottom:6px; }
  .pick{
    position:relative;
    text-align:left; background:var(--paper-card); border:1.5px solid #e6dcc4; border-radius:10px;
    padding:15px 16px; min-height:104px; display:flex; flex-direction:column; gap:5px;
    min-width:0; overflow-wrap:anywhere; word-break:break-word; touch-action:manipulation;
    transition:transform .08s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .pick:hover{ transform:translateY(-2px); border-color:var(--gold); box-shadow:0 10px 22px -16px rgba(var(--shadow)/.5); }
  .pick .ribbon{ width:34px; height:5px; border-radius:3px; margin-bottom:3px; }
  .pick b{ color:var(--ink); font-size:18px; font-weight:600; overflow-wrap:anywhere; word-break:break-word; padding-right:42px; }
  .pick small{ color:var(--hint); font-style:italic; font-size:14px; line-height:1.35; overflow-wrap:anywhere; }
  /* corner controls — her little organizing touches: ★ pin (favorites) and + (collections) */
  .pick .fav, .pick .addto{ position:absolute; top:8px; line-height:1; color:var(--gold-soft); cursor:pointer; user-select:none; }
  .pick .fav{ right:11px; font-size:17px; }
  .pick .addto{ right:32px; font-size:19px; font-weight:600; }
  .pick .fav:hover, .pick .addto:hover{ color:var(--gold); }
  .pick .fav.on{ color:var(--gold); }

  /* ---------- worksheet editor ---------- */
  .editor-wrap{ display:grid; grid-template-columns:minmax(0,1fr) 446px; gap:40px; align-items:start; }
  @media (max-width:900px){ .editor-wrap{ grid-template-columns:1fr; } .card-col{ order:-1; } }
  .field{ margin-bottom:20px; }
  .field > label{ display:block; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
  .field .fhint{ color:var(--hint); font-style:italic; font-size:14px; margin-bottom:6px; }
  .field input, .field textarea{
    width:100%; border:none; border-bottom:1.5px solid var(--gold-soft); background:transparent;
    font-family:inherit; font-size:19px; color:var(--ink-soft); padding:4px 2px 8px; resize:none; line-height:1.5;
  }
  .field input:focus, .field textarea:focus{ outline:none; border-bottom-color:var(--green); }
  .field input::placeholder, .field textarea::placeholder{ color:#b6ad96; font-style:italic; }
  .chips{ display:flex; flex-wrap:wrap; gap:9px; }
  .chip{
    display:inline-flex; align-items:center; gap:7px; border:1.5px solid var(--gold-soft);
    background:#fbf8ef; color:#7a735f; border-radius:999px; padding:7px 14px 7px 11px; font-size:16px;
  }
  .chip .dot{ width:10px; height:10px; border-radius:50%; }
  .chip.active{ color:var(--ink-soft); }
  .toolrow{ display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }

  /* ---------- doodle ---------- */
  .doodle{ border:2px dashed var(--gold-soft); border-radius:6px; background:var(--paper-slot); padding:8px; }
  .doodle canvas{ display:block; width:100%; height:auto; border-radius:3px; background:#fffdf7; touch-action:none; cursor:crosshair; }
  .doodle .palette{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .swatch{ width:24px; height:24px; border-radius:50%; border:2px solid #0001; padding:0; }
  .swatch.sel{ outline:2px solid var(--ink); outline-offset:2px; }
  .toolbtn{ border:1.5px solid var(--gold-soft); background:#fff8; border-radius:8px; padding:5px 10px; font-size:14px; color:var(--ink-soft); }
  .doodle .ph{ text-align:center; color:var(--hint); font-style:italic; font-size:14px; padding:6px 0 2px; }

  /* ---------- keepsake card ---------- */
  .card-col{ display:flex; flex-direction:column; align-items:center; gap:14px; position:sticky; top:64px; }
  .keepsake{
    width:430px; max-width:100%; background:var(--paper-card);
    border:1px solid #e6dfca; border-radius:6px; overflow:hidden;
    box-shadow:0 1px 0 #fffdf6 inset, 0 18px 40px -22px rgba(var(--shadow)/.45), 0 2px 8px -4px rgba(var(--shadow)/.2);
  }
  .keepsake.tilt{ transform:rotate(-1deg); }
  .keepsake .ribbon{ height:7px; }
  .keepsake .body{ padding:24px 26px 26px; }
  .keepsake .head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; gap:10px; }
  .keepsake .head .kick{ font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:#a39a80; }
  .keepsake .head .word{ font-size:18px; }
  .keepsake .frame{ border:2px dashed var(--cardframe,#cdbf9a); border-radius:4px; padding:7px; background:var(--cardbg,#f6efde); margin-bottom:18px; }
  .keepsake .frame img{ display:block; width:100%; height:210px; object-fit:contain; border-radius:2px; }
  .keepsake .frame .empty{ height:160px; display:flex; align-items:center; justify-content:center; text-align:center; color:#b6ad96; font-style:italic; font-size:14px; padding:0 14px; }
  .keepsake h3.name{ font-size:34px; line-height:1.08; font-weight:600; margin-bottom:2px; }
  .keepsake .sub{ font-style:italic; color:var(--hint); font-size:16px; margin-bottom:14px; }
  .keepsake .rows{ border-top:1px solid #ece5d2; padding-top:14px; display:flex; flex-direction:column; gap:11px; }
  .keepsake .rw .rl{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#a39a80; margin-bottom:2px; }
  .keepsake .rw .rv{ font-size:16px; color:var(--ink-soft); line-height:1.4; }
  .keepsake .elt{ display:flex; align-items:center; gap:8px; }
  .keepsake .elt .dot{ width:9px; height:9px; border-radius:50%; }
  .keepsake .quote{ margin-top:16px; padding:13px 15px; background:var(--cardbg,#f6efde); border-left:3px solid var(--accent,#b98e3c); border-radius:2px; }
  .keepsake .quote .hand{ font-size:20px; line-height:1.35; color:#54503f; }
  .keepsake .cardfoot{ margin-top:16px; text-align:center; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#bcb39a; }

  /* ---------- ledger / grids / chart ---------- */
  .ledger{ width:100%; border-collapse:collapse; }
  .ledger th{ text-align:left; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); padding:6px 10px; font-weight:600; }
  .ledger td{ padding:5px 10px; }
  .ledger input{ width:100%; border:none; border-bottom:1.5px solid var(--gold-soft); background:transparent; font-family:inherit; font-size:18px; color:var(--ink-soft); padding:4px 2px; }
  .ledger input:focus{ outline:none; border-bottom-color:var(--green); }
  .ledger .locked input{ color:var(--slate); font-style:italic; }
  .ledger .open-flag{ font-size:13px; color:#b07a2e; }
  .specgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media (max-width:680px){ .specgrid{ grid-template-columns:repeat(2,1fr); } }
  .specslot{ background:var(--paper-slot); border:1.5px dashed var(--gold-soft); border-radius:8px; padding:10px; text-align:center; }
  .specslot .circle{ width:100%; aspect-ratio:1/1; border:1.5px solid var(--gold-soft); border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#fffdf7; }
  .specslot .circle img{ width:100%; height:100%; object-fit:cover; }
  .specslot .circle span{ color:#b6ad96; font-style:italic; font-size:12px; }
  .specslot label{ display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin:8px 0 4px; }
  .specslot input{ width:100%; border:none; border-bottom:1px solid var(--gold-soft); background:transparent; text-align:center; font-family:inherit; font-size:15px; color:var(--ink-soft); padding:2px; }
  .palette-grid{ display:flex; gap:12px; flex-wrap:wrap; }
  .palette-grid .pw{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .palette-grid input[type=color]{ width:46px; height:46px; border:1.5px solid var(--gold-soft); border-radius:8px; background:none; padding:2px; }
  .palette-grid input[type=text]{ width:74px; border:none; border-bottom:1px solid var(--gold-soft); background:transparent; text-align:center; font-family:inherit; font-size:13px; color:var(--ink-soft); }

  /* ---------- touch targets ----------
     On a finger device the doodle swatches (24px) and the small chips/tool buttons were too
     small to hit reliably — taps "didn't react." Grow the hit areas only for coarse pointers
     (iPad/phone), so the desktop layout is untouched. ~44px is Apple's reliable-tap minimum. */
  @media (pointer:coarse){
    .swatch{ width:38px; height:38px; }
    .doodle .palette{ gap:12px; }
    .toolbtn{ padding:10px 15px; font-size:15px; }
    .chip{ padding:11px 17px 11px 14px; font-size:17px; }
    .gal-card .acts button{ padding:9px 13px; font-size:14px; }
    .tagchip{ padding:7px 12px; font-size:15px; }
    .tagchip button{ font-size:18px; padding:0 4px; }
  }

  /* ---------- gallery ---------- */
  .gal-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .gal-card{ background:var(--paper-card); border:1px solid #e6dcc4; border-radius:8px; overflow:hidden; display:flex; flex-direction:column; }
  .gal-card .thumb{ height:130px; background:#f3ecda; display:flex; align-items:center; justify-content:center; border-bottom:1px solid #ece5d2; }
  .gal-card .thumb img{ width:100%; height:100%; object-fit:cover; }
  .gal-card .thumb .none{ color:#c3b89c; font-style:italic; font-size:13px; }
  .gal-card .meta{ padding:10px 12px; }
  .gal-card .meta b{ color:var(--ink); }
  .gal-card .meta small{ display:block; color:var(--hint); font-style:italic; }
  .gal-card .acts{ display:flex; gap:4px; padding:0 8px 10px; flex-wrap:wrap; }
  .gal-card .acts button{ font-size:13px; border:1px solid var(--gold-soft); background:#fff8; border-radius:6px; padding:4px 9px; color:var(--ink-soft); }
  .empty-note{ color:var(--hint); font-style:italic; padding:18px 2px; }
  .spark-row{ display:flex; gap:12px; align-items:flex-start; justify-content:space-between; background:var(--paper-card); border:1px solid #e6dcc4; border-radius:8px; padding:10px 13px; margin-bottom:8px; }
  .spark-text{ white-space:pre-wrap; color:var(--ink-soft); flex:1; }

  /* ---------- prose (tour) ---------- */
  .prose{ max-width:760px; margin:0 auto; }
  .prose h3{ font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin:22px 0 6px; }
  .prose p{ margin:0 0 12px; }
  .prose .layer{ border-left:3px solid var(--gold-soft); padding-left:14px; margin:8px 0; }
  .prose table{ border-collapse:collapse; margin:8px 0; }
  .prose td{ padding:3px 14px 3px 0; }
  .prose code{ background:#f0e7d0; padding:1px 6px; border-radius:4px; font-size:.92em; }

  /* ---------- modal ---------- */
  .modal-bg{ position:fixed; inset:0; background:#2e2a2466; display:flex; align-items:center; justify-content:center; padding:18px; z-index:60; }
  .modal{ background:var(--paper); border:1.5px solid var(--gold); border-radius:10px; max-width:620px; width:100%; max-height:88vh; overflow:auto; padding:24px 26px; box-shadow:0 30px 60px -20px #2e2a2480; }
  .modal h2{ font-size:24px; margin-bottom:6px; }
  .modal textarea{ width:100%; min-height:240px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; line-height:1.5; border:1px solid var(--gold-soft); border-radius:8px; padding:12px; background:#fffdf7; color:var(--ink-soft); }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--ink); color:#faf4e6; padding:11px 20px; border-radius:999px; font-size:15px; z-index:80; box-shadow:0 12px 30px -12px #2e2a24aa; }
  .toast-undo{ background:none; border:none; color:#e7c989; font:inherit; font-size:15px; margin-left:14px; padding:0; text-decoration:underline; cursor:pointer; }

  /* ---------- mode gating (Cozy / Full kit) ---------- */
  body.mode-simple .advanced-only{ display:none !important; }
  body.mode-full .simple-only{ display:none !important; }
  body.profile-maker .world-only{ display:none !important; }
  body.profile-world .maker-only{ display:none !important; }
  /* the Apprentice's code-practice space is separate: hide the maker/world/game
     journal chrome, and reveal .learn-only bits only there */
  .learn-only{ display:none; }
  body.profile-learn .learn-only{ display:initial; }
  body.profile-learn .maker-only, body.profile-learn .world-only{ display:none !important; }

  /* ---------- Naming Tree plate (scaled 1500x1480) ---------- */
  .plate-wrap{ width:100%; overflow:hidden; margin:0 auto; }
  .plate-inner{ width:1500px; transform-origin:top left; }
  .plate-stage{ position:relative; width:1500px; height:1480px; overflow:hidden; border-radius:6px; box-shadow:0 14px 40px -22px rgba(60,52,30,0.5); }

  /* ---------- Canon Studio (worldbuilder) ---------- */
  .studio-tabs{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:18px; }
  .studio-tabs .tab{ border:1.5px solid var(--gold-soft); background:#fff8; color:var(--ink-soft); border-radius:999px; padding:8px 16px; font-size:15px; }
  .studio-tabs .tab.on{ background:#efe7d3; border-color:var(--gold); color:var(--ink); font-weight:600; }
  .canon-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  .canon-list .pick small{ text-transform:none; letter-spacing:0; }
  .canon-doc{ background:#fffdf7; border:1px solid var(--gold-soft); border-radius:10px; padding:20px 22px; max-width:820px; margin:0 auto; box-sizing:border-box; overflow-wrap:anywhere; overflow-x:hidden; }
  .canon-doc h2, .canon-doc h4{ overflow-wrap:anywhere; }
  .canon-doc h2{ font-size:24px; margin:14px 0 6px; }
  .canon-doc h3{ font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin:16px 0 4px; overflow-wrap:anywhere; }
  .canon-doc p, .canon-doc li{ margin:0 0 10px; overflow-wrap:anywhere; }
  /* diagram/structured blocks: a self-contained scrollable box — keeps ASCII aligned and never spills the page (iOS pre-wrap is unreliable for wide lines) */
  .canon-doc pre{ background:#f0e7d0; border-radius:8px; padding:12px 14px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; line-height:1.5; white-space:pre; max-width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .canon-doc pre.raw{ white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; }   /* View raw = prose source: wrap it */
  .canon-doc code{ background:#f0e7d0; padding:1px 6px; border-radius:4px; overflow-wrap:anywhere; }

  .drafter label{ display:block; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); margin:12px 0 4px; }

/* ---------- Region Update 1: read-only saved-region status ---------- */
.region-view{display:grid;gap:14px}
.region-readonly{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:12px 14px;border:1px solid var(--gold-soft);border-radius:10px;background:#fff8}
.region-readonly b{color:var(--ink)}
.region-readonly span{color:var(--hint);font-style:italic}
.region-empty,.region-warning{padding:20px;border:1px dashed var(--gold-soft);border-radius:10px;background:var(--paper-card);text-align:center}
.region-warning{text-align:left;border-style:solid;background:#fff8ef}
.region-card{padding:18px;border:1.5px solid var(--gold-soft);border-radius:12px;background:var(--paper-card);box-shadow:0 10px 24px -22px rgba(var(--shadow)/.45)}
.region-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}

.region-card-head p{margin:2px 0 0}

.region-badge.ok{background:#e7efe2;color:#436047;border:1px solid #bfd0b8}
.region-badge.bad{background:#f8e8e2;color:#8b4b3d;border:1px solid #e1b8aa}
.region-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:9px;margin-top:14px}
.region-stat{display:flex;justify-content:space-between;gap:10px;padding:9px 10px;border:1px solid #e7dcc4;border-radius:8px;background:#fffaf0}
.region-stat-label{color:var(--hint)}
.region-stat b{text-align:right;color:var(--ink);font-weight:600}
.region-layer-list{margin:14px 0 8px}
.region-valid{margin:10px 0 0;color:var(--green);font-weight:600}
.region-invalid{margin-top:12px;padding:12px;border:1px solid #e1b8aa;border-radius:8px;background:#fff4ef;color:#7f493d}

@media(max-width:620px){.region-card{padding:14px}.region-stat{align-items:flex-start;flex-direction:column}.region-stat b{text-align:left}}

/* ---------- Region Update 2: read-only layered map renderer ---------- */
.region-map{padding:16px;border:1.5px solid var(--gold-soft);border-radius:12px;background:var(--paper-card);box-shadow:0 10px 24px -22px rgba(var(--shadow)/.45)}
.region-map-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.region-map-head h3{font-size:22px;margin:0}
/* cosmic placement tints the frame; it is deliberately distinct from local elevation */
.region-map.cosmic-top{border-top:4px solid #8fc7e6}
.region-map.cosmic-middle{border-top:4px solid #cdb25e}
.region-map.cosmic-bottom{border-top:4px solid #6f6076}
.region-layer-switch{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.region-map-toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.region-map-stage{border:1px solid #e7dcc4;border-radius:10px;background:#fbf7ec;overflow:hidden;touch-action:none}
.region-map-svg{display:block;width:100%;height:min(60vh,460px);background:#f4eedd;cursor:grab}

.region-map-item{cursor:pointer;outline:none}
.region-pin-stem{stroke:#683c30;stroke-width:.12;stroke-linecap:round}
.region-pin-dot{fill:#b55e45;stroke:#fff8ef;stroke-width:.08}

.region-readonly-note{margin:10px 0 0;font-style:italic}

.region-editor{padding:14px 16px;border:1.5px solid var(--gold-soft);border-radius:12px;background:#fffaf0}

/* ---------- Spaces: iPad-friendly front door ------------------------------ */

.spaces-intro .hint{max-width:580px;margin:10px auto 0;font-size:16px}
.spaces-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.space-tile{
  position:relative;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;
  min-height:168px;padding:24px;text-align:left;color:var(--ink-soft);font:inherit;

function h(tag, attrs, ...kids){
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs){
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'html') e.innerHTML = v;           // trusted static markup only

    else if (k === 'value') e.value = v;
    else e.setAttribute(k, v);
  }
  for (const kid of kids.flat()){
    if (kid == null || kid === false) continue;
    e.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return e;
}

function pppDefaultIndex(){ return 1; }   // start at Ch 1 "Hello, World!", not the front-matter
/* ---------- persistence (IndexedDB primary, localStorage mirror/fallback) --- */
const KEY = 'vfj.v4';
const IDB_NAME='vfj', IDB_STORE='kv', IDB_KEY='state';
let _idb=null;
function idbOpen(){
  if(_idb) return Promise.resolve(_idb);
  return new Promise((res,rej)=>{
    let req; try{ req=indexedDB.open(IDB_NAME,1); }catch(e){ rej(e); return; }
    req.onupgradeneeded=()=>{ const db=req.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
    req.onsuccess=()=>{ _idb=req.result; res(_idb); };
    req.onerror=()=>rej(req.error||new Error('indexedDB open failed'));
  });
}
function idbGet(key){ return idbOpen().then(db=>new Promise((res,rej)=>{ const r=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); })); }
function idbSet(key,val){ return idbOpen().then(db=>new Promise((res,rej)=>{ const t=db.transaction(IDB_STORE,'readwrite'); t.objectStore(IDB_STORE).put(val,key); t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); t.onabort=()=>rej(t.error||new Error('write aborted')); })); }

// the Naming Tree's seed state — Del's draft (maren/aeryn proposed; druun/thari locked canon)
function namingDefault(){ return {
  established: { Earth:'-druun', Wood:'-thari', Water:'-maren', Air:'-aeryn' },
  locked: ['-druun','-thari'],
  openRoots: ['-karin','-lunai','-sorin'],
  tweaks: { atmosphere:'Cloud-sea', awaitingPresence:'Stirring', ornament:'Illuminated plate' },
}; }
// the Code Practice (Apprentice) space — book-chapter progress + per-chapter
// drill code, flashcard progress, the per-session checklist, the confusion log,
// and the paste-lock toggle. Free-text inputs live in .fields, keyed by name.
function practiceDefault(){ return { fields:{}, flash:0, flashKnown:{}, checklist:{}, journal:[], chapter:1, chapterDone:{}, drills:{}, drillIdx:{}, pasteLock:true }; }
function defaults(){ return { creations:[], sparks:[], roots:{}, counters:{}, elements:[], expressions:[], github:null, engines:{activeId:'',profiles:[]}, mode:'simple', seenIntro:false, profile:'maker', profileChosen:false, openTo:'last', syncOnOpen:false, favorites:[], collections:[], collapsed:[], tombstones:{}, naming:namingDefault(), practice:practiceDefault() }; }
function hydrate(d){
  d=d||{};
  const merged=Object.assign(defaults(), d), engines=d.engines&&typeof d.engines==='object'?d.engines:{};
  merged.openTo=d.openTo==='frontdoor'?'frontdoor':'last';
  merged.naming=Object.assign(namingDefault(), d.naming||{});
  merged.practice=Object.assign(practiceDefault(), d.practice||{});
  merged.engines={
    activeId:typeof engines.activeId==='string'?engines.activeId:'',
    profiles:Array.isArray(engines.profiles)?engines.profiles.map(profile=>Object.assign({},profile)) : [],
  };
  return merged;
}
function validState(s){ return !!s && typeof s==='object' && Array.isArray(s.creations); }   // shape check — corruption guard
function migrateFromLocal(){
  try{
    let d = JSON.parse(localStorage.getItem(KEY));
    if(!validState(d)){ d = JSON.parse(localStorage.getItem('vfj.v3')) || JSON.parse(localStorage.getItem('vfj.v2')) || JSON.parse(localStorage.getItem('vfj.v1')); }  // migrate v3/v2/v1
    if(validState(d)) return hydrate(d);
  }catch(e){}
  return null;
}
// Source of truth is IndexedDB (large quota). If it's empty or corrupt, recover from
// the localStorage mirror rather than silently handing back a blank journal.
async function loadState(){
  try{ const s=await idbGet(IDB_KEY); if(validState(s)){ return hydrate(s); } }catch(e){}
  const local=migrateFromLocal();
  if(local){ idbSet(IDB_KEY, local).catch(()=>{}); return local; }
  return defaults();
}
let DB = defaults();   // replaced by loadState() in init() before the first render
let _stateT=null;
function scheduleStateWrite(){ clearTimeout(_stateT); _stateT=setTimeout(flushState, 120); }
function flushState(){ clearTimeout(_stateT); idbSet(IDB_KEY, DB).catch(()=>{ toast('Could not save to storage.'); }); }
function saveLocal(opts){
  opts=opts||{};
  scheduleStateWrite();                                            // IndexedDB — the real store
  // best-effort recovery mirror; never let a momentarily-empty journal wipe a non-empty
  // backup (guards against a transient blank destroying the only local copy). But a real
  // deletion (a tombstone exists) MUST be mirrored too — otherwise recovering from this
  // mirror after storage eviction could resurrect something she removed.
  try{
    const hasWork = (DB.creations&&DB.creations.length) || (DB.tombstones&&Object.keys(DB.tombstones).length);
    const hasDeviceConfig = !!DB.github || !!(DB.engines&&DB.engines.profiles&&DB.engines.profiles.length);
    if(opts.forceMirror || hasWork || hasDeviceConfig || !localStorage.getItem(KEY)) localStorage.setItem(KEY, JSON.stringify(DB));
  }catch(e){}
}
function save(){ saveLocal(); scheduleSync(); }                    // local + a (debounced, de-duped) repo sync
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
// deletion tombstones (id -> deletedAt). A removed creation/spark is recorded here so the
// additive merge on the next sync — or another device's copy — can't resurrect it. Undo
// clears the tombstone so the item is allowed back. See mergeIncoming in sync/github.js.
function tombstone(id){ if(id) (DB.tombstones=DB.tombstones||{})[id]=Date.now(); }
function untombstone(id){ if(id && DB.tombstones) delete DB.tombstones[id]; }
function nextSpecimen(wsId){ DB.counters[wsId] = (DB.counters[wsId]||0)+1; return DB.counters[wsId]; }

/* ---------- app state & router -------------------------------------------- */
let VIEW = { name:'home' };
// `name` is the reserved view id (render() does VIEWS[VIEW.name]); it must win over any
// caller param so a param literally called `name` can't silently reroute to home.
function go(name, params){ VIEW = Object.assign({}, params, {name}); window.scrollTo(0,0); render(); }

// view registry — register(name, fn(VIEW)->node). Adding a screen is one call; no
// edits to render(). Builders run lazily, so the view fns may be defined in later modules.
const VIEWS = {};
function registerView(name, fn){ VIEWS[name] = fn; }
registerView('home', () => viewHome());
registerView('tour', () => viewTour());
registerView('gallery', () => viewGallery());
registerView('worksheet', (v) => viewWorksheet(v.id, v.editId));
registerView('studio', (v) => viewStudio(v.tab, v.params));
registerView('naming', () => viewNamingTree());
registerView('campaigns', () => viewCampaigns());
registerView('campaign', (v) => viewCampaign(v.camp, v.tab));   // campaign name travels as `camp`, never `name` (reserved view id)

function render(){
  $app.replaceChildren(topbar());
  // error boundary: a single view crash shows a gentle recover card, never a blank app.
  try{ $app.append((VIEWS[VIEW.name] || VIEWS.home)(VIEW)); }
  catch(e){ $app.append(errorCard(e)); }
}
function errorCard(e){
  return h('div',{style:{maxWidth:'560px', margin:'48px auto', padding:'24px 26px', border:'1.5px solid var(--gold-soft)', borderRadius:'12px', background:'#fffdf7', textAlign:'center'}},
    h('h2',{class:'display'}, 'Something hiccuped'),
    h('p',{class:'hint'}, 'This page hit a snag, but your work is safe on this device. Try going back to the start.'),
    h('p',{class:'hint', style:{fontSize:'12px', opacity:'0.7', wordBreak:'break-word'}}, String((e&&e.message)||e)),
    h('div',{class:'toolrow', style:{justifyContent:'center'}},
      h('button',{class:'navbtn primary', onclick:()=>go(DB.profile==='worldbuilder'?'studio':'home')}, 'Back to start'),
      h('button',{class:'navbtn', onclick:()=>{ try{ location.reload(); }catch(_){} }}, 'Reload')));
}

function topbar(){
  const full = DB.mode==='full', world = DB.profile==='worldbuilder', game = DB.profile==='game', learn = DB.profile==='learner';
  const n=DB.creations.length, count=n?` (${n})`:'';
  // each profile sees only its own actions — the Maker never meets the canon machinery,
  // the Worldbuilder leads with the Studio, the Game leads with Campaigns. Only the primary
  // nav scrolls; the utility cluster (mode / ⋯) is fixed on the right so nothing gets clipped.
  const nav = learn
    ? h('div',{class:'navmid'},
        h('button',{class:'navbtn primary', onclick:()=>go('practice')}, '✶ Code Practice'))
    : game
    ? h('div',{class:'navmid'},
        h('button',{class:'navbtn primary', onclick:()=>go('campaigns')}, '♟ Campaigns'),
        h('button',{class:'navbtn', onclick:()=>go('gallery')}, 'My Journal'+count))

  favBtn.onclick=()=>{ const f=DB.favorites=DB.favorites||[]; const i=f.indexOf(w.id); if(i<0) f.push(w.id); else f.splice(i,1); save(); paintFav(); };
  paintFav(); list.append(favBtn);
  const collRow=(c)=>{ const b=h('button',{class:'navbtn', style:{justifyContent:'flex-start'}});
    const paint=()=>{ b.textContent=(c.ids.includes(w.id)?'☑ ':'☐ ')+c.name; };
    b.onclick=()=>{ const i=c.ids.indexOf(w.id); if(i<0) c.ids.push(w.id); else c.ids.splice(i,1); save(); paint(); }; paint(); return b; };
  (DB.collections||[]).filter(c=>c.kit===w.kit).forEach(c=> list.append(collRow(c)));

  const star=h('span',{class:'fav'+(fav?' on':''), role:'button', tabindex:'0', 'aria-label':fav?'unpin from favorites':'pin to favorites',
    title:fav?'unpin':'pin to your favorites', onclick:e=>{ e.stopPropagation(); toggleFav(w.id); }}, fav?'★':'☆');

function shelfGroup(s, key, label, ids, opts){
  opts=opts||{};
  const items=ids.map(shelfItem).filter(Boolean);
  if(!items.length && !opts.keepEmpty) return;
  const collapsed=isCollapsed(key);
  s.append(h('div',{class:'shelf-cat', role:'button', tabindex:'0', onclick:()=>toggleCollapse(key)},
    h('span',{class:'chev'}, collapsed?'▸':'▾'), h('span',null, label),
    opts.onDelete? h('span',{class:'cat-del', title:'remove this collection', onclick:e=>{ e.stopPropagation(); opts.onDelete(); }}, '×') : null));
  if(collapsed) return;
  if(items.length){ const g=h('div',{class:'grid-cards'}); items.forEach(w=>g.append(pickCard(w))); s.append(g); }
  else s.append(h('p',{class:'hint', style:{margin:'0 0 8px'}}, opts.emptyText||'(empty)'));
}
function shelf(title, kit){
  const s = h('div',{class:'shelf'}, h('h3',null,title));
  (DB.collections||[]).filter(c=>c.kit===kit).forEach(c=>
    shelfGroup(s, 'coll::'+c.id, '◆ '+c.name, c.ids, { keepEmpty:true, emptyText:'empty — tap + on any card to add it here', onDelete:()=>deleteCollection(c.id) }));
  const known = new Set((SHELF_GROUPS[kit]||[]).flatMap(([,ids])=>ids));
  const favIds=(DB.favorites||[]).filter(id=>known.has(id));   // her own curated row, first
  if(favIds.length) shelfGroup(s, kit+'::fav', '★ Your favorites', favIds);
  (SHELF_GROUPS[kit]||[]).forEach(([label,ids])=> shelfGroup(s, kit+'::'+label, label, ids));
  return s;
}
function accentOf(w){ return ACCENTS[w.accent]||ACCENTS.gold; }

/* ---------- doodle component ---------------------------------------------- */
// onChange fires only when the *drawing* actually changes (a finished stroke, undo, clear,
// or a loaded photo) — never on a plain tap of a colour/tool button. That keeps the heavy
// card repaint (getImageData + toDataURL of the whole canvas) off the per-tap path, so the
// palette buttons stay responsive on iPad instead of fighting a repaint on every touch.
function Doodle(initial, placeholder, onChange){
  const W=900, H=680;
  const cv = h('canvas');
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr,dpr); ctx.lineCap='round'; ctx.lineJoin='round';
  let color='#4a463b', erasing=false, drawing=false, last=null;
  const undo=[];
  const fire = ()=>{ try{ onChange&&onChange(); }catch(_){} };
  function snapshot(){ try{ undo.push(cv.toDataURL('image/png')); if(undo.length>14) undo.shift(); }catch(e){} }
  function loadDataURL(url, after){ const img=new Image(); img.onload=()=>{ ctx.clearRect(0,0,W,H); const r=Math.min(W/img.width,H/img.height); const w=img.width*r,hh=img.height*r; ctx.drawImage(img,(W-w)/2,(H-hh)/2,w,hh); if(after) after(); }; img.src=url; }
  if (initial) loadDataURL(initial);
  function pos(e){ const r=cv.getBoundingClientRect(); return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height), p:e.pressure&&e.pressure>0?e.pressure:0.5 }; }
  cv.addEventListener('pointerdown', e=>{ e.preventDefault(); cv.setPointerCapture(e.pointerId); snapshot(); drawing=true; last=pos(e); dab(last); });
  cv.addEventListener('pointermove', e=>{ if(!drawing) return; e.preventDefault(); const p=pos(e); stroke(last,p); last=p; });
  function end(){ if(!drawing) return; drawing=false; last=null; fire(); }   // a stroke finished — refresh the card once
  cv.addEventListener('pointerup', end); cv.addEventListener('pointercancel', end); cv.addEventListener('pointerleave', end);
  function setBrush(p){ ctx.globalCompositeOperation = erasing?'destination-out':'source-over'; ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth = (erasing?22:2.2) + (p?.p?p.p*4:2); }
  function dab(p){ setBrush(p); ctx.beginPath(); ctx.arc(p.x,p.y, ctx.lineWidth/2, 0, Math.PI*2); ctx.fill(); }
  function stroke(a,b){ setBrush(b); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }

  const colors=['#4a463b','#3e6b4f','#b98e3c','#b3566a','#4a6b8a','#8a6bb0'];
  const palette = h('div',{class:'palette no-print'});
  const swatches = colors.map(c=>{
    const b=h('button',{class:'swatch'+(c===color?' sel':''), style:{background:c}, title:c, onclick:()=>{ color=c; erasing=false; refreshSel(); }});
    b.dataset.c=c; return b;
  });
  function refreshSel(){ swatches.forEach(s=> s.classList.toggle('sel', !erasing && s.dataset.c===color)); eraseBtn.classList.toggle('sel', erasing); }
  const eraseBtn = h('button',{class:'swatch', style:{background:'#fff', borderStyle:'dashed'}, title:'eraser', onclick:()=>{ erasing=true; refreshSel(); }}, '');
  const fileIn = h('input',{type:'file', accept:'image/*', style:{display:'none'}, onchange:e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{ snapshot(); loadDataURL(rd.result, fire); }; rd.readAsDataURL(f); }});
  palette.append(...swatches, eraseBtn,
    h('button',{class:'toolbtn', onclick:()=>{ if(undo.length){ loadDataURL(undo.pop(), fire); } }}, '↶ Undo'),
    h('button',{class:'toolbtn', onclick:()=>{ snapshot(); ctx.clearRect(0,0,W,H); fire(); }}, 'Clear'),
    h('button',{class:'toolbtn', onclick:()=>fileIn.click()}, '+ Photo'), fileIn,
  );

  const el = h('div',{class:'doodle'}, placeholder? h('div',{class:'ph no-print'},placeholder):null, cv, palette);
  function isBlank(){ const d=ctx.getImageData(0,0,cv.width,cv.height).data; for(let i=3;i<d.length;i+=4){ if(d[i]!==0) return false; } return true; }
  return { el, getData:()=> isBlank()? null : shrinkCanvasURL(cv, 1100, 'image/png') };
}

// Rebuildable card editor. `seedImage` lets "Show me the example" (and edit)
// re-open the same page pre-filled, without any router round-trip.
function buildCardEditor(w, existing, state, seedImage){
  const f = framed(w.title, w.subtitle, w.kit==='field'? 'The Vael Field Journal — go gently, go slow' : "The Worldmaker's Pages — the world is wider because you're in it");
  const wrap = h('div',{class:'editor-wrap'});
  const editor = h('div',{class:'editor-col no-print'});
  const cardCol = h('div',{class:'card-col'});

  const doodle = Doodle(seedImage, w.imageHint, ()=>repaint());
  let importedImage = existing? (existing.importedImage||null) : null;   // full-res photo / Procreate art
  let tags = existing? (existing.tags||[]).slice() : [];
  const currentImage = ()=> importedImage || doodle.getData();
  const previewSpec = (w.specimen && !existing)? (DB.counters[w.id]||0)+1 : (existing && existing.specimenNo);
  function repaint(){ cardCol.replaceChildren(keepsake(w, state, currentImage(), {specimenNo:previewSpec}), cardActions()); }

  w.fields.forEach(fld=>{
    if (fld.type==='element'){
      editor.append(h('div',{class:'field'},
        h('label',null,fld.label),
        fld.hint? h('div',{class:'fhint'}, fld.hint):null,
        elementPicker(state, repaint),
      ));
    } else if (fld.type==='choice'){
      editor.append(choiceField(fld, state, repaint));
    } else {
      const tag = fld.type==='long'? 'textarea':'input';
      const inp = h(tag,{ value: state[fld.key]||'', placeholder: fld.hint||'', rows: fld.type==='long'?2:null,
        oninput:e=>{ state[fld.key]=e.target.value; repaint(); } });
      editor.append(h('div',{class:'field'}, h('label',null,fld.label), inp));
    }
  });

  editor.append(h('div',{class:'field'}, h('label',null,'A doodle — draw with finger or Pencil'), doodle.el));

  // full-res import (a photo, or finished art from Procreate)
  const importPreview = h('div',null);
  const importIn = h('input',{type:'file', accept:'image/*', style:{display:'none'}, onchange:e=>{ const file=e.target.files[0]; if(!file) return; downscaleToDataURL(file, 1400, 0.82, url=>{ importedImage=url; paintImport(); repaint(); }); }});
  function paintImport(){
    importPreview.replaceChildren();
    if (importedImage){
      importPreview.append(
        h('img',{src:importedImage, style:{maxWidth:'190px', maxHeight:'150px', borderRadius:'6px', display:'block', marginBottom:'6px', border:'1px solid var(--gold-soft)'}}),
        h('button',{class:'toolbtn', onclick:()=>{ importedImage=null; paintImport(); repaint(); }}, 'Use my doodle instead'));
    }
  }
  paintImport();
  editor.append(h('div',{class:'field'},
    h('label',null,'Or add a finished picture'),
    h('div',{class:'fhint'},'a photo, or art painted in Procreate (kept full size)'),
    importPreview,
    h('button',{class:'navbtn', onclick:()=>importIn.click()}, 'Add a photo / Procreate art'), importIn));

  // tags (advanced) — for search/filter in the gallery
  const tagWrap=h('div',{class:'taginput'});
  function paintTags(){ tagWrap.replaceChildren(...tags.map((t,i)=> h('span',{class:'tagchip'}, '#'+t, h('button',{title:'remove', 'aria-label':'remove tag', onclick:()=>{ tags.splice(i,1); paintTags(); }}, '×'))),
    (function(){ const ti=h('input',{placeholder:'add a tag…', style:{border:'none',background:'transparent',fontFamily:'inherit',fontSize:'14px',minWidth:'90px'}, onkeydown:e=>{ if(e.key==='Enter'){ e.preventDefault(); const v=e.target.value.trim().toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/(^-|-$)/g,''); if(v&&!tags.includes(v)){ tags.push(v); paintTags(); } } }}); return ti; })()); }
  paintTags();
  editor.append(h('div',{class:'field advanced-only'}, h('label',null,'Tags'), h('div',{class:'fhint'},'press Enter after each — for searching later'), tagWrap));

  const tools = h('div',{class:'toolrow'});
  if (w.example) tools.append(h('button',{class:'navbtn', onclick:()=>{
    const rebuilt = buildCardEditor(w, existing, Object.assign({}, w.example), seedImage);
    $app.replaceChildren(topbar(), rebuilt); window.scrollTo(0,0);
  }}, 'Show me the example'));
  tools.append(h('button',{class:'navbtn primary', onclick:()=>{ saveCreation(w, state, doodle.getData(), existing, importedImage, tags); }}, existing?'Save changes':'Save to my journal'));
  tools.append(h('button',{class:'navbtn', onclick:()=>go('home')}, 'Start fresh'));
  editor.append(tools);

  function cardActions(){
    return h('div',{class:'toolrow no-print'},
      h('button',{class:'navbtn', onclick:()=>window.print()}, 'Print / Save PDF'),
      h('button',{class:'navbtn advanced-only', onclick:()=>sendToProcreate(w, state, currentImage(), {specimenNo:previewSpec})}, 'Save as image →'));
  }

  wrap.append(editor, cardCol);

// element picker: the 12 (+ her own); optional expression "flavors" (advanced).
// Both are multi-select — tap to add a second element/flavor, tap again to remove it
// (a creature can be Water + Air). Stored as arrays; primary element sets the card accent.
function toggleKey(state, field, key){
  const cur = keyList(state[field]);
  const i = cur.indexOf(key);
  if (i>=0) cur.splice(i,1); else cur.push(key);
  state[field] = cur;
}
function elementPicker(state, repaint){
  const box = h('div',null);
  const erow = h('div',{class:'chips'});
  function elChip(e){ const on = keyList(state.element).includes(e.key);
    return h('button',{class:'chip'+(on?' active':''), 'aria-pressed':on?'true':'false', style:{ borderColor:on?(e.accent||'var(--gold-soft)'):'var(--gold-soft)', background:on?deriveBg(e.accent||ACCENTS.gold):'#fbf8ef' },
      onclick:()=>{ toggleKey(state,'element',e.key); paintEls(); repaint(); }}, h('span',{class:'dot', style:{background:e.accent||'var(--gold-soft)'}}), e.label); }
  function paintEls(){ erow.replaceChildren(...allElements().map(elChip),
    h('button',{class:'chip dash advanced-only', onclick:()=>{ const n=prompt('Name your own element'); if(n&&n.trim()){ const key='c_'+uid(); (DB.elements=DB.elements||[]).push({key,label:n.trim(),accent:ACCENTS.gold,custom:true}); save(); toggleKey(state,'element',key); paintEls(); repaint(); } }}, '+ add your own')); }
  paintEls();
  box.append(erow);

  const xwrap = h('div',{class:'advanced-only', style:{marginTop:'12px'}}, h('div',{class:'fhint'}, 'their flavor — optional, pick any (same element, different skin)'));
  const xrow = h('div',{class:'chips'});
  function xChip(e){ const on = keyList(state.expression).includes(e.key);
    return h('button',{class:'chip'+(on?' active':''), 'aria-pressed':on?'true':'false', style:{ borderColor:on?'var(--green)':'var(--gold-soft)', background:on?'#eef0e4':'#fbf8ef' },
      onclick:()=>{ toggleKey(state,'expression',e.key); paintX(); repaint(); }}, e.label); }
  function paintX(){ xrow.replaceChildren(...allExpressions().map(xChip),
    h('button',{class:'chip dash', onclick:()=>{ const n=prompt('Name a flavor (an expression)'); if(n&&n.trim()){ const key='x_'+uid(); (DB.expressions=DB.expressions||[]).push({key,label:n.trim()}); save(); toggleKey(state,'expression',key); paintX(); repaint(); } }}, '+ add a flavor')); }
  paintX();
  xwrap.append(xrow);

// choice field (e.g. Seed type): chips that reveal a per-option example prompt.
function choiceField(fld, state, repaint){
  const wrapc = h('div',{class:'field'+(fld.advanced?' advanced-only':'')}, h('label',null,fld.label));
  if (fld.note) wrapc.append(h('div',{class:'fhint'}, fld.note));
  const row = h('div',{class:'chips'});
  const hintEl = h('div',{class:'choice-hint'});
  function opts(){ const o=fld.options.slice(); const v=state[fld.key]; if(v && !o.some(x=>x.value===v)) o.push({value:v, prompt:''}); return o; }
  function promptFor(v){ const o=fld.options.find(x=>x.value===v); return o? o.prompt : (v? 'for example only — if this is '+v+', what would it do?' : ''); }
  function paint(){
    row.replaceChildren(...opts().map(o=>{ const on=state[fld.key]===o.value;
      return h('button',{class:'chip'+(on?' active':''), 'aria-pressed':on?'true':'false', style:{borderColor:on?'var(--gold)':'var(--gold-soft)', background:on?'#f4ecd6':'#fbf8ef'},
        onclick:()=>{ state[fld.key]= on? '' : o.value; paint(); hintEl.textContent=promptFor(state[fld.key]); repaint(); }}, o.value); }),
      h('button',{class:'chip dash', onclick:()=>{ const n=prompt('What kind of Seed?'); if(n&&n.trim()){ state[fld.key]=n.trim(); paint(); hintEl.textContent=promptFor(state[fld.key]); repaint(); } }}, '+ add your own'));
  }
  paint(); hintEl.textContent = promptFor(state[fld.key]);
  wrapc.append(row, hintEl);
  return wrapc;
}

/* ---------- keepsake card renderer ----------------------------------------- */
function keepsake(w, state, image, opts){
  opts = opts||{};
  const c = w.card || {};
  let accent = accentOf(w);
  const hasElement = w.fields && w.fields.some(f=>f.type==='element');
  if (hasElement && primaryElementKey(state.element)) accent = elementAccentOf(primaryElementKey(state.element));
  const cardBg = deriveBg(accent), cardFrame = deriveFrame(accent);
  const nameVal = (state[c.name]||'').trim();
  const wordVal = c.word? (state[c.word]||'').trim():'';
  const quoteVal = (state[c.quote]||'').trim();
  const subVal = c.sub? (state[c.sub]||'').trim():'';

  const k = h('div',{class:'keepsake'+(opts.flat?'':' tilt'), style:{ '--accent':accent, '--cardbg':cardBg, '--cardframe':cardFrame }});
  k.append(h('div',{class:'ribbon', style:{background:accent}}));
  const body = h('div',{class:'body'});

  const kick = c.kicker || w.title;
  body.append(h('div',{class:'head'},
    h('div',{class:'kick'}, opts.specimenNo? `${kick} · no. ${opts.specimenNo}` : kick),
    wordVal? h('div',{class:'word hand', style:{color:accent}}, wordVal): h('span'),
  ));

  // image frame
  const frame = h('div',{class:'frame'});
  if (image) frame.append(h('img',{src:image, alt:''}));
  else frame.append(h('div',{class:'empty'}, w.imageHint||'a little drawing goes here'));
  body.append(frame);

  body.append(h('h3',{class:'name display'}, nameVal || placeholderName(w)));
  if (c.sub && subVal) body.append(h('div',{class:'sub'}, (c.subPrefix||'')+subVal));

  // remaining rows (skip name/sub/word/quote/element)
  const skip = new Set([c.name, c.sub, c.word, c.quote].filter(Boolean));
  const rows = h('div',{class:'rows'});
  let any=false;
  (w.fields||[]).forEach(fld=>{
    if (skip.has(fld.key)) return;
    if (fld.type==='element'){
      if (keyList(state.element).length){ any=true; const lbl=elementLabelsOf(state.element)+(keyList(state.expression).length? ' · '+expressionLabelsOf(state.expression):'');
        rows.append(h('div',{class:'rw elt'}, h('span',{class:'dot', style:{background:accent}}), h('span',{class:'rl', style:{margin:0}}, keyList(state.element).length>1?'Elements':'Element'), h('span',{class:'rv', style:{fontStyle:'italic'}}, lbl))); }
      return;
    }
    const v=(state[fld.key]||'').trim(); if(!v) return; any=true;
    rows.append(h('div',{class:'rw'}, h('div',{class:'rl'}, fld.cardLabel||fld.label), h('div',{class:'rv'}, v)));
  });
  if (any) body.append(rows);

  if (c.quote){
    body.append(h('div',{class:'quote'}, h('div',{class:'hand'}, quoteVal || quotePlaceholder(w))));
  }
  body.append(h('div',{class:'cardfoot'}, w.kit==='field'?'The Vael Field Journal':"The Worldmaker's Pages"));
  k.append(body);
  return k;
}
function placeholderName(w){
  return { portrait:'A New Vael', grove:'A New Grove', ourgrove:'Our Grove', sacred:'A Sacred Creature',
    people:'A New People', creature:'A New Creature', place:'A New Place', seed:'A New Seed',
    case:'An Open Case', folk:'A Vael' }[w.id] || 'Something New';
}
function quotePlaceholder(w){ return 'A small, true line goes here — only you know it yet.'; }

/* ---------- save / specimen numbering -------------------------------------- */
function saveCreation(w, state, image, existing, importedImage, tags){
  const named = (state[(w.card&&w.card.name)] || state.name || state.called || state.title || '').trim();
  if (existing){
    existing.fields = Object.assign({}, state);
    existing.image = image; existing.importedImage = importedImage||null; existing.tags = tags||[]; existing.updatedAt = Date.now();
    save(); toast('Saved.'); go('gallery'); return;
  }
  const rec = { id:uid(), worksheetId:w.id, kit:w.kit, fields:Object.assign({},state), image, importedImage:importedImage||null, tags:tags||[], createdAt:Date.now(), updatedAt:Date.now() };
  if (w.specimen) rec.specimenNo = nextSpecimen(w.id);
  DB.creations.push(rec); save();
  toast(named? `“${named}” is real now.` : 'Saved to your journal.');
  go('gallery');
}

function exportBook(){
  let stage=document.getElementById('book-stage');
  if(!stage){ stage=h('div',{id:'book-stage', class:'book-stage'}); document.body.append(stage); }
  stage.replaceChildren();
  const name=(DB.github&&DB.github.displayName)||'';
  stage.append(h('div',{class:'book-cover'}, svgUse('ic-seedling','emblem'),
    h('h1',{class:'display'}, (name? name+'’s ':'')+'Field Journal'),
    h('div',{class:'hint'},'a corner of the Godling Universe — same trunk, different branches')));
  let pages=0;
  DB.creations.forEach(c=>{ const w=WS[c.worksheetId]; if(!w||!w.card) return; pages++;
    stage.append(h('div',{class:'book-page'}, keepsake(w, c.fields||{}, creationThumb(c), {specimenNo:c.specimenNo, flat:true}))); });
  if(!pages){ toast('Nothing to put in the book yet.'); return; }
  document.body.classList.add('printing-book'); window.print();

}
function creationTitle(c){
  const w=WS[c.worksheetId];
  if (c.worksheetId==='specimens') return 'Seeds & Specimens';
  if (c.worksheetId==='warmth') return (c.fields&&c.fields.what)||'A Warmth-Keeper piece';
  const f=c.fields||{};
  if (!w || !w.card) return (f.name||f.called||f.title||'Untitled').trim()||'Untitled';
  return (f[w.card.name]||f.name||f.called||f.title||'Untitled').trim()||'Untitled';
}
function creationThumb(c){
  if (c.importedImage) return c.importedImage;

  if (c.slots){ const s=c.slots.find(x=>x.image); return s?s.image:null; }
  return null;
}

// Shared overlay: builds a scrim + inner node, closes on Escape and on scrim-click
// (unless dismissible:false), and returns focus to the opener. Returns a close fn.
function openOverlay(buildInner, opts){
  opts=opts||{};
  const prev=document.activeElement;
  const bg=h('div',{class:opts.cls||'modal-bg', role:'dialog', 'aria-modal':'true'});
  function close(){ if(bg._closed) return; bg._closed=true; document.removeEventListener('keydown', onKey); bg.remove(); try{ prev&&prev.focus&&prev.focus(); }catch(_){}; if(opts.onClose) opts.onClose(); }
  function onKey(e){ if(e.key==='Escape' && opts.dismissible!==false) close(); }
  if(opts.dismissible!==false) bg.addEventListener('click', e=>{ if(e.target===bg) close(); });
  bg.append(buildInner(close));
  document.addEventListener('keydown', onKey);
  document.body.append(bg);
  if(!opts.noAutofocus) setTimeout(()=>{ const f=bg.querySelector('button,[href],input,textarea,select,[tabindex]'); if(f) try{ f.focus(); }catch(_){} }, 0);
  return close;
}
function showModal(title, note, text){
  const ta=h('textarea',{readonly:true}, text);

    h('div',{class:'toolrow'},
      h('button',{class:'navbtn primary', onclick:()=>{ ta.select(); try{ document.execCommand('copy'); }catch(e){} navigator.clipboard&&navigator.clipboard.writeText(text); toast('Copied.'); }}, 'Copy'),

      h('button',{class:'navbtn', onclick:()=>close()}, 'Close'),
    )));
}

function pField(name){ const v=DB.practice.fields[name]; return v!=null ? v : (PRACTICE_DEFAULTS[name]!=null ? PRACTICE_DEFAULTS[name] : ''); }

// Copy from a textarea: select it first — so it still works where the Clipboard API is
// blocked (iPad Safari often needs the live selection, or a non-secure context) — then try
// the API. The toast is honest: if nothing could be copied, the text is at least selected.
function prcCopyArea(ta, msg){
  try{ ta.focus(); ta.select(); ta.setSelectionRange(0, (ta.value||'').length); }catch(_){}
  let ok=false;
  try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(ta.value); ok=true; } }catch(_){ ok=false; }
  if(!ok){ try{ ok=!!(document.execCommand&&document.execCommand('copy')); }catch(_){ ok=false; } }
  toast(ok? (msg||'Copied.') : 'Selected — press ⌘/Ctrl + C to copy.');
}
function pArea(name, rows, ph){ return h('textarea',{class:'prc-input', rows:rows||2, placeholder:ph||'', value:pField(name), oninput:e=>pSetField(name, e.target.value)}); }
function pInput(name, ph){ return h('input',{class:'prc-input', placeholder:ph||'', value:pField(name), oninput:e=>pSetField(name, e.target.value)}); }

/* ---------- chapter spine (PPP 3rd ed.) + scoped coach ---------------------- */
function prcChapter(){ const i=DB.practice.chapter|0; return PPP_CHAPTERS[(i>=0&&i<PPP_CHAPTERS.length)?i:1]; }
function prcChapterDone(n){ return !!DB.practice.chapterDone[n]; }
// a chapter holds a small ladder of drills; the current one is tracked per chapter, and
// each drill's typed code is stored under "chapter.drill" so the ladder rungs don't clobber.
function prcChapterDrills(){ return prcChapter().drills || []; }
function prcDrillIndex(){ const n=prcChapter().n, ds=prcChapterDrills(); const i=(DB.practice.drillIdx&&DB.practice.drillIdx[n])|0; return (i>=0&&i<ds.length)?i:0; }
function prcSetDrillIndex(i){ const n=prcChapter().n; (DB.practice.drillIdx=DB.practice.drillIdx||{})[n]=i; save(); }
function prcCurDrill(){ const ds=prcChapterDrills(); return ds.length? ds[prcDrillIndex()] : null; }
function prcDrillKey(){ return prcChapter().n + '.' + prcDrillIndex(); }
function prcDrillCode(){ const k=prcDrillKey(); return (DB.practice.drills&&DB.practice.drills[k])||''; }
function prcSetDrillCode(v){ const k=prcDrillKey(); (DB.practice.drills=DB.practice.drills||{})[k]=v; save(); }
function prcAllowed(){ const n=prcChapter().n; return PPP_UNLOCKS.filter(([c])=>c<=n).map(([,t])=>t); }
function prcNotYet(){ const n=prcChapter().n; return PPP_UNLOCKS.filter(([c])=>c>n).map(([c,t])=>`${t} (Ch ${c})`); }
function prcCodeBlock(){ const code=prcDrillCode().trim(); return code? '```cpp\n'+code+'\n```' : '(no code typed yet)'; }
// the scope guard injected into every coach prompt, so the AI never teaches ahead of the book.
function pppScopeNote(){
  const cur=prcChapter(); const have=prcAllowed(), notYet=prcNotYet();
  return [
    `Context: a beginner working through Stroustrup's "Programming: Principles and Practice Using C++" (3rd ed.), currently at Chapter ${cur.n} — ${cur.title}.`,
    `Use only modern ISO C++ (C++20/23). Reject C-style arrays, raw owning pointers, and pre-C++11 patterns.`,
    have.length? `Tools taught so far (fair game): ${have.join('; ')}.` : `Only the basics from Chapters 1–2 have been taught so far.`,
    notYet.length? `NOT yet introduced — do not use, teach, or suggest these: ${notYet.join('; ')}.` : ''
  ].filter(Boolean).join('\n');
}
function prcSocraticPrompt(){ const d=prcCurDrill();
  return ['You are a patient Socratic C++ tutor. Never write the solution code — explain the idea, give an analogy, and ask me ONE guiding question so I find it myself. A short pseudo-code outline with the key line left blank is fine.','',
    pppScopeNote(),'', d? 'The drill: '+d.prompt : 'No specific drill — I just want to understand the concept below.','',
    'My attempt so far:', prcCodeBlock(),'','Give me one hint or guiding question. No full solution.'].join('\n'); }
function prcCompilerPrompt(){
  return ['Act as a C++20 compiler plus a kind translator for a beginner.','', pppScopeNote(),'',
    'Here is my code:', prcCodeBlock(),'',
    'If it would NOT compile, tell me the FIRST error in plain English and which line — but do not fix it for me, just point me at it. If it compiles, say so and show what it would print.'].join('\n'); }
function prcCriticPrompt(){ const d=prcCurDrill();
  return ['You are a careful C++ reviewer in the spirit of the C++ Core Guidelines, coaching a beginner. Review my COMPILING code — do not rewrite it for me.','',
    pppScopeNote(),'', d? 'The drill: '+d.prompt : '', 'My code:', prcCodeBlock(),'',
    'Flag any: raw new/delete, magic numbers, uninitialized variables, or a class whose invariant could be broken. Then ask me ONE "what happens if…" question (e.g., a negative or empty input) so I check my own logic.'].filter(Boolean).join('\n'); }
function prcUE5Prompt(){
  return ['I am learning standard C++ but heading to Unreal Engine 5 C++. For the concept in my code below, show the direct UE5 equivalent as a short mapping (e.g., std::vector→TArray, std::string→FString, std::cout→UE_LOG), with one gotcha each.','',
    'Concept / code:', prcCodeBlock(),'','Keep it a mapping, not a rewrite of my program.'].join('\n'); }

function practiceLearn(host){
  host.replaceChildren();
  const ch=prcChapter(), idx=ch.n;
  const doneCount=PPP_CHAPTERS.filter(c=>prcChapterDone(c.n)).length;

  // chapter picker (grouped by Part), the spine of the book on Del's desk
  host.append(pHead('Your place in the book'));
  const sel=h('select',{class:'prc-input', onchange:e=>{ DB.practice.chapter=+e.target.value; save(); practiceLearn(host); }});
  const groups={}, order=[];
  PPP_CHAPTERS.forEach(c=>{ if(!groups[c.part]){ groups[c.part]=h('optgroup',{label:c.part}); order.push(c.part); }
    groups[c.part].append(h('option',{value:c.n, selected:c.n===idx?'selected':null}, `${c.n}. ${c.title}`+(prcChapterDone(c.n)?' ✓':''))); });
  order.forEach(p=> sel.append(groups[p]));
  host.append(sel);
  host.append(h('p',{class:'hint', style:{textAlign:'center'}}, `${doneCount}/${PPP_CHAPTERS.length} chapters marked done`));

  // chapter card
  const allowed=prcAllowed(), next=PPP_UNLOCKS.find(([c])=>c>idx);
  host.append(h('div',{class:'prc-card'},
    h('h3',{class:'prc-h'}, `Chapter ${ch.n} — ${ch.title}`),
    h('p',null, ch.summary),
    (ch.teaches&&ch.teaches.length)? h('div',null, h('h4',{class:'prc-sub'},'This chapter introduces'), pList(ch.teaches)) : null,
    (ch.keyTerms&&ch.keyTerms.length)? h('p',{class:'prc-note'}, 'Key terms: '+ch.keyTerms.join(' · ')) : null,
    h('h4',{class:'prc-sub'}, 'What you can use up to here'),
    allowed.length? pList(allowed) : h('p',{class:'hint'}, 'Just the basics so far — variables, simple output, and (from Ch 2) input.'),
    next? h('p',{class:'prc-note'}, `Not yet: ${next[1]} comes in Chapter ${next[0]} — try not to reach for it before then.`) : null,
