name: deploy-region-update-1

on:
  pull_request:
    paths:
      - '.github/workflows/deploy-region-update-1.yml'

permissions:
  contents: write

jobs:
  deploy-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy-region-update-1
      - name: Download verified private shell artifact
        shell: bash
        run: |
          curl --fail --location --retry 3 --output /tmp/field-journal-public-shell.zip 'https://sdmntprwestus.oaiusercontent.com/files/00000000-12dc-7230-9169-087bab722d98/raw?se=2026-06-24T03:47:16Z&sp=r&sv=2026-02-06&sr=b&scid=39384018-3b98-58dc-88d8-444e2709eee1&skoid=fadb8e47-d3c7-4c79-a9c3-970d9af3b213&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-06-23T20:23:56Z&ske=2026-06-25T20:23:56Z&sks=b&skv=2026-02-06&sig=LE3wq8T4iKMjZ3puhz6g7%2BjLUv3Phxe/etf6GRnPjkA%3D'
          rm -rf /tmp/public-shell
          mkdir -p /tmp/public-shell
          unzip -q /tmp/field-journal-public-shell.zip -d /tmp/public-shell
      - name: Verify safe shell contents
        shell: bash
        run: |
          test "$(find /tmp/public-shell -maxdepth 1 -type f | wc -l)" -eq 7
          test -f /tmp/public-shell/index.html
          test -f /tmp/public-shell/sw.js
          grep -q "REGION_SCHEMA_VERSION" /tmp/public-shell/index.html
          grep -q "Save runtime gauges" /tmp/public-shell/index.html
          grep -q "No saved regions exist for this campaign yet" /tmp/public-shell/index.html
          ! grep -q "CAMPAIGN STATE TRACKER Campaign01" /tmp/public-shell/index.html
          ! grep -q "github_pat_" /tmp/public-shell/index.html
      - name: Replace public shell files
        shell: bash
        run: |
          cp /tmp/public-shell/index.html ./index.html
          cp /tmp/public-shell/sw.js ./sw.js
          cp /tmp/public-shell/manifest.webmanifest ./manifest.webmanifest
          cp /tmp/public-shell/icon.svg ./icon.svg
          cp /tmp/public-shell/icon-180.png ./icon-180.png
          cp /tmp/public-shell/icon-192.png ./icon-192.png
          cp /tmp/public-shell/icon-512.png ./icon-512.png
      - name: Commit deployment to PR branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js manifest.webmanifest icon.svg icon-180.png icon-192.png icon-512.png
          if git diff --cached --quiet; then
            echo "Public shell already current."
          else
            git commit -m "Deploy Region Update 1 public shell"
            git push origin HEAD:deploy-region-update-1
          fi
