name: verify-region-live

on:
  pull_request:
    paths:
      - '.github/workflows/verify-region-live.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages and verify live shell
        shell: bash
        run: |
          set -euo pipefail
          url='https://dracanman.github.io/Field-Journal/'
          for attempt in $(seq 1 18); do
            echo "Attempt $attempt: $url"
            if curl --fail --location --silent --show-error --output /tmp/live.html "$url"; then
              if grep -q 'REGION_SCHEMA_VERSION' /tmp/live.html \
                && grep -q 'No saved regions exist for this campaign yet' /tmp/live.html \
                && grep -q 'Save runtime gauges' /tmp/live.html; then
                echo 'LIVE_REGION_UPDATE_1_OK'
                exit 0
              fi
            fi
            sleep 10
          done
          echo 'Live Pages content did not reach the expected Region Update 1 shell in time.'
          exit 1
